<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LessonCraft AI</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style id="app-styles">
/* ─── RESET & BASE ─────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#92278F;--pd:#632E62;--pl:#f0e8f0;--a:#e94560;--a2:#FFC000;
  --gray-50:#f8f7fc;--gray-100:#f0edf7;--gray-200:#e2dced;--gray-300:#c8bfd8;--gray-400:#9f94b0;--gray-500:#6b6080;--gray-700:#3d3454;--gray-900:#1e1a2e;
  --white:#fff;--radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 12px 32px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
  --fh:'Sora',sans-serif;--fb:'Inter',sans-serif;
  --hdr:56px;--sb:280px;
}
html,body{height:100%;font-family:var(--fb);background:var(--gray-50);color:var(--gray-900);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ─── SCROLLBAR ─────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:99px}

/* ─── HEADER ────────────────────────────────────── */
.hdr{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:var(--hdr);background:var(--pd);
  display:flex;align-items:center;gap:0;
  box-shadow:0 1px 0 rgba(255,255,255,.08),0 2px 8px rgba(0,0,0,.2);
}
.hdr-logo{
  display:flex;align-items:center;gap:10px;
  padding:0 20px 0 22px;
  font-family:var(--fh);font-size:17px;font-weight:800;
  color:#fff;white-space:nowrap;letter-spacing:-.3px;
  border-right:1px solid rgba(255,255,255,.1);height:100%;
}
.hdr-logo svg{flex-shrink:0}
.logo-pill{
  background:var(--a2);color:var(--pd);
  font-size:9px;font-weight:800;letter-spacing:.8px;
  padding:2px 7px;border-radius:99px;margin-left:2px;
}
.hdr-nav{display:flex;align-items:stretch;flex:1;padding:0 8px}
.nav-item{
  display:flex;align-items:center;gap:8px;
  padding:0 16px;height:100%;cursor:pointer;
  font-size:13px;font-weight:500;color:rgba(255,255,255,.45);
  border-bottom:2.5px solid transparent;transition:all .15s;
  position:relative;white-space:nowrap;
}
.nav-item:hover{color:rgba(255,255,255,.8)}
.nav-item.active{color:#fff;border-bottom-color:var(--a2)}
.nav-num{
  width:18px;height:18px;border-radius:50%;
  font-size:9px;font-weight:800;
  background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;
}
.nav-item.active .nav-num{background:var(--a2);color:var(--pd)}
.nav-item.done .nav-num{background:#22c55e;color:#fff}
.nav-item.done{color:rgba(255,255,255,.65)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;padding:0 18px}
.hdr-theme-pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.1);border-radius:99px;
  padding:4px 10px 4px 6px;font-size:11px;color:rgba(255,255,255,.75);
}
.theme-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3)}

/* ─── LAYOUT ─────────────────────────────────────── */
.shell{display:flex;height:100vh;padding-top:var(--hdr)}
.sidebar{
  width:var(--sb);min-width:var(--sb);
  background:var(--white);
  border-right:1px solid var(--gray-200);
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:2px 0 8px rgba(0,0,0,.04);
}
.sb-scroll{flex:1;overflow-y:auto;padding:16px 14px 20px}
.content{flex:1;overflow-y:auto;padding:28px 32px 100px}

/* ─── SIDEBAR COMPONENTS ────────────────────────── */
.sb-section{margin-bottom:18px}
.sb-label{
  font-size:10px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;color:var(--p);
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.sb-field{margin-bottom:8px}
.sb-field label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);margin-bottom:4px}
input,textarea,select{
  width:100%;padding:8px 11px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-xs);
  font-family:var(--fb);font-size:13px;color:var(--gray-900);
  background:var(--gray-50);outline:none;
  transition:border-color .15s,background .15s,box-shadow .15s;
}
input:hover,textarea:hover{border-color:var(--gray-300)}
input:focus,textarea:focus{border-color:var(--p);background:var(--white);box-shadow:0 0 0 3px rgba(146,39,143,.1)}
textarea{resize:vertical;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sb-divider{height:1px;background:var(--gray-100);margin:14px 0}

/* ─── BUTTONS ─────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 16px;border-radius:var(--radius-xs);
  font-family:var(--fb);font-size:13px;font-weight:600;
  cursor:pointer;border:none;transition:all .15s;white-space:nowrap;
}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-primary{background:var(--p);color:#fff}
.btn-primary:hover{background:var(--pd);transform:translateY(-1px);box-shadow:0 4px 12px rgba(146,39,143,.3)}
.btn-primary:active{transform:translateY(0)}
.btn-amber{background:var(--a2);color:var(--pd)}
.btn-amber:hover{filter:brightness(.94);transform:translateY(-1px)}
.btn-dark{background:var(--pd);color:#fff}
.btn-dark:hover{filter:brightness(1.15)}
.btn-ghost{background:transparent;color:var(--p);border:1.5px solid var(--gray-200)}
.btn-ghost:hover{border-color:var(--p);background:var(--pl)}
.btn-danger{background:transparent;color:#ef4444;border:1.5px solid #fecaca}
.btn-danger:hover{background:#fef2f2}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:5px}
.btn-full{width:100%}
.btn-icon{
  width:32px;height:32px;border-radius:var(--radius-xs);border:1.5px solid var(--gray-200);
  background:var(--white);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:13px;transition:all .15s;flex-shrink:0;
}
.btn-icon:hover{border-color:#fca5a5;background:#fef2f2;color:#ef4444}

/* ─── GENERATE HERO BUTTON ───────────────────────── */
.gen-hero{
  background:linear-gradient(135deg,var(--p) 0%,var(--pd) 100%);
  color:#fff;border-radius:var(--radius-sm);padding:13px 16px;
  cursor:pointer;border:none;width:100%;
  display:flex;align-items:center;gap:10px;
  font-family:var(--fh);font-size:14px;font-weight:700;
  box-shadow:0 4px 16px rgba(146,39,143,.3);
  transition:all .2s;position:relative;overflow:hidden;
}
.gen-hero::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%);
}
.gen-hero:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(146,39,143,.4)}
.gen-hero:active{transform:translateY(0)}
.gen-hero-icon{font-size:20px;flex-shrink:0}
.gen-hero-text{text-align:left}
.gen-hero-title{font-size:13px;font-weight:700;line-height:1.2}
.gen-hero-sub{font-size:10px;opacity:.75;font-weight:400;margin-top:1px}

/* ─── WORKSHEET UPLOAD ───────────────────────────── */
.ws-zone{
  border:1.5px dashed var(--gray-300);border-radius:var(--radius-sm);
  padding:12px;text-align:center;cursor:pointer;
  transition:all .2s;position:relative;background:var(--gray-50);
}
.ws-zone:hover,.ws-over{border-color:var(--p);background:var(--pl)}
.ws-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ws-loaded{
  background:linear-gradient(135deg,#fff8e6,#fffaed);
  border:1.5px solid #fcd34d;border-radius:var(--radius-sm);
  padding:10px 12px;display:flex;align-items:center;gap:10px;
}
.ws-loaded-icon{font-size:22px;flex-shrink:0}
.ws-loaded-name{font-size:12px;font-weight:600;color:#92400e;line-height:1.3}
.ws-loaded-sub{font-size:11px;color:#b45309;margin-top:1px}

/* ─── THEME SWATCHES ─────────────────────────────── */
.swatch-row{display:flex;gap:5px;margin-top:6px}
.swatch{width:22px;height:22px;border-radius:5px;border:2px solid rgba(255,255,255,.6);box-shadow:var(--shadow-sm)}

/* ─── PAGE HEADER ────────────────────────────────── */
.page-hero{margin-bottom:28px}
.page-hero h1{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--gray-900);letter-spacing:-.3px;line-height:1.2}
.page-hero p{font-size:13px;color:var(--gray-400);margin-top:5px;max-width:600px}

/* ─── PHASE GRID ─────────────────────────────────── */
.phases{display:flex;flex-direction:column;gap:10px}

/* ─── PHASE CARD ─────────────────────────────────── */
.pcard{
  background:var(--white);border-radius:var(--radius);
  border:1.5px solid var(--gray-200);
  overflow:hidden;transition:border-color .15s,box-shadow .15s;
}
.pcard:hover{border-color:var(--gray-300);box-shadow:var(--shadow-sm)}
.pcard.open{border-color:var(--p);box-shadow:0 0 0 3px rgba(146,39,143,.06),var(--shadow-md)}
.pcard.generated{border-color:#bbf7d0}

.phead{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;cursor:pointer;user-select:none;
}
.phase-color-bar{width:4px;height:44px;border-radius:2px;flex-shrink:0}
.phase-icon-wrap{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.phase-text{flex:1;min-width:0}
.phase-label{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--gray-900)}
.phase-sub{font-size:11px;color:var(--gray-400);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.phase-meta{display:flex;align-items:center;gap:7px;margin-left:auto;flex-shrink:0}

/* STATUS PILL */
.status-pill{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;
  white-space:nowrap;
}
.status-pill.ready{background:#dcfce7;color:#15803d}
.status-pill.pending{background:var(--gray-100);color:var(--gray-400)}
.status-pill.generating{background:#fdf4ff;color:var(--p)}

.chev{color:var(--gray-300);font-size:16px;transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}

/* PHASE BODY */
.pbody{border-top:1px solid var(--gray-100)}
.pbody-inner{padding:16px}
.phase-hint{
  font-size:11.5px;color:var(--gray-500);line-height:1.6;
  padding:9px 12px;background:var(--gray-50);
  border-radius:var(--radius-xs);border-left:3px solid var(--p);
  margin-bottom:12px;
}

/* AI CONTENT DISPLAY */
.ai-result{
  background:var(--white);border:1.5px solid #e9d5ff;
  border-radius:var(--radius-xs);margin-bottom:10px;overflow:hidden;
}
.ai-result-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:linear-gradient(to right,#faf5ff,var(--white));
  border-bottom:1px solid #f3e8ff;
}
.ai-result-label{font-size:10px;font-weight:700;color:var(--p);letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.ai-result-body{padding:10px 12px;font-size:12.5px;line-height:1.8;color:var(--gray-700);white-space:pre-wrap}

/* AI GENERATING STATE */
.ai-generating{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;background:linear-gradient(to right,#faf5ff,#fdf8ff);
  border-radius:var(--radius-xs);border:1px solid #e9d5ff;
}
.spinner{
  width:18px;height:18px;border:2px solid #e9d5ff;
  border-top-color:var(--p);border-radius:50%;
  animation:spin .7s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* AI BUTTONS ROW */
.ai-actions{display:flex;gap:8px;align-items:center;margin-top:6px}
.ta-label{font-size:11px;font-weight:600;color:var(--gray-400);margin-bottom:5px;margin-top:10px}

/* ─── GENERATION PROGRESS ────────────────────────── */
.gen-progress-card{
  background:var(--white);border-radius:var(--radius);
  border:1.5px solid var(--gray-200);padding:20px 22px;
  margin-bottom:20px;box-shadow:var(--shadow-sm);
}
.gen-progress-title{
  font-family:var(--fh);font-size:15px;font-weight:700;
  color:var(--gray-900);margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.gen-steps{display:flex;flex-direction:column;gap:2px}
.gen-step{
  display:flex;align-items:center;gap:12px;
  padding:8px 10px;border-radius:var(--radius-xs);
  transition:background .15s;
}
.gen-step.active{background:var(--pl)}
.gen-step-dot{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;flex-shrink:0;transition:all .2s;
}
.gen-step-dot.pending{background:var(--gray-100);color:var(--gray-400)}
.gen-step-dot.active{background:var(--p);color:#fff;animation:pulse 1.2s ease infinite}
.gen-step-dot.done{background:#22c55e;color:#fff}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(146,39,143,.4)}50%{box-shadow:0 0 0 6px rgba(146,39,143,0)}}
.gen-step-label{font-size:13px;font-weight:500;color:var(--gray-700);transition:color .15s}
.gen-step.active .gen-step-label{color:var(--p);font-weight:600}
.gen-step.done .gen-step-label{color:#15803d}
.gen-step-desc{font-size:11px;color:var(--gray-400);margin-left:auto}

/* ─── THEME PAGE ─────────────────────────────────── */
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:560px}
.theme-upload-card{
  border:2px dashed var(--gray-200);border-radius:var(--radius);
  padding:32px 24px;text-align:center;cursor:pointer;
  transition:all .2s;background:var(--white);position:relative;
  grid-column:span 2;
}
.theme-upload-card:hover,.theme-upload-card.dz-over{border-color:var(--p);background:var(--pl)}
.theme-upload-card input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.tuc-icon{font-size:36px;margin-bottom:10px;display:block}
.tuc-title{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--gray-900);margin-bottom:5px}
.tuc-sub{font-size:13px;color:var(--gray-400)}

.theme-loaded-card{
  background:linear-gradient(135deg,#f0fdf4,#ecfdf5);
  border:1.5px solid #86efac;border-radius:var(--radius);
  padding:16px 20px;display:flex;align-items:flex-start;gap:14px;
  margin-bottom:20px;
}
.palette-display{display:flex;gap:8px;margin-top:10px}
.pal-chip{border-radius:8px;overflow:hidden;text-align:center;flex:1}
.pal-chip-color{height:42px;border-radius:6px;margin-bottom:5px;box-shadow:var(--shadow-sm)}
.pal-chip-name{font-size:10px;font-weight:600;color:var(--gray-500)}
.pal-chip-hex{font-size:9px;color:var(--gray-400);margin-top:1px}

.manual-col-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:460px;margin:14px 0}
.col-field label{font-size:11px;font-weight:600;color:var(--gray-500);margin-bottom:4px;display:block}
.col-input-row{display:flex;gap:6px;align-items:center}
.col-swatch{width:34px;height:34px;border:none;border-radius:6px;cursor:pointer;padding:2px;flex-shrink:0}

/* ─── KEYWORDS ───────────────────────────────────── */
.eal-banner{
  background:linear-gradient(135deg,#fdf4ff,#faf5ff);
  border:1.5px solid #e9d5ff;border-radius:var(--radius);
  padding:14px 16px;margin-bottom:20px;
  display:flex;gap:12px;align-items:flex-start;
}
.eal-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.eal-text strong{color:var(--pd);font-weight:700}
.eal-text{font-size:13px;color:var(--gray-700);line-height:1.6}

.kw-table{background:var(--white);border-radius:var(--radius);border:1.5px solid var(--gray-200);overflow:hidden;box-shadow:var(--shadow-sm)}
.kw-thead{display:grid;grid-template-columns:1fr 1fr 40px;gap:0;background:var(--pd);padding:9px 14px}
.kw-thead-cell{font-size:10px;font-weight:700;color:#fff;letter-spacing:.5px;text-transform:uppercase}
.kw-tbody{padding:8px}
.kw-row{display:grid;grid-template-columns:1fr 1fr 40px;gap:8px;align-items:center;padding:5px 6px;border-radius:6px;transition:background .1s}
.kw-row:hover{background:var(--gray-50)}
.kw-row input{background:transparent;border:1.5px solid transparent;transition:all .15s}
.kw-row input:first-child{border-left:2.5px solid var(--p)}
.kw-row input:hover{border-color:var(--gray-200)}
.kw-row input:focus{border-color:var(--p);background:var(--white)}

/* ─── PREVIEW ─────────────────────────────────────── */
.preview-shell{max-width:800px}
.prev-topbar{
  background:var(--pd);border-radius:var(--radius) var(--radius) 0 0;
  padding:28px 32px;color:#fff;position:relative;overflow:hidden;
}
.prev-topbar::after{
  content:'';position:absolute;right:-40px;top:-40px;
  width:220px;height:220px;border-radius:50%;
  background:rgba(255,255,255,.04);
}
.prev-dept{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.prev-title{font-family:var(--fh);font-size:26px;font-weight:800;line-height:1.15;margin-bottom:8px}
.prev-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.prev-chip{background:rgba(255,255,255,.12);border-radius:99px;padding:3px 10px;font-size:11px;font-weight:500}
.prev-obj{background:rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;font-size:12.5px;line-height:1.6}
.prev-stripe{height:3px;background:var(--p)}
.prev-body{background:var(--white);padding:24px 32px;border-radius:0 0 var(--radius) var(--radius);box-shadow:var(--shadow-lg)}
.prev-phase-list{display:flex;flex-direction:column;gap:10px}
.prev-phase{border-radius:var(--radius-sm);overflow:hidden;border:1.5px solid var(--gray-200)}
.prev-ph-head{display:flex;align-items:center;gap:8px;padding:9px 14px;font-family:var(--fh);font-size:12px;font-weight:700}
.prev-ph-body{padding:12px 14px;font-size:12.5px;line-height:1.8;color:var(--gray-700);white-space:pre-wrap}
.prev-ph-empty{padding:10px 14px;font-size:12px;color:var(--gray-300);font-style:italic}

.prev-kw{margin-top:16px}
.prev-kw-head{padding:10px 14px;font-family:var(--fh);font-size:12px;font-weight:700;color:#fff;border-radius:8px 8px 0 0}
.prev-kw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;padding:12px;border:1.5px solid var(--gray-200);border-top:none;border-radius:0 0 8px 8px;background:var(--gray-50)}
.prev-kw-card{background:var(--white);border-radius:6px;padding:8px 10px;border:1.5px solid var(--gray-200)}
.prev-kw-word{font-weight:700;font-size:12px}
.prev-kw-def{font-size:11px;color:var(--gray-400);margin-top:2px}

/* ─── BOTTOM BAR ──────────────────────────────────── */
.btm{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(255,255,255,.96);backdrop-filter:blur(10px);
  border-top:1px solid var(--gray-200);
  padding:10px 24px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 -4px 16px rgba(0,0,0,.06);
}
.btm-left{display:flex;align-items:center;gap:8px}
.btm-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-400)}
.btm-dot{width:7px;height:7px;border-radius:50%;background:#22c55e}
.btm-topic{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--gray-900)}
.btm-right{display:flex;gap:8px;align-items:center}

/* ─── SECTION CARD ────────────────────────────────── */
.section-card{background:var(--white);border-radius:var(--radius);border:1.5px solid var(--gray-200);padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.section-card h3{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--gray-900);margin-bottom:4px}

}

.prev-title-slide{

}

.prev-shape-3{position:absolute;right:-40px;top:-20px;width:100px;height:340px;background:#c49fcc;opacity:.7;transform:rotate(20deg);transform-origin:top right}
.prev-shape-2{position:absolute;right:20px;top:-20px;width:90px;height:340px;transform:rotate(20deg);transform-origin:top right}
.prev-shape-1{position:absolute;right:90px;top:-20px;width:75px;height:340px;transform:rotate(20deg);transform-origin:top right}

}

}

}

}

.mwb-cameo{
  margin:14px 0 4px;

  border:2px solid #d1d5db;

}
.mwb-top{
  display:flex;align-items:center;justify-content:space-between;

}
.mwb-label{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;color:var(--gray-500);

}
.mwb-hint{font-size:11px;color:var(--gray-400);margin-left:8px}
.mwb-canvas{
  display:block;width:100%;height:auto;

             repeating-linear-gradient(90deg,transparent,transparent 27px,#f0edf7 28px),

}
.mwb-tools{

}

}

.mwb-size{

  transition:all .15s;flex-shrink:0;
}
.mwb-size:hover{border-color:var(--p)}
.mwb-size.active{border-color:var(--p);background:var(--pl)}
.mwb-sep{width:1px;height:20px;background:var(--gray-200);margin:0 2px;flex-shrink:0}
.mwb-erase{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:6px;cursor:pointer;
  font-size:11px;font-weight:600;color:var(--gray-500);
  border:1.5px solid var(--gray-200);background:var(--white);
  transition:all .15s;flex-shrink:0;
}
.mwb-erase:hover{border-color:var(--a);color:var(--a)}
.mwb-erase.active{border-color:var(--a);background:#fef2f2;color:var(--a)}
.mwb-clear-btn{
  font-size:11px;font-weight:600;color:var(--gray-400);

}

@media print{.mwb-cameo{display:none!important}}
@media print{
  .hdr,.sidebar,.btm{display:none!important}
  .shell{padding-top:0;display:block}
  .content{padding:0;overflow:visible}
  .prev-body{box-shadow:none}
}

/* --- EXAM BOARD SELECTOR --- */
.sb-board-row{display:flex;align-items:center;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.board-btn{padding:4px 8px;border-radius:99px;font-size:10px;font-weight:700;border:1.5px solid var(--gray-200);background:var(--white);color:var(--gray-500);cursor:pointer;transition:all .15s;white-space:nowrap}
.board-btn:hover{border-color:var(--p);color:var(--p)}
.board-btn.active{background:var(--p);border-color:var(--p);color:#fff}
/* --- PREVIEW TOOLBAR --- */
.preview-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:10px 14px;background:var(--white);border-radius:var(--radius);border:1.5px solid var(--gray-200);box-shadow:var(--shadow-sm)}
.eb-badge{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;font-size:10px;font-weight:800;letter-spacing:.6px;padding:3px 10px;border-radius:99px;white-space:nowrap}
.answer-toggle-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
/* --- TOGGLE SWITCH --- */
.toggle-switch{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;cursor:pointer;background:#d1d5db;border-radius:99px;transition:.2s}
.toggle-slider::before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle-switch input:checked+.toggle-slider{background:var(--p)}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(16px)}
.prev-ph-hidden{padding:10px 14px;font-size:12px;background:#fafafa;border-top:1px dashed #e5e7eb}
/* --- MOBILE HAMBURGER --- */
.hamburger-btn{display:none;background:transparent;border:none;cursor:pointer;padding:6px;border-radius:6px;margin-left:8px;transition:background .15s;flex-shrink:0}
.hamburger-btn:hover{background:rgba(255,255,255,.1)}
@media(max-width:768px){
  .hamburger-btn{display:flex;align-items:center;justify-content:center}
  .nav-item{padding:0 8px;font-size:11px}

}

.ai-provider-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;max-width:600px}

.ai-inst-title{font-family:var(--fh);font-size:12px;font-weight:700;color:var(--gray-700);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.ai-inst-steps{padding-left:18px;font-size:13px;color:var(--gray-700);line-height:1.8}

.ai-status-bar{
  display:flex;align-items:center;gap:8px;

}

  text-decoration:underline;
}

<div id="root"></div>

<script>
// ===================================================
// API KEY CONFIGURATION
// ===================================================
// OPTION A: Leave this empty ('') - teachers paste their own key in AI Setup tab
// OPTION B: Paste a shared Claude API key here to pre-load it for all staff
//           Format: 'sk-ant-api03-...'

function getHue(h){var r=parseInt(h.slice(1,3),16)/255,g=parseInt(h.slice(3,5),16)/255,b=parseInt(h.slice(5,7),16)/255,mx=Math.max(r,g,b),mn=Math.min(r,g,b);if(mx===mn)return 0;var hv;if(mx===r)hv=(g-b)/(mx-mn)%6;else if(mx===g)hv=(b-r)/(mx-mn)+2;else hv=(r-g)/(mx-mn)+4;return hv*60}
function hexLum(h){var r=parseInt(h.slice(1,3),16)/255,g=parseInt(h.slice(3,5),16)/255,b=parseInt(h.slice(5,7),16)/255;return .2126*r+.7152*g+.0722*b}
async function extractTheme(file){
  try{
    var zip=await JSZip.loadAsync(file),themeXml='',slideXmls=[];
    for(var n of Object.keys(zip.files)){
      if(/ppt\/theme\/theme1\.xml/.test(n))themeXml=await zip.files[n].async('text');
      if(/ppt\/slides\/slide\d+\.xml/.test(n)&&slideXmls.length<6)slideXmls.push(await zip.files[n].async('text'));
    }
    var all=themeXml+slideXmls.join(''),re=/srgbClr\s+val="([0-9A-Fa-f]{6})"/g,counts={},m;
    while((m=re.exec(all))!==null){var c='#'+m[1].toUpperCase();counts[c]=(counts[c]||0)+1}
    var tc={},tr=/<a:(dk1|dk2|lt1|lt2|accent1|accent2|accent3|accent4)[^>]*>[\s\S]*?srgbClr\s+val="([0-9A-Fa-f]{6})"/g;
    while((m=tr.exec(themeXml))!==null)tc[m[1]]='#'+m[2].toUpperCase();
    var sorted=Object.entries(counts).filter(e=>!['#FFFFFF','#000000','#FEFEFE'].includes(e[0])).sort((a,b)=>b[1]-a[1]);
    var chromatic=sorted.filter(e=>{var r2=parseInt(e[0].slice(1,3),16),g2=parseInt(e[0].slice(3,5),16),b2=parseInt(e[0].slice(5,7),16),mx=Math.max(r2,g2,b2),mn=Math.min(r2,g2,b2);return mx>0&&(mx-mn)/mx>.2});
    var primary=tc.accent1||(chromatic[0]&&chromatic[0][0])||'#92278F';
    var primaryDark=tc.dk1||(chromatic[1]&&chromatic[1][0])||'#632E62';
    var primaryLight='#F0E8F0';
    for(var i=0;i<sorted.length;i++){if(hexLum(sorted[i][0])>.7&&sorted[i][0]!=='#FFFFFF'){primaryLight=sorted[i][0];break}}
    var accent='#e94560',accent2='#FFC000',ph=getHue(primary);
    for(var j=0;j<chromatic.length;j++){var c2=chromatic[j][0];if(c2===primary||c2===primaryDark)continue;var h2=getHue(c2),d=Math.min(Math.abs(h2-ph),360-Math.abs(h2-ph));if(d>60){if(accent==='#e94560')accent=c2;else if(accent2==='#FFC000'&&c2!==accent){accent2=c2;break}}}
    if(tc.accent2)accent=tc.accent2;if(tc.accent3)accent2=tc.accent3;
    return{loaded:true,filename:file.name,primary,primaryDark,primaryLight,accent,accent2};
  }catch(e){console.error(e);return null}
}

async function callAI(sys,usr){
  if(S.aiProvider==='copilot'){
    return await callCopilot(sys,usr);
  } else {
    return await callClaude(sys,usr);
  }
}

async function callClaude(sys,usr){
  const key=S.claudeKey||LESSONCRAFT_API_KEY||'';
  if(!key)throw new Error('No Claude API key set. Go to the AI Setup tab and paste your key.');
  const headers={'Content-Type':'application/json','x-api-key':key,'anthropic-dangerous-direct-browser-access':'true'};
  const body={model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:[{role:'user',content:usr}]};
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers,body:JSON.stringify(body)});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
  return d.content[0].text;
}

async function callCopilot(sys,usr){
  // Azure OpenAI / Copilot Studio endpoint
  // Teachers paste their Azure OpenAI endpoint + key from IT
  const endpoint=S.copilotEndpoint;
  const key=S.copilotKey;
  if(!endpoint||!key)throw new Error('Copilot endpoint and key are required. See the AI Setup tab.');
  // Azure OpenAI Chat Completions format
  const url=endpoint.replace(/\/$/,'')+(endpoint.includes('/chat/completions')?'':'/chat/completions?api-version=2024-02-15-preview');
  const body={
    messages:[
      {role:'system',content:sys},
      {role:'user',content:usr}
    ],
    max_tokens:1000,
    temperature:0.7
  };
  const r=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json','api-key':key},
    body:JSON.stringify(body)
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
  if(!d.choices||!d.choices[0])throw new Error('No response from Copilot. Check your endpoint URL and key.');
  return d.choices[0].message.content;
}

async function generatePhase(id, isImprovement=false){
  const ph=S.phases[id];
  const prevContent=ph.content;
  ph.generating=true;ph.generated=false;render();
  const topic=S.topic||'this topic',subject=S.subject||'Maths',year=S.year||'secondary';
  const ws=S.worksheetBase64?'\n\nA worksheet has been uploaded -- match its question style, difficulty and number complexity.':'';
  const prev=isImprovement&&prevContent?`\n\nPrevious version (improve on this):\n${prevContent}`:'';
  const sys=`You are an expert ${subject} teacher creating GCSE-aligned lesson content for Year ${year} UK secondary students.\nTopic: ${topic}${ws}${prev}\nRespond ONLY with valid JSON. No markdown, no preamble, no explanation.`;
  let prompt='',parse=null;
  if(id==='prior'){
    prompt=`Activating prior knowledge for "${topic}". JSON: {"title":"string","items":["question 1","question 2","question 3"]}. Items should probe prerequisite knowledge.`;
    parse=d=>{ph.content=(d.items||[]).map((x,i)=>(i+1)+'. '+x).join('\n')};
  }else if(id==='newknow'){
    prompt=`New knowledge content for "${topic}". JSON: {"title":"string","points":["key fact 1","key fact 2","key fact 3","key fact 4"],"formula":"the key formula or rule, or empty string"}`;
    parse=d=>{ph.content=(d.points||[]).join('\n')+(d.formula?'\n\nKey formula: '+d.formula:'')};
  }else if(id==='ido'){
    prompt=`2 teacher-modelled worked examples for "${topic}". JSON: {"title":"string","examples":[{"question":"concrete question with specific numbers","solution":"clear step-by-step working"},{"question":"...","solution":"..."}]}`;
    parse=d=>{ph.content=(d.examples||[]).map((e,i)=>'Ex '+(i+1)+': '+e.question+'\nSolution: '+e.solution).join('\n\n')};
  }else if(id==='guided'){
    prompt=`2 guided practice questions for "${topic}" (We Do, with teacher support). JSON: {"questions":[{"question":"real-world word problem","solution":"full answer with working","image_desc":"brief diagram description or empty string"},{"question":"...","solution":"...","image_desc":""}]}`;
    parse=d=>{ph.content=(d.questions||[]).map((q,i)=>'Q'+(i+1)+': '+q.question+'\nAnswer: '+q.solution).join('\n\n')};
  }else if(id==='independent'){
    prompt=`4 independent practice questions for "${topic}" (You Do, no teacher). JSON: {"questions":[{"question":"..."},{"question":"..."},{"question":"..."},{"question":"..."}]}. Mix: 2 routine, 1 applied/real-world, 1 challenging exam-style. No solutions.`;
    parse=d=>{ph.content=(d.questions||[]).map((q,i)=>(i+1)+'. '+q.question).join('\n')};
  }else if(id==='reflect'){
    prompt=`Reflect & respond for "${topic}". JSON: {"prompt":"exit ticket question for students to answer","items":["reflection point 1","reflection point 2","reflection point 3","I can... success statement"]}`;
    parse=d=>{ph.content='Exit ticket: '+d.prompt+'\n\n'+(d.items||[]).map(x=>'\u2022 '+x).join('\n')};
  }
  // Try up to 2 times silently
  for(let attempt=0;attempt<2;attempt++){
    try{
      const raw=await callAI(sys,prompt);
      const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
      if(parse)parse(parsed);
      ph.parsed=parsed;ph.generated=true;
      ph.generating=false;saveState();render();return;
    }catch(e){
      if(attempt===1){
        // Both attempts failed -- show friendly message, keep previous content if any
        ph.content=prevContent||'';
        ph.generated=!!prevContent;
        showToast('Generation failed -- try again','error');
      }
    }
  }
  ph.generating=false;saveState();render();
}

async function generateAll(){
  if(!S.topic){showToast('Add a topic first','error');return}
  S.generatingAll=true;S.genSteps=PHASES.map(p=>({id:p.id,label:p.label,status:'pending'}));
  S.tab='build';S.open={prior:false,newknow:false,ido:false,guided:false,independent:false,reflect:false};
  render();
  for(var i=0;i<S.genSteps.length;i++){
    S.genSteps[i].status='active';render();
    await generatePhase(S.genSteps[i].id);
    S.genSteps[i].status='done';render();
  }
  S.generatingAll=false;
  PHASES.forEach(p=>{S.open[p.id]=true;});
  render();
  showToast('Lesson ready!','success');
}

    parse=function(d){ph.content=d.question+'\n\nModel Answer:\n'+(d.steps||[]).join('\n')+'\n\nFinal answer: '+d.finalAnswer;};
  } else if(id==='marksch'){
    prompt='Write an examiner-style mark scheme for a 6-mark question on "'+topic+'" (Year '+year+' GCSE). JSON: {"question":"the question [6 marks]","marks":[{"point":"mark point 1","ao":"AO1","accept":"acceptable alternatives"},{"point":"...","ao":"AO2","accept":"..."},{"point":"...","ao":"AO2","accept":"..."},{"point":"...","ao":"AO3","accept":"..."},{"point":"...","ao":"AO3","accept":"..."},{"point":"...","ao":"AO3","accept":"..."}]}';
    parse=function(d){ph.content=d.question+'\n\nMark Scheme:\n'+(d.marks||[]).map(function(m,i){return '['+m.ao+'] '+m.point+'\n  Accept: '+m.accept;}).join('\n');};
  } else if(id==='drillqs'){
    prompt='Write 6 short drill questions on "'+topic+'" for Year '+year+' GCSE -- same skill, varied numbers/context. Students self-mark. JSON: {"skill":"what skill is being drilled","questions":[{"q":"question","a":"answer"},{"q":"...","a":"..."},{"q":"...","a":"..."},{"q":"...","a":"..."},{"q":"...","a":"..."},{"q":"...","a":"..."}]}';
    parse=function(d){ph.content='Drill: '+d.skill+'\n\n'+(d.questions||[]).map(function(q,i){return (i+1)+'. '+q.q+'\n   Answer: '+q.a;}).join('\n');};
  } else if(id==='examtips'){
    prompt='Write examiner tips for "'+topic+'" for Year '+year+' GCSE students. JSON: {"commonErrors":["mistake 1","mistake 2","mistake 3"],"howToGainMarks":["tip 1","tip 2","tip 3"],"keyWords":["keyword 1","keyword 2","keyword 3"]}';
    parse=function(d){ph.content='Common mistakes:\n'+(d.commonErrors||[]).map(function(e){return '- '+e;}).join('\n')+'\n\nHow to gain marks:\n'+(d.howToGainMarks||[]).map(function(t){return '- '+t;}).join('\n')+'\n\nKey words to use:\n'+(d.keyWords||[]).map(function(k){return '- '+k;}).join('\n');};
  }

// Toast notification
function showToast(msg,type){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:80px;right:20px;z-index:9999;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;font-family:Inter,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:fadeIn .2s ease;'+(type==='success'?'background:#dcfce7;color:#15803d;border:1.5px solid #86efac':'background:#fef2f2;color:#dc2626;border:1.5px solid #fca5a5');
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.style.opacity='0',2200);setTimeout(()=>t.remove(),2600);
}

async function buildAndDownloadPPTX(){
  if(!window.PptxGenJS){
    const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js';
    document.head.appendChild(s);await new Promise(r=>{s.onload=r});
  }
  const t=S.theme,pres=new PptxGenJS();
  pres.layout='LAYOUT_16x9';
  const P=t.primary.replace('#',''),PD=t.primaryDark.replace('#',''),A2=t.accent2.replace('#','');
  function bg(sl){
    sl.background={color:'FFFFFF'};
    sl.addShape(pres.ShapeType.rect,{x:0,y:0,w:10,h:.45,fill:{color:PD},line:{color:PD,width:0}});
    sl.addShape(pres.ShapeType.rect,{x:0,y:5.18,w:10,h:.45,fill:{color:PD},line:{color:PD,width:0}});
    sl.addShape(pres.ShapeType.rect,{x:0,y:.45,w:.07,h:4.73,fill:{color:P},line:{color:P,width:0}});
    sl.addShape(pres.ShapeType.ellipse,{x:8.2,y:3.3,w:2.8,h:2.8,fill:{color:P,transparency:88},line:{color:P,transparency:80}});
  }
  function tag(sl,lbl,col){
    sl.addShape(pres.ShapeType.rect,{x:.12,y:.5,w:2.2,h:.3,fill:{color:col.replace('#','')},line:{color:col.replace('#',''),width:0}});
    sl.addText(lbl,{x:.12,y:.5,w:2.2,h:.3,fontSize:8,bold:true,color:'FFFFFF',align:'center',valign:'middle',margin:0});
  }
  // Slide 1 -- Title (matches school template)
  {
    const sl=pres.addSlide();
    sl.background={color:'FFFFFF'};

// ===================================================
// DOM HELPERS
// ===================================================
function el(tag,attrs){
  const e=document.createElement(tag);
  if(attrs)for(const k in attrs){
    if(k==='class')e.className=attrs[k];
    else if(k==='html')e.innerHTML=attrs[k];
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  }
  for(let i=2;i<arguments.length;i++){
    const c=arguments[i];if(c==null)continue;
    if(typeof c==='string')e.appendChild(document.createTextNode(c));
    else if(Array.isArray(c))c.forEach(x=>{if(x!=null)e.appendChild(typeof x==='string'?document.createTextNode(x):x)});
    else e.appendChild(c);
  }
  return e;
}
function div(cls,children){const d=el('div',{'class':cls});(Array.isArray(children)?children:[children]).forEach(c=>{if(c)d.appendChild(typeof c==='string'?document.createTextNode(c):c)});return d}
function applyCSS(t){
  const s=document.getElementById('theme-css');
  if(s)s.textContent=':root{--p:'+t.primary+';--pd:'+t.primaryDark+';--pl:'+t.primaryLight+';--a:'+t.accent+';--a2:'+t.accent2+';}';
}

// ===================================================
// RENDER
// ===================================================
function render(){
  applyCSS(S.theme);
  const root=document.getElementById('root');
  root.innerHTML='';
  root.appendChild(buildHeader());
  const shell=el('div',{'class':'shell'});
  shell.appendChild(buildSidebar());
  // Mobile overlay to close sidebar on tap
  if(!S.sidebarOpen){
    // sidebar closed, no overlay needed
  } else {
    const overlay=el('div',{'class':'sidebar-overlay'});
    overlay.style.display='none'; // hidden by default, CSS shows on mobile
    overlay.addEventListener('click',()=>{S.sidebarOpen=false;render();});
    shell.appendChild(overlay);
  }
  const content=el('div',{'class':'content'});
  if(S.tab==='aisetup')content.appendChild(buildAISetupTab());
  else if(S.tab==='theme')content.appendChild(buildThemeTab());
  else if(S.tab==='build')content.appendChild(buildBuildTab());
  else if(S.tab==='keywords')content.appendChild(buildKwTab());
  else content.appendChild(buildPreviewTab());
  shell.appendChild(content);
  root.appendChild(shell);
  root.appendChild(buildBottomBar());
  saveState();
}

// --- HEADER --------------------------------------
function buildHeader(){
  const h=el('div',{'class':'hdr'});
  // Logo
  const logo=el('div',{'class':'hdr-logo'});
  logo.innerHTML=`<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect width="22" height="22" rx="6" fill="rgba(255,255,255,0.15)"/><path d="M6 16L10 7l4 9M7.5 13h5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  logo.appendChild(document.createTextNode(' LessonCraft'));
  logo.appendChild(el('span',{'class':'logo-pill'},'AI'));
  h.appendChild(logo);
  // Nav
  const nav=el('div',{'class':'hdr-nav'});
  const tabs=[['aisetup','⚙ AI Setup'],['theme','Theme'],['build','Build'],['keywords','Keywords'],['preview','Preview']];
  tabs.forEach(([id,lbl],i)=>{
    const done=id!=='theme'&&(
      (id==='build'&&PHASES.some(p=>S.phases[p.id].generated))||
      (id==='keywords'&&S.keywords.some(k=>k.word))||
      (id==='preview'&&false)
    );
    const active=S.tab===id;
    const item=el('div',{'class':'nav-item'+(active?' active':done?' done':'')});
    item.appendChild(el('span',{'class':'nav-num'},String(i+1)));
    item.appendChild(document.createTextNode(lbl));
    item.addEventListener('click',()=>{S.tab=id;render()});
    nav.appendChild(item);
  });
  h.appendChild(nav);
  // Right
  // Mobile hamburger
  const hamburger=el('button',{'class':'hamburger-btn'});
  hamburger.innerHTML='<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>';
  hamburger.addEventListener('click',()=>{S.sidebarOpen=!S.sidebarOpen;render();});
  h.appendChild(hamburger);

  if(S.theme.loaded||S.topic){
    const right=el('div',{'class':'hdr-right'});
    if(S.theme.loaded){
      const pill=el('div',{'class':'hdr-theme-pill'});
      pill.appendChild(el('div',{'class':'theme-dot','style':'background:'+S.theme.primary}));
      pill.appendChild(document.createTextNode(S.theme.filename.replace('.pptx','').slice(0,20)));
      right.appendChild(pill);
    }
    h.appendChild(right);
  }
  return h;
}

  setTimeout(()=>{const b=document.getElementById('ai-cfg-btn');if(b)b.onclick=function(){S.tab='aisetup';render();};},0);

  // -- Exam board selector (shown in advanced or always) --
  const boardWrap=el('div',{'class':'sb-board-row'});

    var b=el('button',{'class':'board-btn'+(S.examBoard===board?' active':'')});

  // -- Mode Switcher --
  const modeSwitcher=el('div',{'class':'mode-switcher'});
  [{id:'lesson',icon:'📖',label:'Lesson',sub:'Full lesson structure'},{id:'exam',icon:'🎯',label:'Exam Focus',sub:'Y11 exam practice'}].forEach(m=>{

  } else {

  }
  scroll.appendChild(themeRow);

  // -- Clear session --
  const clearBtn=el('button',{'class':'sb-clear-btn'});
  clearBtn.textContent='Start new lesson';

    if(confirm('Clear everything and start fresh?')){

    sw.addEventListener('input',e=>{tx.value=e.target.value;S.theme[f.key]=e.target.value;S.theme.loaded=true;applyCSS(S.theme)});
    tx.addEventListener('change',e=>{if(/^#[0-9A-Fa-f]{6}$/.test(e.target.value)){sw.value=e.target.value;S.theme[f.key]=e.target.value;S.theme.loaded=true;applyCSS(S.theme)}});
    row.appendChild(sw);row.appendChild(tx);field.appendChild(row);cg.appendChild(field);
  });
  mc.appendChild(cg);
  const ab=el('button',{'class':'btn btn-primary'});ab.textContent='Apply colours';
  ab.addEventListener('click',()=>{S.theme.loaded=true;applyCSS(S.theme);render();showToast('Theme applied v','success')});
  mc.appendChild(ab);d.appendChild(mc);
  return d;
}

// --- BUILD TAB -----------------------------------
function buildBuildTab(){
  const d=el('div',{});
  const isExam=S.mode==='exam';
  const activePhases=isExam?EXAM_PHASES:PHASES;
  const anyDone=activePhases.some(p=>S.phases[p.id]&&S.phases[p.id].generated);

  // Empty state
  if(!anyDone&&!S.generatingAll){
    const empty=el('div',{'class':'empty-screen'});
    if(isExam){
      empty.innerHTML='<div class="exam-empty-badge">🎯 EXAM FOCUS</div>'+
        '<div class="empty-icon" style="margin-top:10px">📝</div>'+
        '<h2 class="empty-title">'+(S.topic||'Year 11 Exam Prep')+'</h2>'+
        '<p class="empty-sub">'+(S.topic?'Click <strong>Generate Exam Pack</strong> to build a full exam-style practice set instantly.':'Enter a topic, then click <strong>Generate Exam Pack</strong>. Optionally upload revision notes.')+'</p>'+
        '<div class="exam-feature-list">'+
        EXAM_PHASES.map(p=>'<div class="exam-feature-item" style="border-left:3px solid '+p.col+'"><span>'+p.icon+'</span><div><div style="font-weight:700;font-size:12px;color:'+p.col+'">'+p.label+'</div><div style="font-size:11px;color:var(--gray-400)">'+p.sub+'</div></div></div>').join('')+
        '</div>';
    } else {
      empty.innerHTML='<div class="empty-icon">✨</div>'+
        '<h2 class="empty-title">'+(S.topic||'Ready to build')+'</h2>'+
        '<p class="empty-sub">'+(S.topic?'Click <strong>Quick Start Lesson</strong> in the sidebar to generate your lesson instantly.':'Enter a topic in the sidebar, then click <strong>Quick Start Lesson</strong>.')+'</p>'+
        '<div class="empty-phases">'+
        PHASES.map(p=>'<div class="empty-phase-chip" style="border-color:'+p.col+'20;background:'+p.bg+'"><span>'+p.icon+'</span><span style="font-size:11px;color:'+p.col+';font-weight:600;">'+p.label+'</span></div>').join('')+
        '</div>';
    }
    d.appendChild(empty);
    return d;
  }

  // Header
  if(S.topic){
    const hdr=el('div',{'class':'build-header'+(isExam?' build-header-exam':'')});
    const htxt=el('div',{});
    const titleRow=el('div',{'style':'display:flex;align-items:center;gap:10px;'});
    if(isExam)titleRow.appendChild(el('span',{'class':'exam-mode-badge'},'🎯 EXAM FOCUS'));
    titleRow.appendChild(el('h1',{'class':'build-title'},S.topic));
    htxt.appendChild(titleRow);
    if(S.subject||S.year){
      htxt.appendChild(el('div',{'class':'build-meta'},([S.subject,S.year?'Year '+S.year:'',isExam?'GCSE Exam Prep':'',S.duration?S.duration+' min':'']).filter(Boolean).join(' | ')));
    }
    hdr.appendChild(htxt);
    const expBtn=el('button',{'class':'export-hero-btn'+(isExam?' export-hero-btn-exam':'')});
    expBtn.innerHTML=`<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M5 7l3 3 3-3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> ${isExam?'Download Exam Pack':'Download PPTX'}`;
    expBtn.addEventListener('click',async()=>{
      expBtn.disabled=true;expBtn.textContent='Building...';
      try{await buildAndDownloadPPTX();showToast('Downloaded v','success')}
      catch(e){showToast('Error: '+e.message,'error')}
      expBtn.disabled=false;expBtn.innerHTML=`<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M5 7l3 3 3-3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> ${isExam?'Download Exam Pack':'Download PPTX'}`;
    });
    hdr.appendChild(expBtn);
    d.appendChild(hdr);
  }

  // Generation progress
  if(S.generatingAll&&S.genSteps.length){
    const gp=el('div',{'class':'gen-progress-card'+(isExam?' gen-progress-exam':'')});
    const gtitle=el('div',{'class':'gen-progress-title'});
    gtitle.innerHTML=`<span class="spinner" style="width:16px;height:16px;"></span> ${isExam?'Building exam pack...':'Building your lesson...'}`;
    gp.appendChild(gtitle);
    const steps=el('div',{'class':'gen-steps'});
    S.genSteps.forEach(s=>{
      const phase=activePhases.find(p=>p.id===s.id);if(!phase)return;
      const step=el('div',{'class':'gen-step '+s.status});
      const dot=el('div',{'class':'gen-step-dot '+s.status});
      dot.textContent=s.status==='done'?'v':s.status==='active'?'...':'·';
      step.appendChild(dot);
      step.appendChild(el('div',{'class':'gen-step-label'},phase.icon+' '+s.label));
      if(s.status==='done'){
        const tags=isExam?EXAM_QUALITY_TAGS:QUALITY_TAGS;
        step.appendChild(el('span',{'class':'gen-step-tag'},(tags[s.id]&&tags[s.id][0])||''));
      }
      steps.appendChild(step);
    });
    gp.appendChild(steps);d.appendChild(gp);
  }

  const phases=el('div',{'class':'phases'});
  activePhases.forEach(p=>phases.appendChild(buildPhaseCard(p,isExam)));
  d.appendChild(phases);
  return d;
}

function buildPhaseCard(phase, isExam=false){
  const ph=S.phases[phase.id];
  const isOpen=S.open[phase.id];
  const card=el('div',{'class':'pcard'+(isOpen?' open':'')+(ph.generated&&!isOpen?' generated':'')});

  // Head -- click to collapse only (content shown by default)
  const head=el('div',{'class':'phead'});
  head.appendChild(el('div',{'class':'phase-color-bar','style':'background:'+phase.col}));
  const iconWrap=el('div',{'class':'phase-icon-wrap','style':'background:'+phase.bg});
  iconWrap.textContent=phase.icon;
  head.appendChild(iconWrap);
  const txt=el('div',{'class':'phase-text'});
  txt.appendChild(el('div',{'class':'phase-label'},phase.label));
  txt.appendChild(el('div',{'class':'phase-sub'},phase.sub));
  head.appendChild(txt);

  const meta=el('div',{'class':'phase-meta'});
  // Quality tags
  if(ph.generated&&!ph.generating){
    const tagSet=isExam?EXAM_QUALITY_TAGS:QUALITY_TAGS;
    const tags=(tagSet[phase.id]||[]);
    tags.slice(0,2).forEach(tag=>{
      meta.appendChild(el('span',{'class':'quality-tag'},tag));
    });
  }
  if(ph.generating){
    const pill=el('div',{'class':'status-pill generating'});
    pill.innerHTML='<span class="spinner" style="width:10px;height:10px;border-width:1.5px;"></span>';
    meta.appendChild(pill);
  }
  meta.appendChild(el('div',{'class':'chev'+(isOpen?' open':'')},'⌄'));
  head.appendChild(meta);
  head.addEventListener('click',()=>{S.open[phase.id]=!S.open[phase.id];render()});
  card.appendChild(head);

  if(isOpen){
    const body=el('div',{'class':'pbody'});
    const inner=el('div',{'class':'pbody-inner'});

    if(ph.generating){
      const ag=el('div',{'class':'ai-generating'});
      ag.innerHTML=`<div class="spinner"></div><div><div style="font-size:13px;font-weight:600;color:var(--p);">Writing ${phase.label}...</div><div style="font-size:11px;color:var(--gray-400);margin-top:2px;">Takes a few seconds</div></div>`;
      inner.appendChild(ag);
    } else if(ph.generated){
      // Content display -- prominent
      const contentWrap=el('div',{'class':'phase-content-wrap'});
      const ta=el('textarea',{'class':'phase-textarea','rows':'6'});
      ta.value=ph.content||'';
      ta.addEventListener('input',e=>{S.phases[phase.id].content=e.target.value;saveState()});
      contentWrap.appendChild(ta);
      inner.appendChild(contentWrap);

      // Micro-actions toolbar
      const toolbar=el('div',{'class':'phase-toolbar'});
      const genFn=isExam?generateExamPhase:generatePhase;
      const regenBtn=el('button',{'class':'phase-action-btn'});
      regenBtn.innerHTML='🔄 Regenerate';
      regenBtn.addEventListener('click',e=>{e.stopPropagation();genFn(phase.id,false)});
      const improveBtn=el('button',{'class':'phase-action-btn'});
      improveBtn.innerHTML='✨ Improve this';
      improveBtn.addEventListener('click',e=>{e.stopPropagation();genFn(phase.id,true)});
      toolbar.appendChild(regenBtn);
      toolbar.appendChild(improveBtn);
      // Harder for question phases
      const hardPhases=isExam?['examqs','drillqs']:['guided','independent','ido'];
      if(hardPhases.includes(phase.id)){
        const hardBtn=el('button',{'class':'phase-action-btn'});
        hardBtn.innerHTML='📈 Make harder';
        hardBtn.addEventListener('click',e=>{
          e.stopPropagation();
          S.phases[phase.id].content+='\n\n[Request: make questions harder]';
          genFn(phase.id,true);
        });
        toolbar.appendChild(hardBtn);
      }
      // Extra exam-only action: add more questions
      if(isExam&&['examqs','drillqs'].includes(phase.id)){
        const moreBtn=el('button',{'class':'phase-action-btn'});
        moreBtn.innerHTML='➕ More questions';
        moreBtn.addEventListener('click',e=>{
          e.stopPropagation();
          S.phases[phase.id].content+='\n\n[Request: add 3 more similar questions]';
          genFn(phase.id,true);
        });
        toolbar.appendChild(moreBtn);
      }
      inner.appendChild(toolbar);

      // MWB cameo for I Do and Guided Practice
      if(phase.id==='ido'||phase.id==='guided'){
        inner.appendChild(buildMWB(phase.id));
      }
    } else {
      // Not yet generated
      inner.appendChild(el('div',{'class':'phase-hint'},phase.hint));
      const genBtn=el('button',{'class':'btn btn-primary btn-sm'});
      genBtn.innerHTML='✨ Generate this phase';
      genBtn.addEventListener('click',e=>{e.stopPropagation();if(!S.topic){showToast('Add a topic first','error');return}isExam?generateExamPhase(phase.id,false):generatePhase(phase.id,false)});
      inner.appendChild(genBtn);
      const ta=el('textarea',{'placeholder':'Or write manually...','rows':'3','style':'margin-top:10px;'});
      ta.value='';
      ta.addEventListener('input',e=>{S.phases[phase.id].content=e.target.value;S.phases[phase.id].generated=!!e.target.value;saveState()});
      inner.appendChild(ta);
    }

    body.appendChild(inner);card.appendChild(body);
  }
  return card;
}

// -- MWB builder (extracted for reuse) --
function buildMWB(phaseId){
  const mwbKey='mwb_'+phaseId;

// FEATURE: SHARE LESSON (URL-based)
// ===================================================
function shareLesson(){
  try{
    const snap={
      topic:S.topic,subject:S.subject,year:S.year,mode:S.mode,examBoard:S.examBoard,
      phases:Object.fromEntries(Object.entries(S.phases).map(([k,v])=>[k,{content:v.content,generated:v.generated}])),
      keywords:S.keywords,theme:{primary:S.theme.primary,primaryDark:S.theme.primaryDark,primaryLight:S.theme.primaryLight,accent:S.theme.accent,accent2:S.theme.accent2}
    };
    const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(snap))));
    const url=window.location.href.split('?')[0]+'?lesson='+encoded;
    if(navigator.share){
      navigator.share({title:'LessonCraft: '+S.topic,url:url});
    } else if(navigator.clipboard){
      navigator.clipboard.writeText(url).then(()=>showToast('Link copied to clipboard!','success'));
    } else {
      prompt('Copy this link to share your lesson:',url);
    }
  }catch(e){showToast('Could not create share link','error');}
}

function loadSharedLesson(){
  try{
    const params=new URLSearchParams(window.location.search);
    const encoded=params.get('lesson');
    if(!encoded)return;
    const snap=JSON.parse(decodeURIComponent(escape(atob(encoded))));
    if(snap.topic){
      S.topic=snap.topic||'';S.subject=snap.subject||'';S.year=snap.year||'';
      S.mode=snap.mode||'lesson';S.examBoard=snap.examBoard||'AQA';
      if(snap.phases){
        Object.entries(snap.phases).forEach(([k,v])=>{
          if(!S.phases[k])S.phases[k]={content:'',parsed:null,generated:false,generating:false};
          S.phases[k].content=v.content||'';S.phases[k].generated=v.generated||false;
        });
      }
      if(snap.keywords)S.keywords=snap.keywords;
      if(snap.theme){S.theme=Object.assign({},S.theme,snap.theme,{loaded:true,filename:'Shared'});}
      const activeP=S.mode==='exam'?EXAM_PHASES:PHASES;
      activeP.forEach(p=>{S.open[p.id]=S.phases[p.id]&&S.phases[p.id].generated;});
      S.tab='build';
      showToast('Shared lesson loaded!','success');
    }
  }catch(e){console.log('No shared lesson in URL');}
}

// FEATURE: STUDENT WORKSHEET DOWNLOAD
// ===================================================
function downloadWorksheet(){
  const t=S.theme;
  const isExam=S.mode==='exam';
  const activePhases=isExam?EXAM_PHASES:PHASES;
  // Only include question phases, strip all answers
  const questionPhases=isExam
    ?['warmup','examqs','drillqs']
    :['prior','newknow','independent'];
  const rows=activePhases.filter(p=>questionPhases.includes(p.id)).map(phase=>{
    const phState=S.phases[phase.id];
    if(!phState||!phState.content)return '';
    // Strip answer lines
    const clean=phState.content.split('\n')
      .filter(l=>!l.trim().startsWith('Answer:')&&!l.trim().startsWith('Solution:')&&!l.trim().startsWith('Final answer:'))
      .join('\n');
    return '<div style="margin-bottom:24px;page-break-inside:avoid;">'
      +'<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:'+phase.bg+';border-radius:6px 6px 0 0;border:1.5px solid '+phase.col+'33;">'
      +'<span>'+phase.icon+'</span><span style="font-family:Sora,sans-serif;font-size:13px;font-weight:700;color:'+phase.col+';">'+phase.label+'</span>'
      +'</div>'
      +'<div style="padding:14px 16px;border:1.5px solid '+phase.col+'22;border-top:none;border-radius:0 0 6px 6px;font-size:13px;line-height:1.9;white-space:pre-wrap;">'+clean+'</div>'
      +'</div>';
  }).join('');
  // Answer boxes for independent questions
  const answerRows=isExam?activePhases.filter(p=>['examqs'].includes(p.id)).map(phase=>{
    const phState=S.phases[phase.id];if(!phState||!phState.content)return '';
    const qs=phState.content.split('\n\n').filter(Boolean);
    return '<div style="margin-top:32px;"><div style="font-family:Sora,sans-serif;font-size:14px;font-weight:700;color:'+t.primaryDark+';margin-bottom:12px;border-bottom:2px solid '+t.primary+';padding-bottom:6px;">Working space</div>'
      +qs.map(()=>'<div style="border:1px solid #d1d5db;border-radius:6px;height:80px;margin-bottom:10px;"></div>').join('')+'</div>';
  }).join(''):'';

  const meta=[S.subject,S.year?'Year '+S.year:'',new Date().toLocaleDateString('en-GB'),S.examBoard].filter(Boolean).join(' | ');
  const html='<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">'
    +'<title>'+( S.topic||'Worksheet')+'</title>'
    +'<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">'
    +'<style>body{font-family:Inter,sans-serif;margin:0;padding:2.5cm;color:#1a1a2e;}'
    +'.header{border-bottom:3px solid '+t.primary+';padding-bottom:12px;margin-bottom:24px;}'
    +'.title{font-family:Sora,sans-serif;font-size:22px;font-weight:800;color:'+t.primaryDark+';}'
    +'.meta{font-size:11px;color:#6b7280;margin-top:4px;}'
    +'.name-box{display:flex;gap:32px;margin:16px 0 28px;}'
    +'.name-field{flex:1;border-bottom:1.5px solid #d1d5db;padding-bottom:4px;font-size:12px;color:#9ca3af;}'
    +'@media print{body{padding:1.5cm;}}</style></head><body>'
    +'<div class="header">'
    +'<div class="title">'+(S.topic||'Worksheet')+'</div>'
    +'<div class="meta">'+meta+'</div></div>'
    +'<div class="name-box">'
    +'<div class="name-field">Name: ___________________________</div>'
    +'<div class="name-field">Class: ________________</div>'
    +'<div class="name-field">Date: ________________</div>'
    +'</div>'
    +rows+answerRows
    +'</body></html>';
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(S.topic||'worksheet').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_-]/g,'')+'_worksheet.html';
  a.click();
  showToast('Worksheet downloaded -- open and print','success');
}

// --- INIT -----------------------------------------
const themeCSS=document.createElement('style');themeCSS.id='theme-css';document.head.appendChild(themeCSS);
applyCSS(S.theme);

// Open all phases that have content on load
PHASES.forEach(p=>{S.open[p.id]=S.phases[p.id].generated||false});
// Start on build tab if we have a topic
if(S.topic)S.tab='build';


loadSharedLesson();
render();
</script>
</body>
</html>
