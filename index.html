async function callAI(sys,usr){
  if(S.aiProvider==='copilot'){
    return await callCopilot(sys,usr);
  } else {
    return await callClaude(sys,usr);
  }
}

async function callClaude(sys,usr){
  const key=S.claudeKey||LESSONCRAFT_API_KEY||'';
  if(!key)throw new Error('No Claude API key set. Go to the AI Setup tab and paste your key.');
  const headers={
    'Content-Type':'application/json',
    'x-api-key':key,
    'anthropic-version':'2023-06-01',
    'anthropic-dangerous-direct-browser-access':'true'
  };
  const body={
    model:'claude-sonnet-4-20250514',
    max_tokens:1200,
    system:sys,
    messages:[{role:'user',content:usr}]
  };
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers,body:JSON.stringify(body)
    });
    if(!r.ok){
      var errBody=await r.json().catch(function(){return{};});
      throw new Error(errBody.error&&errBody.error.message?errBody.error.message:'HTTP '+r.status+': '+r.statusText);
    }
    const d=await r.json();
    if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
    return d.content[0].text;
  }catch(e){
    // Detect network/CORS block (common on school networks)
    var isNetworkError=e.message==='Failed to fetch'||e.message.includes('NetworkError')||e.message.includes('CORS')||e.message.includes('network')||e.name==='TypeError';
    if(isNetworkError){
      // Show a specific helpful message for school network blocks
      var msg='🏫 Network blocked by school firewall\n\n'
        +'Your school\'s IT filter is blocking the AI connection.\n\n'
        +'Quick fixes:\n'
        +'• Use your phone as a hotspot\n'
        +'• Ask IT to whitelist api.anthropic.com\n'
        +'• Switch to Microsoft Copilot in AI Setup\n'
        +'  (uses your school\'s existing Microsoft licence)\n\n'
        +'Technical detail: '+e.message;
      throw new Error(msg);
    }
    throw e;
  }
}

async function callCopilot(sys,usr){
  // Azure OpenAI / Copilot Studio endpoint
  // Teachers paste their Azure OpenAI endpoint + key from IT
  const endpoint=S.copilotEndpoint;
  const key=S.copilotKey;
  if(!endpoint||!key)throw new Error('Copilot endpoint and key are required. See the AI Setup tab.');
  // Azure OpenAI Chat Completions format
  const url=endpoint.replace(/\/$/,'')+(endpoint.includes('/chat/completions')?'':'/chat/completions?api-version=2024-02-15-preview');
  const body={
    messages:[
      {role:'system',content:sys},
      {role:'user',content:usr}
    ],
    max_tokens:1000,
    temperature:0.7
  };
  const r=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json','api-key':key},
    body:JSON.stringify(body)
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
  if(!d.choices||!d.choices[0])throw new Error('No response from Copilot. Check your endpoint URL and key.');
  return d.choices[0].message.content;
}

  var subject=S.subject||'Maths';
  var year=S.year||'secondary';
  var ws=getWorksheetContext();

  var mathsCtx=getMathsContext();
  var abilityNote=S.ability==='lower'?'Lower ability: simpler language, more scaffolding, concrete examples, shorter steps.':S.ability==='higher'?'Higher ability: technical vocabulary, multi-step problems, stretch and challenge.':'Mixed ability: accessible entry points plus stretch elements for all learners.';
  var boardNote={'AQA':'AQA command words and mark scheme style.','Edexcel':'Edexcel (Pearson) question style.','OCR':'OCR levels-based mark schemes.','WJEC':'WJEC/Eduqas band mark schemes.','CCEA':'CCEA Northern Ireland conventions.'}[S.examBoard]||'';
  var objNote=S.objectives?'\nLesson objectives: '+S.objectives:'';
  var sys='You are an expert '+subject+' teacher creating '+S.examBoard+'-aligned lesson content for Year '+year+' UK secondary students.\n'+boardNote+'\n'+abilityNote+'\n'+mathsCtx+objNote+ws+prev+'\nTopic: '+topic+'\nRespond ONLY with valid JSON. No markdown, no preamble.';

  var count=S.componentCounts&&S.componentCounts[id]?S.componentCounts[id]:5;
  var prompt='';var parse=null;

  if(id==='recall'){
    prompt='Generate '+count+' recall questions for "'+topic+'" testing previous learning (not this lesson). Short answers only. JSON: {"questions":["Q1 [1 mark]","Q2 [1 mark]",...]} — exactly '+count+' items.';
    parse=function(d){ph.content='Recall ('+count+' questions):\n'+(d.questions||[]).map(function(q,i){return(i+1)+'. '+q;}).join('\n');};
  } else if(id==='prior'){
    prompt='Activating prior knowledge for "'+topic+'". JSON: {"title":"string","questions":["question 1","question 2","question 3"]} — 3 questions probing prerequisite knowledge needed for this lesson.';
    parse=function(d){ph.content=(d.questions||[]).map(function(q,i){return(i+1)+'. '+q;}).join('\n');};
  } else if(id==='retrieval'){
    prompt='Spaced retrieval practice for "'+topic+'" — '+count+' questions mixing this topic with recent past topics. JSON: {"questions":["question","..."]} — exactly '+count+' items, mix of topics.';
    parse=function(d){ph.content='Retrieval practice:\n'+(d.questions||[]).map(function(q,i){return(i+1)+'. '+q;}).join('\n');};
  } else if(id==='newknow'){
    var mathsExtra=S.subjectMode==='maths'?' Include: key formula, worked visual (describe a bar model or ratio table if applicable), and the concrete-pictorial-abstract progression.':'';
    prompt='New knowledge content for "'+topic+'".'+mathsExtra+' JSON: {"title":"string","points":["key concept 1","key concept 2","key concept 3","key concept 4"],"formula":"key formula or rule (empty if not applicable)","cpa":{"concrete":"describe concrete manipulative or real-world object","pictorial":"describe a diagram, bar model or visual","abstract":"the formal symbolic rule"}}';
    parse=function(d){
      var lines=(d.points||[]).join('\n');
      if(d.formula)lines+='\n\nKey formula/rule: '+d.formula;
      if(d.cpa&&S.subjectMode==='maths'){
        lines+='\n\nConcrete: '+d.cpa.concrete;
        lines+='\nPictorial: '+d.cpa.pictorial;
        lines+='\nAbstract: '+d.cpa.abstract;
      }
      ph.content=lines;
    };
  } else if(id==='process'){
    prompt='Processing knowledge activity for "'+topic+'" — students make sense of new learning. JSON: {"activity":"description of a sorting, matching, connecting or explanation task","questions":["processing question 1","processing question 2"]}';
    parse=function(d){ph.content=d.activity+'\n\n'+(d.questions||[]).map(function(q,i){return(i+1)+'. '+q;}).join('\n');};
  } else if(id==='ido'){
    var mathsIdo=S.subjectMode==='maths'?' Use think-aloud narration. Show bar model or ratio table working where appropriate.':'';
    prompt='2 teacher-modelled worked examples for "'+topic+'".'+mathsIdo+' JSON: {"title":"string","examples":[{"question":"concrete question with specific numbers","solution":"clear step-by-step working with each step labelled","hint":"common mistake to avoid"},{"question":"...","solution":"...","hint":"..."}]}';
    parse=function(d){ph.content=(d.examples||[]).map(function(e,i){return'Ex '+(i+1)+': '+e.question+'\nSolution:\n'+e.solution+'\nWatch out: '+e.hint;}).join('\n\n');};
  } else if(id==='wedo'){
    prompt='We Do activity for "'+topic+'" — teacher and class work through together. JSON: {"task":"describe the task","steps":["Step 1: teacher does...","Step 2: ask class...","Step 3: students attempt..."],"questions":["class discussion question 1","class discussion question 2"]}';
    parse=function(d){ph.content='Task: '+d.task+'\n\n'+(d.steps||[]).join('\n')+'\n\nDiscussion:\n'+(d.questions||[]).map(function(q){return'- '+q;}).join('\n');};
  } else if(id==='youdo'){
    prompt='You Do — independent practice for "'+topic+'". No teacher support. JSON: {"questions":["question 1","question 2","question 3","question 4"]} — mix of difficulty, no solutions.';
    parse=function(d){ph.content=(d.questions||[]).map(function(q,i){return(i+1)+'. '+q;}).join('\n');};
  } else if(id==='guided'){
    var mathsGuided=S.subjectMode==='maths'?' Include a bar model or ratio table diagram description where appropriate.':'';
    prompt='2 guided practice questions for "'+topic+'".'+mathsGuided+' JSON: {"questions":[{"question":"real-world word problem","solution":"full working","hint":"sentence stem or scaffold to start"},{"question":"...","solution":"...","hint":"..."}]}';
    parse=function(d){ph.content=(d.questions||[]).map(function(q,i){return'Q'+(i+1)+': '+q.question+'\nScaffold: '+q.hint+'\nAnswer: '+q.solution;}).join('\n\n');};
  } else if(id==='independent'){
    prompt='4 independent practice questions for "'+topic+'". JSON: {"questions":[{"question":"...","difficulty":"routine"},{"question":"...","difficulty":"routine"},{"question":"...","difficulty":"applied"},{"question":"...","difficulty":"challenge"}]}. No solutions.';
    parse=function(d){ph.content=(d.questions||[]).map(function(q,i){return(i+1)+'. ['+q.difficulty+'] '+q.question;}).join('\n');};
  } else if(id==='reflect'){
    prompt='Reflect and respond for "'+topic+'". JSON: {"exitTicket":"one short question students answer on mini-whiteboard or paper","iCan":"I can... success statement","deeperQs":["deeper discussion question 1","deeper discussion question 2"],"commonErrors":["misconception to address 1"]}';
    parse=function(d){ph.content='Exit ticket: '+d.exitTicket+'\n\n'+d.iCan+'\n\nDeeper questions:\n'+(d.deeperQs||[]).map(function(q){return'- '+q;}).join('\n')+'\n\nAddress this misconception:\n- '+(d.commonErrors||[])[0];};
  } else if(id==='vocab'){
    prompt='Key vocabulary for "'+topic+'" (Tier 2 and Tier 3). JSON: {"words":[{"word":"term","tier":"2 or 3","definition":"clear student-friendly definition","etymology":"word origin (prefix/root/suffix meaning)","isay":"teacher says clearly","yousay":"students repeat","sentence":"example sentence using the word in context"},{"word":"...","tier":"...","definition":"...","etymology":"...","isay":"...","yousay":"...","sentence":"..."}]} — provide 5-6 words.';
    parse=function(d){ph.content=(d.words||[]).map(function(w){return'[Tier '+w.tier+'] '+w.word+'\nMeaning: '+w.definition+'\nEtymology: '+w.etymology+'\nI say: '+w.isay+' | You say: '+w.yousay+'\nIn a sentence: '+w.sentence;}).join('\n\n');};
  }

  for(var attempt=0;attempt<2;attempt++){
    try{
      var raw=await callAI(sys,prompt);
      var parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
      if(parse)parse(parsed);
      ph.parsed=parsed;ph.generated=true;
      ph.generating=false;saveState();render();return;
    }catch(e){
      if(attempt===1){ph.content=prevContent||'';ph.generated=!!prevContent;showToast('Generation failed -- try again','error');}
    }
  }
  ph.generating=false;saveState();render();
}

async function generateAll(){
  getActivePhases().forEach(function(p){
    if(!S.phases[p.id])S.phases[p.id]={content:'',parsed:null,generated:false,generating:false};
    if(S.open[p.id]===undefined)S.open[p.id]=false;
  });
  if(!S.topic){showToast('Add a topic first','error');return;}
  var hasK=(LESSONCRAFT_API_KEY&&LESSONCRAFT_API_KEY.length>5)||(S.claudeKey&&S.claudeKey.length>5)||(S.aiProvider==='copilot'&&S.copilotKey);
  if(!hasK){showToast('Go to AI Setup tab first','error');S.tab='aisetup';render();return;}
  var activeP=getActivePhases();
  S.generatingAll=true;
  S.genSteps=activeP.map(function(p){return{id:p.id,label:p.label,status:'pending'};});
  S.tab='build';
  activeP.forEach(function(p){S.open[p.id]=false;});
  S.activePhaseIdx=0;render();
  // Generate ALL phases in parallel for speed
  var promises=activeP.map(function(p,i){
    S.genSteps[i].status='active';
    return generatePhase(p.id,false).then(function(){
      S.genSteps[i].status='done';render();
    });
  });
  render();
  await Promise.all(promises);
  S.generatingAll=false;
  activeP.forEach(function(p){S.open[p.id]=true;});
  // Save to lesson history
  saveLessonHistory();
  render();
  showToast('Lesson ready!','success');
}

      ph.content='INDEPENDENT PRACTICE — '+board+' exam conditions\nTime allowed: '+d.timeAllowed+' | Total: '+d.totalMarks+' marks\n\n'
        +(d.questions||[]).map(function(q){
          return'Q'+q.n+'.\n'+(q.parts||[]).map(function(p){
            return p.part+' '+p.q+' ['+p.marks+' mark'+(p.marks>1?'s':'')+'] ('+p.ao+')'
              +'\n\n'+Array(Math.max(3,p.marks+1)).fill('').join('___________\n');
          }).join('\n');
        }).join('\n\n');
    };
  }
  else if(id==='drillqs'){
    prompt='Write 6 drill practice questions on "'+topic+'" for '+board+' GCSE. Same skill, varied numbers/context, increasing difficulty. Maths Genie / Corbettmaths style. JSON: {"skill":"name of the skill being drilled","questions":[{"q":"question","answer":"answer with working","difficulty":"grade 4"},{"q":"...","answer":"...","difficulty":"grade 5"},{"q":"...","answer":"...","difficulty":"grade 5"},{"q":"...","answer":"...","difficulty":"grade 6"},{"q":"...","answer":"...","difficulty":"grade 7"},{"q":"...","answer":"...","difficulty":"grade 8"}]}';
    parse=function(d){
      ph.content='DRILL PRACTICE: '+d.skill+'\n\n'
        +(d.questions||[]).map(function(q,i){
          return'('+(i+1)+') ['+q.difficulty+'] '+q.q;
        }).join('\n')
        +'\n\n─── ANSWERS ───\n'
        +(d.questions||[]).map(function(q,i){
          return'('+(i+1)+') '+q.answer;
        }).join('\n');
    };
  }
  else if(id==='examtips'){
    prompt='Write examiner tips for "'+topic+'" '+board+' GCSE — real advice from the examiner\'s report. JSON: {"topTips":[{"tip":"specific actionable tip","example":"show example of correct vs wrong","marks":"how many marks this is worth knowing"}],"commonErrors":[{"error":"what students write","correction":"what they should write","markLost":"e.g. loses A1 mark"}],"gradeTips":{"grade5":"to secure grade 5...","grade7":"to reach grade 7...","grade9":"for grade 9..."},"keyFormulae":["formula 1","formula 2"]}';
    parse=function(d){
      ph.content='EXAMINER TIPS — '+board+' '+subject+'\nTopic: '+topic+'\n\n'
        +'💡 TOP TIPS:\n'+(d.topTips||[]).map(function(t,i){return(i+1)+'. '+t.tip+(t.example?'\n   ✓ Example: '+t.example:'')+(t.marks?'\n   → '+t.marks:'');}).join('\n\n')
        +'\n\n❌ COMMON ERRORS:\n'+(d.commonErrors||[]).map(function(e){return'✗ Students write: '+e.error+'\n✓ Should be: '+e.correction+'\n  ('+e.markLost+')';}).join('\n\n')
        +(d.gradeTips?'\n\n🎯 GRADE TARGETS:\n'+'Grade 5: '+(d.gradeTips.grade5||'')+'\nGrade 7: '+(d.gradeTips.grade7||'')+'\nGrade 9: '+(d.gradeTips.grade9||''):'')
        +(d.keyFormulae&&d.keyFormulae.length?'\n\n📐 KEY FORMULAE:\n'+d.keyFormulae.map(function(f){return'• '+f;}).join('\n'):'');
    };
  }

  // Retry logic with 2 attempts
  for(var attempt=0;attempt<2;attempt++){
    try{
      var raw=await callAI(sys,prompt);
      var cleaned=raw.replace(/```json[\s\S]*?```/g,function(m){return m.replace(/```json|```/g,'');}).replace(/```/g,'').trim();
      var parsed=JSON.parse(cleaned);
      if(parse)parse(parsed);
      ph.parsed=parsed;ph.generated=true;ph.generating=false;
      saveState();render();return;
    }catch(e){
      if(attempt===1){
        console.error('generateExamPhase failed:',e);
        ph.content=prevContent||'Generation failed. Try again or check your API key.';
        ph.generated=!!prevContent;
        showToast('Phase failed: '+e.message.slice(0,60),'error');
      }
    }
  }
  ph.generating=false;saveState();render();
}

async function generateAllExam(){

  var hasK=(LESSONCRAFT_API_KEY&&LESSONCRAFT_API_KEY.length>5)||(S.claudeKey&&S.claudeKey.length>5)||(S.aiProvider==='copilot'&&S.copilotKey);
  if(!hasK){showToast('Go to AI Setup tab first','error');S.tab='aisetup';render();return;}
  // Initialise all exam phase states
  EXAM_PHASES.forEach(function(p){
    S.phases[p.id]={content:'',parsed:null,generated:false,generating:false};
    S.open[p.id]=false;
  });
  S.generatingAll=true;
  S.genSteps=EXAM_PHASES.map(function(p){return{id:p.id,label:p.label,status:'pending'};});
  S.tab='build';
  EXAM_PHASES.forEach(function(p){

  });

async function generateDiagram(phaseId){
  var ph=S.phases[phaseId];
  if(!ph||!ph.content){showToast('Generate the phase content first','error');return;}
  if(!S.diagrams)S.diagrams={};
  S.diagrams[phaseId]={generating:true,svg:''};render();

  var topic=S.topic||'this topic';
  var subject=S.subject||'Maths';
  var sys='You are an expert at creating educational SVG diagrams. Respond ONLY with raw SVG code — no markdown, no explanation, no backticks. The SVG must be self-contained, use viewBox="0 0 500 300", have a white or transparent background, use clean sans-serif fonts, and clearly label all parts.';
  var prompt='Create a clear, labelled educational SVG diagram to accompany this '+subject+' content about "'+topic+'". The diagram should visually illustrate the key concept, show working where relevant, or provide a visual scaffold for students.\n\nContent:\n'+ph.content.slice(0,400)+'\n\nRequirements:\n- viewBox="0 0 500 300"\n- Clean, simple visual\n- All text labels in English\n- No external images or fonts\n- Suitable for '+( S.ability||'mixed')+' ability Year '+(S.year||'secondary')+' students\n- If maths: use bar models, ratio tables, number lines or geometric diagrams as appropriate\n- Output ONLY the SVG element, starting with <svg';

  try{

    // Extract SVG from response
    var svgMatch=raw.match(/<svg[\s\S]*<\/svg>/i);
    var svg=svgMatch?svgMatch[0]:raw.trim();
    if(!svg.startsWith('<svg')){throw new Error('No valid SVG returned');}
    // Sanitise: remove any script tags

    showToast('Diagram generated!','success');
  }catch(e){
    S.diagrams[phaseId]={generating:false,svg:''};
    render();
    showToast('Diagram failed: '+e.message,'error');
  }
}

function saveLessonHistory(){

  try{
    var hist=JSON.parse(localStorage.getItem('lc_history')||'[]');
    var snap={
      id:Date.now(),
      topic:S.topic,subject:S.subject,year:S.year,
      mode:S.mode,examBoard:S.examBoard,ability:S.ability,
      date:new Date().toLocaleDateString('en-GB'),
      phases:Object.fromEntries(Object.entries(S.phases).map(function(e){
        return[e[0],{content:e[1].content,generated:e[1].generated}];
      })),
      keywords:S.keywords,selectedComponents:S.selectedComponents
    };
    hist=hist.filter(function(h){return h.topic!==S.topic||h.mode!==S.mode;});

function loadLessonFromHistory(snap){

  S.mode=snap.mode||'lesson';S.examBoard=snap.examBoard||'AQA';S.ability=snap.ability||'mixed';

function getTeachSlides(){
  var slides=[];
  var t=S.theme;
  var isExam=S.mode==='exam';
  var activeP=isExam?EXAM_PHASES:getActivePhases();

  // Title slide
  slides.push({
    type:'title',
    topic:S.topic||'Lesson',
    subject:S.subject,year:S.year,
    inquiry:S.inquiry,
    board:S.examBoard,
    meta:[S.subject,S.year?'Year '+S.year:'',S.duration?S.duration+' min':'',S.examBoard].filter(Boolean).join(' · '),
    objectives:S.objectives
  });

  // One slide per generated phase — long phases split
  activeP.forEach(function(phase){
    var ph=S.phases[phase.id];
    if(!ph||!ph.content)return;
    var lines=ph.content.split('\n').filter(function(l){return l.trim();});
    // Split at 8 lines
    var chunks=[];
    for(var i=0;i<lines.length;i+=8){chunks.push(lines.slice(i,i+8));}
    if(!chunks.length)chunks=[[]];
    chunks.forEach(function(chunk,ci){
      slides.push({
        type:'phase',
        phase:phase,
        chunk:chunk,
        chunkIdx:ci,
        totalChunks:chunks.length,
        hasAnswers:chunk.some(function(l){return/^(answer|solution|model answer):/i.test(l.trim());}),
        hasDiagram:ci===0&&S.diagrams&&S.diagrams[phase.id]&&S.diagrams[phase.id].svg,
        diagram:ci===0&&S.diagrams&&S.diagrams[phase.id]?S.diagrams[phase.id].svg:null,
        timing:S.timings&&S.timings[phase.id]
      });
    });
  });

  // Vocab slide if keywords exist
  var fkw=(S.keywords||[]).filter(function(k){return k.word&&k.word.trim();});
  if(fkw.length){
    slides.push({type:'vocab',keywords:fkw});
  }

  return slides;
}

function launchTeachMode(){
  var slides=getTeachSlides();
  if(slides.length<=1){
    showToast('Generate your lesson first — then click Teach Now!','error');
    S.tab='build';render();return;
  }
  S.teachMode=true;S.teachSlide=0;S.teachReveal={};S.teachAnnotating=false;
  renderTeachMode(slides);
}

function renderTeachMode(slides){
  // Remove existing teach overlay
  var old=document.getElementById('teach-overlay');if(old)old.remove();

  var t=S.theme;
  var overlay=document.createElement('div');
  overlay.id='teach-overlay';
  overlay.className='teach-overlay';
  overlay.tabIndex=0; // focusable for keyboard events

  var slide=slides[S.teachSlide];
  var revealed=S.teachReveal[S.teachSlide]||false;

  // ── SLIDE CONTENT ──
  var slideEl=document.createElement('div');
  slideEl.className='teach-slide';

  if(slide.type==='title'){
    slideEl.className+=' teach-title-slide';
    slideEl.style.background=t.primaryDark;
    // Decorative shapes
    ['teach-shape-1','teach-shape-2','teach-shape-3'].forEach(function(cls,i){
      var sh=document.createElement('div');sh.className=cls;
      sh.style.background=i===2?t.primary:t.primaryDark;
      slideEl.appendChild(sh);
    });
    var content=document.createElement('div');content.className='teach-title-content';
    if(slide.subject)content.innerHTML+='<div class="teach-subject">'+slide.subject.toUpperCase()+'</div>';
    if(slide.board)content.innerHTML+='<div class="teach-board-tag">'+slide.board+' Aligned</div>';
    var topicEl=document.createElement('h1');topicEl.className='teach-topic teach-editable';
    topicEl.contentEditable='true';topicEl.textContent=slide.topic;topicEl.spellcheck=false;
    topicEl.addEventListener('input',function(){S.topic=topicEl.textContent.trim();saveState();});
    topicEl.addEventListener('keydown',function(e){e.stopPropagation();}); // prevent slide nav
    content.appendChild(topicEl);
    if(slide.inquiry)content.innerHTML+='<div class="teach-inquiry">'+slide.inquiry+'</div>';
    if(slide.meta)content.innerHTML+='<div class="teach-meta">'+slide.meta+'</div>';
    if(slide.objectives)content.innerHTML+='<div class="teach-obj">🎯 '+slide.objectives+'</div>';
    content.innerHTML+='<div class="teach-date">'+new Date().toLocaleDateString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+'</div>';
    slideEl.appendChild(content);
  } else if(slide.type==='phase'){
    var ph=slide.phase;
    // Colour bar top
    var bar=document.createElement('div');bar.className='teach-phase-bar';bar.style.background=ph.col;slideEl.appendChild(bar);
    // Phase label
    var lbl=document.createElement('div');lbl.className='teach-phase-label';
    lbl.innerHTML='<span class="teach-phase-icon">'+ph.icon+'</span>'
      +'<span class="teach-phase-name">'+ph.label+'</span>'
      +(slide.totalChunks>1?'<span class="teach-chunk-badge">'+(slide.chunkIdx+1)+'/'+slide.totalChunks+'</span>':'')
      +(slide.timing?'<span class="teach-timing">⏱ '+slide.timing+' min</span>':'');
    slideEl.appendChild(lbl);

    // Content area

function initMWBCameo(canvas,tools,clearBtn,colRed,colBlue,colBlack,expandBtn){
  var ctx=canvas.getContext('2d');
  var drawing=false,lx=0,ly=0,currentColor='#1a1a2e';
  ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle=currentColor;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  function gp(e){var r=canvas.getBoundingClientRect(),sx=canvas.width/r.width,sy=canvas.height/r.height;var src=e.touches?e.touches[0]:e;return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};}
  canvas.addEventListener('mousedown',function(e){drawing=true;var p=gp(e);lx=p.x;ly=p.y;e.preventDefault();});
  canvas.addEventListener('mousemove',function(e){if(!drawing)return;var p=gp(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;});
  canvas.addEventListener('mouseup',function(){drawing=false;});
  canvas.addEventListener('touchstart',function(e){e.preventDefault();drawing=true;var p=gp(e);lx=p.x;ly=p.y;},{passive:false});
  canvas.addEventListener('touchmove',function(e){e.preventDefault();if(!drawing)return;var p=gp(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;},{passive:false});
  canvas.addEventListener('touchend',function(){drawing=false;});
  function setColor(c){currentColor=c;ctx.strokeStyle=c;}
  clearBtn.addEventListener('click',function(){ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle=currentColor;});
  colRed.addEventListener('click',function(){setColor('#dc2626');});
  colBlue.addEventListener('click',function(){setColor('#2563eb');});
  colBlack.addEventListener('click',function(){setColor('#1a1a2e');});
  expandBtn.addEventListener('click',function(){
    // Pop out to fullscreen whiteboard overlay
    var fsWB=document.createElement('div');fsWB.className='teach-mwb-fullscreen';
    var fsCanvas=document.createElement('canvas');fsCanvas.width=1400;fsCanvas.height=800;
    fsCanvas.style.cssText='width:100%;height:calc(100% - 48px);cursor:crosshair;background:#fff;display:block;';
    var fsTools=document.createElement('div');fsTools.className='teach-mwb-fs-tools';
    var fsClose=document.createElement('button');fsClose.textContent='✕ Close';fsClose.className='teach-mwb-btn';
    fsClose.addEventListener('click',function(){fsWB.remove();});
    fsTools.appendChild(fsClose);fsWB.appendChild(fsTools);fsWB.appendChild(fsCanvas);
    document.getElementById('teach-overlay').appendChild(fsWB);
    initMWBCameo(fsCanvas,fsTools,fsClose,colRed,colBlue,colBlack,{addEventListener:function(){}});
  });
}

// Draggable helper
function makeDraggable(el){
  var ox=0,oy=0,mx=0,my=0,dragging=false;
  el.addEventListener('mousedown',function(e){
    if(e.target.tagName==='BUTTON'||e.target.tagName==='VIDEO'||e.target.tagName==='CANVAS')return;
    dragging=true;ox=el.offsetLeft;oy=el.offsetTop;mx=e.clientX;my=e.clientY;
    e.preventDefault();
  });
  document.addEventListener('mousemove',function(e){
    if(!dragging)return;
    var dx=e.clientX-mx,dy=e.clientY-my;
    el.style.left=(ox+dx)+'px';el.style.top=(oy+dy)+'px';
    el.style.right='auto';el.style.bottom='auto';
  });
  document.addEventListener('mouseup',function(){dragging=false;});
  // Touch drag
  el.addEventListener('touchstart',function(e){
    if(e.target.tagName==='BUTTON'||e.target.tagName==='VIDEO')return;
    dragging=true;ox=el.offsetLeft;oy=el.offsetTop;mx=e.touches[0].clientX;my=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!dragging)return;
    var dx=e.touches[0].clientX-mx,dy=e.touches[0].clientY-my;
    el.style.left=(ox+dx)+'px';el.style.top=(oy+dy)+'px';el.style.right='auto';el.style.bottom='auto';
  },{passive:true});
  document.addEventListener('touchend',function(){dragging=false;});
}

function exitTeachMode(){
  S.teachMode=false;
  if(window._teachCamStream){window._teachCamStream.getTracks().forEach(function(t){t.stop();});window._teachCamStream=null;}
  if(window._teachTimerInterval){clearInterval(window._teachTimerInterval);window._teachTimerInterval=null;}
  var overlay=document.getElementById('teach-overlay');if(overlay)overlay.remove();
  if(document.fullscreenElement)document.exitFullscreen().catch(function(){});
  render();
}
var _teachTimerInterval=null;
var _teachTimerSecs=0;
function toggleTeachTimer(overlay){
  var existing=document.getElementById('teach-timer-el');
  if(existing){
    clearInterval(_teachTimerInterval);existing.remove();_teachTimerSecs=0;return;
  }
  var timerEl=document.createElement('div');timerEl.id='teach-timer-el';timerEl.className='teach-timer';
  timerEl.textContent='0:00';
  // Click to reset
  timerEl.addEventListener('click',function(){_teachTimerSecs=0;timerEl.textContent='0:00';timerEl.classList.remove('teach-timer-warn');});
  overlay.appendChild(timerEl);
  _teachTimerSecs=0;
  _teachTimerInterval=setInterval(function(){
    _teachTimerSecs++;
    var m=Math.floor(_teachTimerSecs/60);var s=_teachTimerSecs%60;
    timerEl.textContent=m+':'+(s<10?'0':'')+s;
    // Warn at 5min
    if(_teachTimerSecs>=300)timerEl.classList.add('teach-timer-warn');
  },1000);
}

function initAnnotationCanvas(canvas,overlay){
  canvas.width=overlay.clientWidth||window.innerWidth;
  canvas.height=overlay.clientHeight||window.innerHeight;
  var ctx=canvas.getContext('2d');
  ctx.strokeStyle='#ff3b5c';ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';
  var drawing=false;var lx=0,ly=0;
  function getPos(e){
    var r=canvas.getBoundingClientRect();
    var src=e.touches?e.touches[0]:e;
    return{x:src.clientX-r.left,y:src.clientY-r.top};
  }
  canvas.addEventListener('mousedown',function(e){drawing=true;var p=getPos(e);lx=p.x;ly=p.y;});
  canvas.addEventListener('mousemove',function(e){
    if(!drawing)return;var p=getPos(e);
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();
    lx=p.x;ly=p.y;
  });
  canvas.addEventListener('mouseup',function(){drawing=false;});
  canvas.addEventListener('touchstart',function(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p.x;ly=p.y;},{passive:false});
  canvas.addEventListener('touchmove',function(e){
    e.preventDefault();if(!drawing)return;var p=getPos(e);
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();
    lx=p.x;ly=p.y;
  },{passive:false});
  canvas.addEventListener('touchend',function(){drawing=false;});
  // Clear on double-click
  canvas.addEventListener('dblclick',function(){ctx.clearRect(0,0,canvas.width,canvas.height);});
}

// ===================================================
// DOM HELPERS
// ===================================================
function el(tag,attrs){
  const e=document.createElement(tag);
  if(attrs)for(const k in attrs){
    if(k==='class')e.className=attrs[k];
    else if(k==='html')e.innerHTML=attrs[k];
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  }
  for(let i=2;i<arguments.length;i++){
    const c=arguments[i];if(c==null)continue;
    if(typeof c==='string')e.appendChild(document.createTextNode(c));
    else if(Array.isArray(c))c.forEach(x=>{if(x!=null)e.appendChild(typeof x==='string'?document.createTextNode(x):x)});
    else e.appendChild(c);
  }
  return e;
}
function div(cls,children){const d=el('div',{'class':cls});(Array.isArray(children)?children:[children]).forEach(c=>{if(c)d.appendChild(typeof c==='string'?document.createTextNode(c):c)});return d}
function applyCSS(t){
  const s=document.getElementById('theme-css');
  if(s)s.textContent=':root{--p:'+t.primary+';--pd:'+t.primaryDark+';--pl:'+t.primaryLight+';--a:'+t.accent+';--a2:'+t.accent2+';}';
}

      var phase=activePhases.find(function(p){return p.id===s.id;});if(!phase)return;

      var dot=el('div',{'class':'gen-step-dot '+s.status});dot.textContent=s.status==='done'?'v':s.status==='active'?'...':'.';
      step.appendChild(dot);step.appendChild(el('div',{'class':'gen-step-label'},phase.icon+' '+s.label));
      if(s.status==='done'){var tags=isExam?EXAM_QUALITY_TAGS:QUALITY_TAGS;step.appendChild(el('span',{'class':'gen-step-tag'},(tags[s.id]&&tags[s.id][0])||''));}
      steps.appendChild(step);
    });
    gp.appendChild(steps);d.appendChild(gp);
  }

  // ── Phase cards ──
  // Rapid Edit view OR normal cards
  if(S.rapidEdit){
    d.appendChild(buildRapidEditView());
  } else {
    var phases=el('div',{'class':'phases'});
    activePhases.forEach(function(p){phases.appendChild(buildPhaseCard(p,isExam));});
    d.appendChild(phases);
  }
  return d;
}

function buildPhaseCard(phase, isExam=false){
  const ph=S.phases[phase.id];
  const isOpen=S.open[phase.id];
  var phaseIdx=(isExam?EXAM_PHASES:getActivePhases()).findIndex(function(p){return p.id===phase.id;});
  var isActive=phaseIdx===S.activePhaseIdx&&S.generatingAll;
  const card=el('div',{'class':'pcard'+(isOpen?' open':'')+(isActive?' phase-active':'')+(ph.generating?' phase-generating':'')});

  // ── Head ──
  const head=el('div',{'class':'phead'});
  head.appendChild(el('div',{'class':'phase-color-bar','style':'background:'+phase.col}));
  const iconWrap=el('div',{'class':'phase-icon-wrap','style':'background:'+phase.bg});iconWrap.textContent=phase.icon;
  head.appendChild(iconWrap);
  const txt=el('div',{'class':'phase-text'});
  txt.appendChild(el('div',{'class':'phase-label'},phase.label));
  txt.appendChild(el('div',{'class':'phase-sub'},phase.sub));
  head.appendChild(txt);
  const meta=el('div',{'class':'phase-meta'});
  var tagSet=isExam?EXAM_QUALITY_TAGS:QUALITY_TAGS;
  var tags=(tagSet[phase.id]||[]);
  tags.slice(0,1).forEach(function(tag){meta.appendChild(el('span',{'class':'quality-tag'},tag));});
  var tMin=S.timings&&S.timings[phase.id];
  if(tMin)meta.appendChild(el('div',{'class':'phase-timing-badge'},tMin+' min'));
  if(ph.generating){var pill=el('div',{'class':'status-pill generating'});pill.innerHTML='<span class="spinner" style="width:10px;height:10px;border-width:1.5px;"></span>';meta.appendChild(pill);}
  else if(ph.generated){meta.appendChild(el('div',{'class':'status-pill ready'},'Ready'));}
  meta.appendChild(el('div',{'class':'chev'+(isOpen?' open':'')},'v'));
  head.appendChild(meta);
  head.addEventListener('click',function(){S.open[phase.id]=!S.open[phase.id];render();});
  card.appendChild(head);

  if(isOpen){
    const body=el('div',{'class':'pbody'});
    const inner=el('div',{'class':'pbody-inner'});

    if(ph.generating){
      var ag=el('div',{'class':'ai-generating'});
      ag.innerHTML='<div class="spinner"></div><div><div style="font-size:13px;font-weight:600;color:var(--p);">Writing '+phase.label+'...</div><div style="font-size:11px;color:var(--gray-400);margin-top:2px;">Takes a few seconds</div></div>';
      inner.appendChild(ag);
    } else if(ph.generated){
      // ── Improvement 4: Formatted question display ──
      var phLines=( ph.content||'').split('\n');
      var hasQFmt=phLines.some(function(l){return/^Q?\d+[.:)[\]]/.test(l.trim());});
      if(hasQFmt){
        var qDisp=el('div',{'class':'phase-q-display'});
        var curQ=null;var curLines=[];
        function flushCurQ(){
          if(!curQ)return;
          var qc=el('div',{'class':'phase-q-card'});
          var qh=el('div',{'class':'phase-q-hdr'});
          qh.innerHTML=curQ.replace(/\[(\d+)\s*marks?\]/gi,function(m,n){return '<span class="mark-badge">'+n+'m</span>';});
          qc.appendChild(qh);
          if(curLines.length){
            var qb=el('div',{'class':'phase-q-body'});
            var bt=curLines.join('\n');
            if(/^(answer|solution|model answer):/i.test(bt.trim()))qc.classList.add('phase-q-answer');
            qb.textContent=bt;qc.appendChild(qb);
          }
          qDisp.appendChild(qc);curQ=null;curLines=[];
        }
        phLines.forEach(function(ln){
          if(/^Q?\d+[.:)[\]]/.test(ln.trim())){flushCurQ();curQ=ln;}
          else if(curQ)curLines.push(ln);
          else if(ln.trim()){var misc=el('div',{'class':'phase-q-misc'});misc.textContent=ln;qDisp.appendChild(misc);}
        });
        flushCurQ();
        inner.appendChild(qDisp);
      }
      // Content textarea (always shown for editing)
      var ta=el('textarea',{'class':'phase-textarea'+(hasQFmt?' phase-textarea-hidden':''),'rows':hasQFmt?3:6});
      ta.value=ph.content||'';
      // Toggle edit mode - show textarea when editing
      if(hasQFmt){
        var editToggle=el('button',{'class':'phase-edit-toggle'});
        editToggle.textContent='✏ Edit text';
        editToggle.addEventListener('click',function(){
          ta.classList.toggle('phase-textarea-hidden');
          ta.classList.toggle('phase-textarea-visible');
          editToggle.textContent=ta.classList.contains('phase-textarea-hidden')?'✏ Edit text':'✓ Done editing';
          if(!ta.classList.contains('phase-textarea-hidden'))ta.focus();
        });
        inner.appendChild(editToggle);
      }
      ta.addEventListener('input',function(e){
        // Save AI original before first edit
        if(!S.aiOriginals[phase.id]&&S.phases[phase.id].content){
          S.aiOriginals[phase.id]=S.phases[phase.id].content;
        }
        S.phases[phase.id].content=e.target.value;saveState();
      });
      inner.appendChild(ta);

      // ── Rich micro-action toolbar ──
      var toolbar=el('div',{'class':'phase-toolbar'});
      var genFn=isExam?generateExamPhase:generatePhase;

      // Revert to AI original button (if edited)
      if(S.aiOriginals&&S.aiOriginals[phase.id]){
        var revertTbBtn=el('button',{'class':'phase-action-btn phase-revert-btn'});
        revertTbBtn.innerHTML='↩ Revert to AI';revertTbBtn.title='Restore original AI-generated version';
        revertTbBtn.addEventListener('click',function(e){
          e.stopPropagation();
          if(confirm('Revert to original AI version? Your edits will be lost.')){
            S.phases[phase.id].content=S.aiOriginals[phase.id];
            delete S.aiOriginals[phase.id];saveState();render();
          }
        });
        toolbar.appendChild(revertTbBtn);
      }
      var actions=[
        {icon:'🔄',label:'Regenerate',fn:function(){genFn(phase.id,false);}},
        {icon:'✨',label:'Improve',fn:function(){genFn(phase.id,true);}},
        {icon:'📈',label:'Harder',fn:function(){S.phases[phase.id].content+=' [Make harder]';genFn(phase.id,true);}},
        {icon:'📉',label:'Easier',fn:function(){S.phases[phase.id].content+=' [Simplify for lower ability]';genFn(phase.id,true);}},
        {icon:'❓',label:'Add questions',fn:function(){S.phases[phase.id].content+=' [Add 2 more questions]';genFn(phase.id,true);}},
        {icon:'⚠️',label:'Misconceptions',fn:function(){S.phases[phase.id].content+=' [Add common misconceptions students have about this]';genFn(phase.id,true);}},
      ];

      // Exam-specific actions
      if(isExam){
        if(phase.id==='examqs'||phase.id==='drillqs')actions.push({icon:'➕',label:'More Qs',fn:function(){S.phases[phase.id].content+=' [Add 3 more similar questions]';genFn(phase.id,true);}});
        if(phase.id==='workedex'||phase.id==='marksch')actions.push({icon:'🎯',label:'Mark steps',fn:function(){S.phases[phase.id].content+=' [Show each mark point clearly numbered]';genFn(phase.id,true);}});
      } else {
        if(phase.id==='independent')actions.push({icon:'🌍',label:'Real-world',fn:function(){S.phases[phase.id].content+=' [Add a real-world context question]';genFn(phase.id,true);}});
        if(phase.id==='reflect')actions.push({icon:'📋',label:'Exit ticket',fn:function(){S.phases[phase.id].content+=' [Generate a concise 3-question exit ticket]';genFn(phase.id,true);}});
        if(phase.id==='newknow')actions.push({icon:'💬',label:'Teacher script',fn:function(){S.phases[phase.id].content+=' [Add what the teacher should say during this phase, step by step]';genFn(phase.id,true);}});
      }

      actions.forEach(function(a){
        var btn=el('button',{'class':'phase-action-btn'});
        btn.innerHTML=a.icon+' '+a.label;
        btn.addEventListener('click',function(e){e.stopPropagation();if(!S.topic){showToast('Add a topic first','error');return;}a.fn();});
        toolbar.appendChild(btn);
      });
      // Diagram button
      var diagramBtn=el('button',{'class':'phase-action-btn phase-diagram-btn'});
      var diag=S.diagrams&&S.diagrams[phase.id];
      diagramBtn.innerHTML=diag&&diag.generating?'Drawing...':'🖼 Generate Diagram';
      diagramBtn.addEventListener('click',function(e){e.stopPropagation();generateDiagram(phase.id);});
      toolbar.appendChild(diagramBtn);
      inner.appendChild(toolbar);
      if(S.diagrams&&S.diagrams[phase.id]&&S.diagrams[phase.id].svg){
        var diagWrap=el('div',{'class':'phase-diagram-wrap'});
        var diagHdr=el('div',{'class':'phase-diagram-hdr'});diagHdr.innerHTML='<span style="font-size:11px;font-weight:700;color:var(--gray-600);">🖼 Diagram</span>';
        var remDiag=el('button',{'class':'btn-icon','style':'margin-left:auto;'});remDiag.textContent='✕';
        remDiag.addEventListener('click',function(e){e.stopPropagation();if(!S.diagrams)S.diagrams={};S.diagrams[phase.id]={svg:'',generating:false};saveState();render();});
        diagHdr.appendChild(remDiag);diagWrap.appendChild(diagHdr);
        var diagSvg=el('div',{'class':'phase-diagram-svg'});diagSvg.innerHTML=S.diagrams[phase.id].svg;diagWrap.appendChild(diagSvg);inner.appendChild(diagWrap);
      }
      // MWB for I Do and Guided
      if(phase.id==='ido'||phase.id==='guided'){inner.appendChild(buildMWB(phase.id));}

    } else {
      // Not generated yet
      inner.appendChild(el('div',{'class':'phase-hint'},phase.hint));
      var genBtn2=el('button',{'class':'btn btn-primary btn-sm'});genBtn2.innerHTML='✨ Generate';
      genBtn2.addEventListener('click',function(e){e.stopPropagation();if(!S.topic){showToast('Add a topic first','error');return;}isExam?generateExamPhase(phase.id,false):generatePhase(phase.id,false);});
      inner.appendChild(genBtn2);
      var ta2=el('textarea',{'placeholder':'Or write manually...','rows':'3','style':'margin-top:10px;'});
      ta2.value='';ta2.addEventListener('input',function(e){S.phases[phase.id].content=e.target.value;S.phases[phase.id].generated=!!e.target.value;saveState();});
      inner.appendChild(ta2);
    }
    body.appendChild(inner);card.appendChild(body);
  }
  return card;
}

    bigCanvas.addEventListener('mouseup',function(){drawing2=false;bigCanvas.getContext('2d').globalCompositeOperation='source-over';});
    bigCanvas.addEventListener('touchstart',function(e2){e2.preventDefault();drawing2=true;var p=gp2(e2);lx2=p.x;ly2=p.y;},{passive:false});

  tools.appendChild(el('div',{'class':'mwb-sep'}));
  const eraseBtn=el('div',{'class':'mwb-erase'});

  eraseBtn.addEventListener('click',e=>{e.stopPropagation();S.mwb[mwbKey+'_erase']=!S.mwb[mwbKey+'_erase'];eraseBtn.classList.toggle('active',S.mwb[mwbKey+'_erase']);});
  tools.appendChild(eraseBtn);mwb.appendChild(tools);
  requestAnimationFrame(()=>{

    if(S.mwb[mwbKey+'_img']){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0);img.src=S.mwb[mwbKey+'_img'];}
    let drawing=false,lx=0,ly=0;
    function getPos(e){const r=canvas.getBoundingClientRect(),sx=canvas.width/r.width,sy=canvas.height/r.height;const src=e.touches?e.touches[0]:e;return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};}
    function startDraw(e){e.preventDefault();drawing=true;const p=getPos(e);lx=p.x;ly=p.y;}
    function doDraw(e){if(!drawing)return;e.preventDefault();const p=getPos(e);const er=S.mwb[mwbKey+'_erase'];ctx.globalCompositeOperation=er?'destination-out':'source-over';ctx.strokeStyle=S.mwb[mwbKey+'_col']||'#1e1b2e';ctx.lineWidth=(S.mwb[mwbKey+'_sz']||4)*(er?5:1);ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;}
    function stopDraw(){if(drawing){drawing=false;ctx.globalCompositeOperation='source-over';S.mwb[mwbKey+'_img']=canvas.toDataURL();}}
    canvas.addEventListener('mousedown',startDraw);canvas.addEventListener('mousemove',doDraw);canvas.addEventListener('mouseup',stopDraw);canvas.addEventListener('mouseleave',stopDraw);canvas.addEventListener('touchstart',startDraw,{passive:false});canvas.addEventListener('touchmove',doDraw,{passive:false});canvas.addEventListener('touchend',stopDraw);
  });
  return mwb;
}

// --- KEYWORDS TAB --------------------------------
function buildKwTab(){
  const d=el('div',{});
  d.appendChild(el('div',{'class':'page-hero'},
    el('h1',{},'Key Words'),
    el('p',{},'Build vocabulary using I Say / You Say -- particularly effective for EAL learners.')
  ));
  const banner=el('div',{'class':'eal-banner'});
  banner.appendChild(el('div',{'class':'eal-icon'},'🌍'));
  const bt=el('div',{'class':'eal-text'});
  bt.innerHTML='<strong>I Say / You Say:</strong> Say the key word clearly -- students repeat it. Then say the definition -- students repeat that. Builds pronunciation, confidence and vocabulary retention.';
  banner.appendChild(bt);d.appendChild(banner);

  const table=el('div',{'class':'kw-table'});
  const thead=el('div',{'class':'kw-thead'});
  ['I Say (key word)','You Say (definition / translation)',''].forEach(h=>{thead.appendChild(el('div',{'class':'kw-thead-cell'},h))});
  table.appendChild(thead);
  const tbody=el('div',{'class':'kw-tbody'});
  S.keywords.forEach((kw,i)=>{
    const row=el('div',{'class':'kw-row'});
    const w=el('input',{'type':'text','placeholder':'e.g. circumference','value':kw.word});
    const def=el('input',{'type':'text','placeholder':'The distance around a circle','value':kw.def});
    const del=el('button',{'class':'btn-icon'});del.textContent='x';
    w.addEventListener('input',e=>S.keywords[i].word=e.target.value);
    def.addEventListener('input',e=>S.keywords[i].def=e.target.value);
    del.addEventListener('click',()=>{S.keywords.splice(i,1);if(!S.keywords.length)S.keywords.push({id:S.nextKwId++,word:'',def:''});render()});
    row.appendChild(w);row.appendChild(def);row.appendChild(del);tbody.appendChild(row);
  });
  table.appendChild(tbody);d.appendChild(table);

  const acts=el('div',{'style':'display:flex;gap:10px;margin-top:14px;align-items:center;'});
  const add=el('button',{'class':'btn btn-ghost btn-sm'});add.textContent='+ Add row';
  add.addEventListener('click',()=>{S.keywords.push({id:S.nextKwId++,word:'',def:''});render()});
  acts.appendChild(add);
  const aiKw=el('button',{'class':'btn btn-primary btn-sm'});
  aiKw.innerHTML='✨ AI Suggest Keywords';
  aiKw.addEventListener('click',async()=>{
    if(!S.topic){showToast('Add a topic first','error');return}
    aiKw.disabled=true;aiKw.textContent='Generating...';
    try{
      const raw=await callAI('You are a maths teacher. Respond ONLY with valid JSON.','Suggest 6 key vocabulary words and concise definitions for: "'+S.topic+'". JSON: {"keywords":[{"word":"...","def":"..."}]}');
      const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
      S.keywords=(parsed.keywords||[]).map(k=>({id:S.nextKwId++,word:k.word,def:k.def}));render();
      showToast('Keywords generated v','success');
    }catch(e){showToast('AI error: '+e.message,'error')}
    aiKw.disabled=false;
  });
  acts.appendChild(aiKw);d.appendChild(acts);
  return d;
}

// FEATURE: SHARE LESSON (URL-based)
// ===================================================
function shareLesson(){
  try{
    const snap={
      topic:S.topic,subject:S.subject,year:S.year,mode:S.mode,examBoard:S.examBoard,
      phases:Object.fromEntries(Object.entries(S.phases).map(([k,v])=>[k,{content:v.content,generated:v.generated}])),
      keywords:S.keywords,theme:{primary:S.theme.primary,primaryDark:S.theme.primaryDark,primaryLight:S.theme.primaryLight,accent:S.theme.accent,accent2:S.theme.accent2}
    };
    const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(snap))));
    const url=window.location.href.split('?')[0]+'?lesson='+encoded;
    if(navigator.share){
      navigator.share({title:'LessonCraft: '+S.topic,url:url});
    } else if(navigator.clipboard){
      navigator.clipboard.writeText(url).then(()=>showToast('Link copied to clipboard!','success'));
    } else {
      prompt('Copy this link to share your lesson:',url);
    }
  }catch(e){showToast('Could not create share link','error');}
}

function loadSharedLesson(){
  try{
    const params=new URLSearchParams(window.location.search);
    const encoded=params.get('lesson');
    if(!encoded)return;
    const snap=JSON.parse(decodeURIComponent(escape(atob(encoded))));
    if(snap.topic){
      S.topic=snap.topic||'';S.subject=snap.subject||'';S.year=snap.year||'';
      S.mode=snap.mode||'lesson';S.examBoard=snap.examBoard||'AQA';
      if(snap.phases){
        Object.entries(snap.phases).forEach(([k,v])=>{
          if(!S.phases[k])S.phases[k]={content:'',parsed:null,generated:false,generating:false};
          S.phases[k].content=v.content||'';S.phases[k].generated=v.generated||false;
        });
      }
      if(snap.keywords)S.keywords=snap.keywords;
      if(snap.theme){S.theme=Object.assign({},S.theme,snap.theme,{loaded:true,filename:'Shared'});}
  const activeP=S.mode==='exam'?EXAM_PHASES:getActivePhases();
      activeP.forEach(p=>{S.open[p.id]=S.phases[p.id]&&S.phases[p.id].generated;});
      S.tab='build';
      showToast('Shared lesson loaded!','success');
    }
  }catch(e){console.log('No shared lesson in URL');}
}

// FEATURE: STUDENT WORKSHEET DOWNLOAD
// ===================================================
function downloadWorksheet(format,isTeacher){
  format=format||'print';
  isTeacher=(isTeacher===undefined)?true:isTeacher;
  var t=S.theme;
  var isExam=S.mode==='exam';
  var activePhases=isExam?EXAM_PHASES:getActivePhases();
  var topicTitle=S.topic||'Worksheet';
  var meta=[S.subject,S.year?'Year '+S.year:'',new Date().toLocaleDateString('en-GB'),S.examBoard].filter(Boolean).join(' | ');

  // Which phases to include - questions only for student, everything for teacher
  var studentPhaseIds=isExam?['warmup','examretrieval','examqs','examguided','examindep','drillqs']:['prior','retrieval','recall','youdo','independent'];
  var teacherOnlyIds=isExam?['workedex','marksch','examtips']:['reflect'];
  
  var phasesToShow=activePhases.filter(function(p){
    var ph=S.phases[p.id];
    if(!ph||!ph.content)return false;
    if(isTeacher)return true;
    return studentPhaseIds.includes(p.id)||!teacherOnlyIds.includes(p.id);
  });

  var rows=phasesToShow.map(function(phase){
    var ph=S.phases[phase.id];
    var content2=ph.content;
    // Student version: strip answers
    if(!isTeacher){
      content2=content2.split('\n').filter(function(l){
        var t=l.trim().toLowerCase();
        return!t.startsWith('answer:')||!t.startsWith('solution:')||!t.startsWith('model answer')||!t.startsWith('final answer:');
      }).join('\n');
    }
    // Diagram
    var diagHtml='';
    if(S.diagrams&&S.diagrams[phase.id]&&S.diagrams[phase.id].svg){
      diagHtml='<div style="margin:10px 0;text-align:center;">'+S.diagrams[phase.id].svg+'</div>';
    }
    return '<div style="margin-bottom:24px;page-break-inside:avoid;">'
      +'<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:'+phase.bg+';border-radius:6px 6px 0 0;border:1.5px solid '+phase.col+'44;">'
      +'<span>'+phase.icon+'</span><span style="font-family:Sora,sans-serif;font-size:13px;font-weight:700;color:'+phase.col+';">'+phase.label+'</span>'
      +(isTeacher?'<span style="font-size:10px;color:#9ca3af;margin-left:auto;">'+( teacherOnlyIds.includes(phase.id)?'TEACHER ONLY':'')+'</span>':'')
      +'</div>'
      +diagHtml
      +'<div style="padding:14px 16px;border:1.5px solid '+phase.col+'22;border-top:none;border-radius:0 0 6px 6px;font-size:13px;line-height:1.9;white-space:pre-wrap;">'+content2+'</div>'
      +((!isTeacher&&(phase.id==='examqs'||phase.id==='independent'||phase.id==='youdo'||phase.id==='drillqs'))?
        (function(){
          // Generate answer lines proportional to marks found in content
          var markMatches=ph.content.match(/\[(\d+)\s*marks?\]/gi)||[];
          var totalMarks=markMatches.reduce(function(acc,m){return acc+parseInt(m.match(/\d+/)[0]);},0)||4;
          var lineCount=Math.min(Math.max(totalMarks*2,4),20);
          var lines2='';for(var li=0;li<lineCount;li++){lines2+='<div style="border-bottom:1px solid #d1d5db;height:22px;margin:2px 0;"></div>';}
          return '<div style="padding:8px 16px 12px;border:1.5px solid #e5e7eb;border-top:none;border-radius:0 0 6px 6px;background:#fafafa;">'+lines2+'</div>';
        })()
        :'')
      +'</div>';
  }).join('');

  var fkw=S.keywords?S.keywords.filter(function(k){return k.word&&k.word.trim();}):[];
  var kwHtml='';
  if(fkw.length&&isTeacher){
    kwHtml='<div style="margin-top:20px;border-radius:8px;overflow:hidden;border:1.5px solid #e9d5ff;">'
      +'<div style="padding:10px 14px;background:'+t.primary+';color:#fff;font-size:13px;font-weight:700;">🌍 Key Vocabulary</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;padding:12px;">'
      +fkw.map(function(k){return'<div style="background:#fdf9ff;border-radius:6px;padding:8px;border:1px solid #e9d5ff;">'
        +'<div style="font-size:9px;font-weight:700;color:#7c3aed;">Tier '+(k.tier||'2')+'</div>'
        +'<div style="font-weight:700;font-size:13px;color:'+t.primaryDark+';">'+k.word+'</div>'
        +'<div style="font-size:11px;color:#555;">'+(k.def||'')+'</div>'
        +(k.etymology?'<div style="font-size:9px;color:#9ca3af;font-style:italic;">'+k.etymology+'</div>':'')
        +'</div>';}).join('')
      +'</div></div>';
  }

  var html='<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>'+(isTeacher?'[TEACHER] ':'')+topicTitle+'</title>'
    +'<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">'
    +'<style>*{box-sizing:border-box}body{font-family:Inter,sans-serif;margin:0;padding:2cm;color:#1a1a2e;}'
    +(isTeacher?'.teacher-badge{display:inline-block;background:#7c3aed;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:8px;}':'')
    +'.hdr{border-bottom:3px solid '+t.primary+';padding-bottom:12px;margin-bottom:20px;}'
    +'.title{font-family:Sora,sans-serif;font-size:22px;font-weight:800;color:'+t.primaryDark+';display:flex;align-items:center;gap:8px;}'
    +'.meta{font-size:11px;color:#6b7280;margin-top:4px;}'
    +'.fields{display:flex;gap:24px;margin:14px 0 24px;}'
    +'.field{flex:1;border-bottom:1.5px solid #d1d5db;padding-bottom:4px;font-size:12px;color:#9ca3af;}'
    +'@media print{body{padding:1.5cm;}}</style></head><body>'
    +'<div class="hdr"><div class="title">'+topicTitle+(isTeacher?'<span class="teacher-badge">TEACHER VERSION</span>':'')+'</div><div class="meta">'+meta+'</div></div>'
    +(isTeacher?'':('<div class="fields"><div class="field">Name: _______________________</div><div class="field">Class: ___________</div><div class="field">Date: ___________</div></div>'))
    +rows+kwHtml
    +(isTeacher?'<div style="margin-top:20px;padding:10px;background:#fef3c7;border:1px solid #f59e0b;border-radius:6px;font-size:11px;color:#92400e;">📋 TEACHER VERSION — Contains answers and mark scheme. Do not distribute to students.</div>':'')
    +'</body></html>';

  if(format==='docx'){
    if(!window.docx){
      var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.js';
      s.onload=function(){downloadWorksheet('docx',isTeacher);};
      document.head.appendChild(s);showToast('Loading Word library...','success');return;
    }
    // Use blob for docx
    var blob=new Blob([html],{type:'text/html'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=(S.topic||'worksheet').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_-]/g,'')+(isTeacher?'_TEACHER':'_student')+'_worksheet.html';a.click();
  } else {
    var pw=window.open('','_blank','width=900,height=1000');
    if(!pw){showToast('Pop-up blocked -- allow pop-ups for this site','error');return;}
    pw.document.write(html);pw.document.close();
    showToast((isTeacher?'Teacher':'Student')+' worksheet ready -- print or save as PDF','success');
  }
}

function downloadWorksheet(format){
  // format: 'docx' | 'print'
  format = format || 'docx';
  const t=S.theme;
  const isExam=S.mode==='exam';
  const activePhases=isExam?EXAM_PHASES:getActivePhases();
  const questionPhases=isExam?['warmup','examqs','drillqs']:['prior','newknow','independent'];
  const topicTitle=S.topic||'Worksheet';
  const meta=[S.subject,S.year?'Year '+S.year:'',new Date().toLocaleDateString('en-GB'),S.examBoard].filter(Boolean).join(' | ');

  // Collect content phases
  const phasesToInclude=activePhases.filter(function(p){
    return questionPhases.includes(p.id)&&S.phases[p.id]&&S.phases[p.id].content;
  });

  if(format==='print'){
    // Open a clean print window
    const printWin=window.open('','_blank','width=800,height=900');
    if(!printWin){showToast('Pop-up blocked -- allow pop-ups for this site','error');return;}
    const rows=phasesToInclude.map(function(phase){
      const clean=S.phases[phase.id].content.split('\n')
        .filter(function(l){return!l.trim().startsWith('Answer:')&&!l.trim().startsWith('Solution:')&&!l.trim().startsWith('Final answer:');})
        .join('\n');
      return '<div style="margin-bottom:24px;page-break-inside:avoid;">'
        +'<div style="padding:8px 14px;background:'+phase.bg+';border-radius:6px 6px 0 0;border:1.5px solid '+phase.col+'44;">'
        +'<span style="font-size:13px;font-weight:700;color:'+phase.col+';">'+phase.icon+' '+phase.label+'</span></div>'
        +'<div style="padding:14px 16px;border:1.5px solid '+phase.col+'22;border-top:none;border-radius:0 0 6px 6px;font-size:13px;line-height:1.9;white-space:pre-wrap;">'+clean+'</div></div>';
    }).join('');
    const workingBoxes=isExam?'<div style="margin-top:28px"><div style="font-weight:700;font-size:14px;border-bottom:2px solid '+t.primary+';padding-bottom:6px;margin-bottom:12px;">Working space</div>'
      +'<div style="border:1px solid #d1d5db;border-radius:6px;height:90px;margin-bottom:10px;"></div>'.repeat(4)+'</div>':'';
    printWin.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+topicTitle+'</title>'
      +'<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">'
      +'<style>*{box-sizing:border-box}body{font-family:Inter,sans-serif;margin:0;padding:2cm;color:#1a1a2e;}'
      +'.hdr{border-bottom:3px solid '+t.primary+';padding-bottom:12px;margin-bottom:20px;}'
      +'.title{font-family:Sora,sans-serif;font-size:22px;font-weight:800;color:'+t.primaryDark+';}'
      +'.meta{font-size:11px;color:#6b7280;margin-top:4px;}'
      +'.fields{display:flex;gap:24px;margin:14px 0 24px;}'
      +'.field{flex:1;border-bottom:1.5px solid #d1d5db;padding-bottom:4px;font-size:12px;color:#9ca3af;}'
      +'@media print{.no-print{display:none}button{display:none}}'
      +'</style></head><body>'
      +'<div class="no-print" style="background:#f3f4f6;padding:12px 16px;margin-bottom:16px;border-radius:8px;display:flex;gap:10px;align-items:center;">'
      +'<span style="font-size:13px;font-weight:600;">Ready to print or save as PDF</span>'
      +'<button onclick="window.print()" style="background:#92278F;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-left:auto;">Print / Save as PDF</button>'
      +'</div>'
      +'<div class="hdr"><div class="title">'+topicTitle+'</div><div class="meta">'+meta+'</div></div>'
      +'<div class="fields"><div class="field">Name: _______________________</div><div class="field">Class: ___________</div><div class="field">Date: ___________</div></div>'
      +rows+workingBoxes
      +'</body></html>');
    printWin.document.close();
    return;
  }

  // DOCX format — use docx.js via CDN
  if(!window.docx){
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.js';
    s.onload=function(){downloadWorksheet('docx');};
    s.onerror=function(){showToast('Could not load Word library -- try Print instead','error');};
    document.head.appendChild(s);
    showToast('Loading Word library...','success');
    return;
  }

  try{
    const {Document,Packer,Paragraph,TextRun,HeadingLevel,BorderStyle,AlignmentType,
           ShadingType,TableRow,TableCell,Table,WidthType,VerticalAlign}=window.docx;

    // Helper: hex to docx color (strip #)
    function dc(hex){return(hex||'000000').replace('#','');}

    const children=[];

    // Title paragraph
    children.push(new Paragraph({
      children:[new TextRun({text:topicTitle,bold:true,size:44,color:dc(t.primaryDark),font:'Sora'})],
      spacing:{after:80},
      border:{bottom:{style:BorderStyle.SINGLE,size:12,color:dc(t.primary),space:4}}
    }));

    // Meta line
    children.push(new Paragraph({
      children:[new TextRun({text:meta,size:18,color:'6B7280'})],
      spacing:{after:200}
    }));

    // Name / Class / Date fields
    children.push(new Paragraph({
      children:[
        new TextRun({text:'Name: ',bold:true,size:22}),
        new TextRun({text:'_________________________________   ',size:22}),
        new TextRun({text:'Class: ',bold:true,size:22}),
        new TextRun({text:'______________   ',size:22}),
        new TextRun({text:'Date: ',bold:true,size:22}),
        new TextRun({text:'______________',size:22}),
      ],
      spacing:{after:320}
    }));

    // Phase sections
    phasesToInclude.forEach(function(phase){
      const raw=S.phases[phase.id].content;
      const lines=raw.split('\n').filter(function(l){
        return!l.trim().startsWith('Answer:')&&!l.trim().startsWith('Solution:')&&!l.trim().startsWith('Final answer:');
      });

      // Phase heading with colour bar
      children.push(new Paragraph({
        children:[new TextRun({text:phase.icon+' '+phase.label,bold:true,size:26,color:dc(phase.col),font:'Sora'})],
        spacing:{before:280,after:120},
        shading:{type:ShadingType.CLEAR,fill:dc(phase.bg).replace('#','')},
        border:{
          bottom:{style:BorderStyle.SINGLE,size:6,color:dc(phase.col),space:2}
        }
      }));

      // Content lines
      lines.forEach(function(line){
        if(!line.trim()){children.push(new Paragraph({spacing:{after:60}}));return;}
        children.push(new Paragraph({
          children:[new TextRun({text:line,size:22})],
          spacing:{after:80}
        }));
      });

      // Working box for exam questions
      if(isExam&&(phase.id==='examqs'||phase.id==='drillqs')){
        for(var b=0;b<3;b++){
          children.push(new Paragraph({
            children:[new TextRun({text:' ',size:22})],
            spacing:{after:4},
            border:{
              top:{style:BorderStyle.SINGLE,size:4,color:'D1D5DB'},
              bottom:{style:BorderStyle.SINGLE,size:4,color:'D1D5DB'},
              left:{style:BorderStyle.SINGLE,size:4,color:'D1D5DB'},
              right:{style:BorderStyle.SINGLE,size:4,color:'D1D5DB'}
            }
          }));
          // Spacer inside box
          for(var sp=0;sp<3;sp++){children.push(new Paragraph({spacing:{after:4},children:[new TextRun(' ')]}));}
          children.push(new Paragraph({spacing:{after:120},children:[new TextRun(' ')]}));
        }
      }
    });

    const doc=new Document({
      styles:{
        default:{document:{run:{font:'Inter',size:22}}}
      },
      sections:[{
        properties:{
          page:{
            size:{width:11906,height:16838},
            margin:{top:1134,right:1134,bottom:1134,left:1134}
          }
        },
        children:children
      }]
    });

    Packer.toBlob(doc).then(function(blob){
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=(S.topic||'worksheet').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_-]/g,'')+'_worksheet.docx';
      a.click();
      showToast('Word document downloaded!','success');
    });

  }catch(e){
    console.error('DOCX error:',e);
    showToast('Word export failed: '+e.message+' -- try Print instead','error');
  }
}

// --- INIT -----------------------------------------
const themeCSS=document.createElement('style');themeCSS.id='theme-css';document.head.appendChild(themeCSS);
applyCSS(S.theme);

// Open all phases that have content on load
PHASES.forEach(p=>{S.open[p.id]=S.phases[p.id].generated||false});
// If no API key configured at all, start on AI Setup so teachers know what to do
var hasKey=(LESSONCRAFT_API_KEY&&LESSONCRAFT_API_KEY.length>5)||(S.claudeKey&&S.claudeKey.length>5)||(S.copilotKey&&S.copilotKey.length>5);
if(!hasKey){
  S.tab='aisetup';
} else if(S.topic){
  S.tab='build';
} else {
  S.tab='build';
}

// Global keyboard shortcuts
document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveState();showToast('Saved','success');}
});
// On mobile, start with sidebar closed so content is visible
if(window.innerWidth<=768)S.sidebarOpen=false;
loadSharedLesson();
render();
</script>
