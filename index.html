<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LessonCraft AI</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style id="app-styles">
/* ─── RESET & BASE ─────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#92278F;--pd:#632E62;--pl:#f0e8f0;--a:#e94560;--a2:#FFC000;
  --gray-50:#f8f7fc;--gray-100:#f0edf7;--gray-200:#e2dced;--gray-300:#c8bfd8;--gray-400:#9f94b0;--gray-500:#6b6080;--gray-700:#3d3454;--gray-900:#1e1a2e;
  --white:#fff;--radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 12px 32px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
  --fh:'Sora',sans-serif;--fb:'Inter',sans-serif;
  --hdr:56px;--sb:280px;
}
html,body{height:100%;font-family:var(--fb);background:var(--gray-50);color:var(--gray-900);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ─── SCROLLBAR ─────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:99px}

/* ─── HEADER ────────────────────────────────────── */
.hdr{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:var(--hdr);background:var(--pd);
  display:flex;align-items:center;gap:0;
  box-shadow:0 1px 0 rgba(255,255,255,.08),0 2px 8px rgba(0,0,0,.2);
}
.hdr-logo{
  display:flex;align-items:center;gap:10px;
  padding:0 20px 0 22px;
  font-family:var(--fh);font-size:17px;font-weight:800;
  color:#fff;white-space:nowrap;letter-spacing:-.3px;
  border-right:1px solid rgba(255,255,255,.1);height:100%;
}
.hdr-logo svg{flex-shrink:0}
.logo-pill{
  background:var(--a2);color:var(--pd);
  font-size:9px;font-weight:800;letter-spacing:.8px;
  padding:2px 7px;border-radius:99px;margin-left:2px;
}
.hdr-nav{display:flex;align-items:stretch;flex:1;padding:0 8px}
.nav-item{
  display:flex;align-items:center;gap:8px;
  padding:0 16px;height:100%;cursor:pointer;
  font-size:13px;font-weight:500;color:rgba(255,255,255,.45);
  border-bottom:2.5px solid transparent;transition:all .15s;
  position:relative;white-space:nowrap;
}
.nav-item:hover{color:rgba(255,255,255,.8)}
.nav-item.active{color:#fff;border-bottom-color:var(--a2)}
.nav-num{
  width:18px;height:18px;border-radius:50%;
  font-size:9px;font-weight:800;
  background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;
}
.nav-item.active .nav-num{background:var(--a2);color:var(--pd)}
.nav-item.done .nav-num{background:#22c55e;color:#fff}
.nav-item.done{color:rgba(255,255,255,.65)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;padding:0 18px}
.hdr-theme-pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.1);border-radius:99px;
  padding:4px 10px 4px 6px;font-size:11px;color:rgba(255,255,255,.75);
}
.theme-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3)}

/* ─── LAYOUT ─────────────────────────────────────── */
.shell{display:flex;height:100vh;padding-top:var(--hdr)}
.sidebar{
  width:var(--sb);min-width:var(--sb);
  background:var(--white);
  border-right:1px solid var(--gray-200);
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:2px 0 8px rgba(0,0,0,.04);
}
.sb-scroll{flex:1;overflow-y:auto;padding:16px 14px 20px}
.content{flex:1;overflow-y:auto;padding:28px 32px 100px}

/* ─── SIDEBAR COMPONENTS ────────────────────────── */
.sb-section{margin-bottom:18px}
.sb-label{
  font-size:10px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;color:var(--p);
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.sb-field{margin-bottom:8px}
.sb-field label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);margin-bottom:4px}
input,textarea,select{
  width:100%;padding:8px 11px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-xs);
  font-family:var(--fb);font-size:13px;color:var(--gray-900);
  background:var(--gray-50);outline:none;
  transition:border-color .15s,background .15s,box-shadow .15s;
}
input:hover,textarea:hover{border-color:var(--gray-300)}
input:focus,textarea:focus{border-color:var(--p);background:var(--white);box-shadow:0 0 0 3px rgba(146,39,143,.1)}
textarea{resize:vertical;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sb-divider{height:1px;background:var(--gray-100);margin:14px 0}

/* ─── BUTTONS ─────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 16px;border-radius:var(--radius-xs);
  font-family:var(--fb);font-size:13px;font-weight:600;
  cursor:pointer;border:none;transition:all .15s;white-space:nowrap;
}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-primary{background:var(--p);color:#fff}
.btn-primary:hover{background:var(--pd);transform:translateY(-1px);box-shadow:0 4px 12px rgba(146,39,143,.3)}
.btn-primary:active{transform:translateY(0)}
.btn-amber{background:var(--a2);color:var(--pd)}
.btn-amber:hover{filter:brightness(.94);transform:translateY(-1px)}
.btn-dark{background:var(--pd);color:#fff}
.btn-dark:hover{filter:brightness(1.15)}
.btn-ghost{background:transparent;color:var(--p);border:1.5px solid var(--gray-200)}
.btn-ghost:hover{border-color:var(--p);background:var(--pl)}
.btn-danger{background:transparent;color:#ef4444;border:1.5px solid #fecaca}
.btn-danger:hover{background:#fef2f2}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:5px}
.btn-full{width:100%}
.btn-icon{
  width:32px;height:32px;border-radius:var(--radius-xs);border:1.5px solid var(--gray-200);
  background:var(--white);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:13px;transition:all .15s;flex-shrink:0;
}
.btn-icon:hover{border-color:#fca5a5;background:#fef2f2;color:#ef4444}

/* ─── GENERATE HERO BUTTON ───────────────────────── */
.gen-hero{
  background:linear-gradient(135deg,var(--p) 0%,var(--pd) 100%);
  color:#fff;border-radius:var(--radius-sm);padding:13px 16px;
  cursor:pointer;border:none;width:100%;
  display:flex;align-items:center;gap:10px;
  font-family:var(--fh);font-size:14px;font-weight:700;
  box-shadow:0 4px 16px rgba(146,39,143,.3);
  transition:all .2s;position:relative;overflow:hidden;
}
.gen-hero::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%);
}
.gen-hero:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(146,39,143,.4)}
.gen-hero:active{transform:translateY(0)}
.gen-hero-icon{font-size:20px;flex-shrink:0}
.gen-hero-text{text-align:left}
.gen-hero-title{font-size:13px;font-weight:700;line-height:1.2}
.gen-hero-sub{font-size:10px;opacity:.75;font-weight:400;margin-top:1px}

/* ─── WORKSHEET UPLOAD ───────────────────────────── */
.ws-zone{
  border:1.5px dashed var(--gray-300);border-radius:var(--radius-sm);
  padding:12px;text-align:center;cursor:pointer;
  transition:all .2s;position:relative;background:var(--gray-50);
}
.ws-zone:hover,.ws-over{border-color:var(--p);background:var(--pl)}
.ws-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ws-loaded{
  background:linear-gradient(135deg,#fff8e6,#fffaed);
  border:1.5px solid #fcd34d;border-radius:var(--radius-sm);
  padding:10px 12px;display:flex;align-items:center;gap:10px;
}
.ws-loaded-icon{font-size:22px;flex-shrink:0}
.ws-loaded-name{font-size:12px;font-weight:600;color:#92400e;line-height:1.3}
.ws-loaded-sub{font-size:11px;color:#b45309;margin-top:1px}

/* ─── THEME SWATCHES ─────────────────────────────── */
.swatch-row{display:flex;gap:5px;margin-top:6px}
.swatch{width:22px;height:22px;border-radius:5px;border:2px solid rgba(255,255,255,.6);box-shadow:var(--shadow-sm)}

/* ─── PAGE HEADER ────────────────────────────────── */
.page-hero{margin-bottom:28px}
.page-hero h1{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--gray-900);letter-spacing:-.3px;line-height:1.2}
.page-hero p{font-size:13px;color:var(--gray-400);margin-top:5px;max-width:600px}

/* ─── PHASE GRID ─────────────────────────────────── */
.phases{display:flex;flex-direction:column;gap:10px}

/* ─── PHASE CARD ─────────────────────────────────── */
.pcard{
  background:var(--white);border-radius:var(--radius);
  border:1.5px solid var(--gray-200);
  overflow:hidden;transition:border-color .15s,box-shadow .15s;
}
.pcard:hover{border-color:var(--gray-300);box-shadow:var(--shadow-sm)}
.pcard.open{border-color:var(--p);box-shadow:0 0 0 3px rgba(146,39,143,.06),var(--shadow-md)}
.pcard.generated{border-color:#bbf7d0}

.phead{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;cursor:pointer;user-select:none;
}
.phase-color-bar{width:4px;height:44px;border-radius:2px;flex-shrink:0}
.phase-icon-wrap{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.phase-text{flex:1;min-width:0}
.phase-label{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--gray-900)}
.phase-sub{font-size:11px;color:var(--gray-400);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.phase-meta{display:flex;align-items:center;gap:7px;margin-left:auto;flex-shrink:0}

/* STATUS PILL */
.status-pill{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;
  white-space:nowrap;
}
.status-pill.ready{background:#dcfce7;color:#15803d}
.status-pill.pending{background:var(--gray-100);color:var(--gray-400)}
.status-pill.generating{background:#fdf4ff;color:var(--p)}

.chev{color:var(--gray-300);font-size:16px;transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}

/* PHASE BODY */
.pbody{border-top:1px solid var(--gray-100)}
.pbody-inner{padding:16px}
.phase-hint{
  font-size:11.5px;color:var(--gray-500);line-height:1.6;
  padding:9px 12px;background:var(--gray-50);
  border-radius:var(--radius-xs);border-left:3px solid var(--p);
  margin-bottom:12px;
}

/* AI CONTENT DISPLAY */
.ai-result{
  background:var(--white);border:1.5px solid #e9d5ff;
  border-radius:var(--radius-xs);margin-bottom:10px;overflow:hidden;
}
.ai-result-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:linear-gradient(to right,#faf5ff,var(--white));
  border-bottom:1px solid #f3e8ff;
}
.ai-result-label{font-size:10px;font-weight:700;color:var(--p);letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.ai-result-body{padding:10px 12px;font-size:12.5px;line-height:1.8;color:var(--gray-700);white-space:pre-wrap}

/* AI GENERATING STATE */
.ai-generating{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;background:linear-gradient(to right,#faf5ff,#fdf8ff);
  border-radius:var(--radius-xs);border:1px solid #e9d5ff;
}
.spinner{
  width:18px;height:18px;border:2px solid #e9d5ff;
  border-top-color:var(--p);border-radius:50%;
  animation:spin .7s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* AI BUTTONS ROW */
.ai-actions{display:flex;gap:8px;align-items:center;margin-top:6px}
.ta-label{font-size:11px;font-weight:600;color:var(--gray-400);margin-bottom:5px;margin-top:10px}

/* ─── GENERATION PROGRESS ────────────────────────── */
.gen-progress-card{
  background:var(--white);border-radius:var(--radius);
  border:1.5px solid var(--gray-200);padding:20px 22px;
  margin-bottom:20px;box-shadow:var(--shadow-sm);
}
.gen-progress-title{
  font-family:var(--fh);font-size:15px;font-weight:700;
  color:var(--gray-900);margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.gen-steps{display:flex;flex-direction:column;gap:2px}
.gen-step{
  display:flex;align-items:center;gap:12px;
  padding:8px 10px;border-radius:var(--radius-xs);
  transition:background .15s;
}
.gen-step.active{background:var(--pl)}
.gen-step-dot{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;flex-shrink:0;transition:all .2s;
}
.gen-step-dot.pending{background:var(--gray-100);color:var(--gray-400)}
.gen-step-dot.active{background:var(--p);color:#fff;animation:pulse 1.2s ease infinite}
.gen-step-dot.done{background:#22c55e;color:#fff}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(146,39,143,.4)}50%{box-shadow:0 0 0 6px rgba(146,39,143,0)}}
.gen-step-label{font-size:13px;font-weight:500;color:var(--gray-700);transition:color .15s}
.gen-step.active .gen-step-label{color:var(--p);font-weight:600}
.gen-step.done .gen-step-label{color:#15803d}
.gen-step-desc{font-size:11px;color:var(--gray-400);margin-left:auto}

/* ─── THEME PAGE ─────────────────────────────────── */
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:560px}
.theme-upload-card{
  border:2px dashed var(--gray-200);border-radius:var(--radius);
  padding:32px 24px;text-align:center;cursor:pointer;
  transition:all .2s;background:var(--white);position:relative;
  grid-column:span 2;
}
.theme-upload-card:hover,.theme-upload-card.dz-over{border-color:var(--p);background:var(--pl)}
.theme-upload-card input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.tuc-icon{font-size:36px;margin-bottom:10px;display:block}
.tuc-title{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--gray-900);margin-bottom:5px}
.tuc-sub{font-size:13px;color:var(--gray-400)}

.theme-loaded-card{
  background:linear-gradient(135deg,#f0fdf4,#ecfdf5);
  border:1.5px solid #86efac;border-radius:var(--radius);
  padding:16px 20px;display:flex;align-items:flex-start;gap:14px;
  margin-bottom:20px;
}
.palette-display{display:flex;gap:8px;margin-top:10px}
.pal-chip{border-radius:8px;overflow:hidden;text-align:center;flex:1}
.pal-chip-color{height:42px;border-radius:6px;margin-bottom:5px;box-shadow:var(--shadow-sm)}
.pal-chip-name{font-size:10px;font-weight:600;color:var(--gray-500)}
.pal-chip-hex{font-size:9px;color:var(--gray-400);margin-top:1px}

.manual-col-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:460px;margin:14px 0}
.col-field label{font-size:11px;font-weight:600;color:var(--gray-500);margin-bottom:4px;display:block}
.col-input-row{display:flex;gap:6px;align-items:center}
.col-swatch{width:34px;height:34px;border:none;border-radius:6px;cursor:pointer;padding:2px;flex-shrink:0}

/* ─── KEYWORDS ───────────────────────────────────── */
.eal-banner{
  background:linear-gradient(135deg,#fdf4ff,#faf5ff);
  border:1.5px solid #e9d5ff;border-radius:var(--radius);
  padding:14px 16px;margin-bottom:20px;
  display:flex;gap:12px;align-items:flex-start;
}
.eal-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.eal-text strong{color:var(--pd);font-weight:700}
.eal-text{font-size:13px;color:var(--gray-700);line-height:1.6}

.kw-table{background:var(--white);border-radius:var(--radius);border:1.5px solid var(--gray-200);overflow:hidden;box-shadow:var(--shadow-sm)}
.kw-thead{display:grid;grid-template-columns:1fr 1fr 40px;gap:0;background:var(--pd);padding:9px 14px}
.kw-thead-cell{font-size:10px;font-weight:700;color:#fff;letter-spacing:.5px;text-transform:uppercase}
.kw-tbody{padding:8px}
.kw-row{display:grid;grid-template-columns:1fr 1fr 40px;gap:8px;align-items:center;padding:5px 6px;border-radius:6px;transition:background .1s}
.kw-row:hover{background:var(--gray-50)}
.kw-row input{background:transparent;border:1.5px solid transparent;transition:all .15s}
.kw-row input:first-child{border-left:2.5px solid var(--p)}
.kw-row input:hover{border-color:var(--gray-200)}
.kw-row input:focus{border-color:var(--p);background:var(--white)}

/* ─── PREVIEW ─────────────────────────────────────── */
.preview-shell{max-width:800px}
.prev-topbar{
  background:var(--pd);border-radius:var(--radius) var(--radius) 0 0;
  padding:28px 32px;color:#fff;position:relative;overflow:hidden;
}
.prev-topbar::after{
  content:'';position:absolute;right:-40px;top:-40px;
  width:220px;height:220px;border-radius:50%;
  background:rgba(255,255,255,.04);
}
.prev-dept{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.prev-title{font-family:var(--fh);font-size:26px;font-weight:800;line-height:1.15;margin-bottom:8px}
.prev-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.prev-chip{background:rgba(255,255,255,.12);border-radius:99px;padding:3px 10px;font-size:11px;font-weight:500}
.prev-obj{background:rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;font-size:12.5px;line-height:1.6}
.prev-stripe{height:3px;background:var(--p)}
.prev-body{background:var(--white);padding:24px 32px;border-radius:0 0 var(--radius) var(--radius);box-shadow:var(--shadow-lg)}
.prev-phase-list{display:flex;flex-direction:column;gap:10px}
.prev-phase{border-radius:var(--radius-sm);overflow:hidden;border:1.5px solid var(--gray-200)}
.prev-ph-head{display:flex;align-items:center;gap:8px;padding:9px 14px;font-family:var(--fh);font-size:12px;font-weight:700}
.prev-ph-body{padding:12px 14px;font-size:12.5px;line-height:1.8;color:var(--gray-700);white-space:pre-wrap}
.prev-ph-empty{padding:10px 14px;font-size:12px;color:var(--gray-300);font-style:italic}

.prev-kw{margin-top:16px}
.prev-kw-head{padding:10px 14px;font-family:var(--fh);font-size:12px;font-weight:700;color:#fff;border-radius:8px 8px 0 0}
.prev-kw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;padding:12px;border:1.5px solid var(--gray-200);border-top:none;border-radius:0 0 8px 8px;background:var(--gray-50)}
.prev-kw-card{background:var(--white);border-radius:6px;padding:8px 10px;border:1.5px solid var(--gray-200)}
.prev-kw-word{font-weight:700;font-size:12px}
.prev-kw-def{font-size:11px;color:var(--gray-400);margin-top:2px}

/* ─── BOTTOM BAR ──────────────────────────────────── */
.btm{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(255,255,255,.96);backdrop-filter:blur(10px);
  border-top:1px solid var(--gray-200);
  padding:10px 24px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 -4px 16px rgba(0,0,0,.06);
}
.btm-left{display:flex;align-items:center;gap:8px}
.btm-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-400)}
.btm-dot{width:7px;height:7px;border-radius:50%;background:#22c55e}
.btm-topic{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--gray-900)}
.btm-right{display:flex;gap:8px;align-items:center}

/* ─── SECTION CARD ────────────────────────────────── */
.section-card{background:var(--white);border-radius:var(--radius);border:1.5px solid var(--gray-200);padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.section-card h3{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--gray-900);margin-bottom:4px}
.section-card .desc{font-size:12px;color:var(--gray-400);margin-bottom:14px}

/* ─── MISC ────────────────────────────────────────── */
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:99px}
.progress-bar{height:3px;background:var(--gray-100);border-radius:99px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--a2));border-radius:99px;transition:width .5s ease}
.empty-hint{text-align:center;padding:32px 20px;color:var(--gray-400)}
.empty-hint .em-icon{font-size:32px;margin-bottom:10px;display:block}
.empty-hint p{font-size:13px;max-width:280px;margin:0 auto;line-height:1.6}




/* ─── MODE SWITCHER ─────────────────────────────── */
.mode-switcher{
  display:grid;grid-template-columns:1fr 1fr;gap:6px;
  margin-bottom:10px;
}
.mode-btn{
  display:flex;align-items:center;gap:8px;
  padding:9px 10px;border-radius:var(--radius-sm);
  border:1.5px solid var(--gray-200);background:var(--white);
  cursor:pointer;transition:all .15s;position:relative;
  overflow:hidden;
}
.mode-btn:hover{border-color:var(--gray-300);background:var(--gray-50)}
.mode-btn.active{
  border-color:var(--p);background:var(--pl);
}
.mode-btn.active:last-child{
  border-color:#dc2626;background:#fff5f5;
}
.mode-btn-icon{font-size:18px;flex-shrink:0;line-height:1}
.mode-btn-text{flex:1;min-width:0}
.mode-btn-label{font-size:12px;font-weight:700;color:var(--gray-900);line-height:1.2}
.mode-btn-sub{font-size:10px;color:var(--gray-400);margin-top:1px;line-height:1.3}
.mode-btn.active .mode-btn-label{color:var(--pd)}
.mode-btn.active:last-child .mode-btn-label{color:#991b1b}
.mode-active-dot{
  position:absolute;top:6px;right:6px;
  width:6px;height:6px;border-radius:50%;background:var(--p);
}
.mode-btn.active:last-child .mode-active-dot{background:#dc2626}

/* ─── EXAM HERO BUTTON ───────────────────────────── */
.gen-hero-exam{
  background:linear-gradient(135deg,#dc2626 0%,#991b1b 100%)!important;
  box-shadow:0 4px 16px rgba(220,38,38,.3)!important;
}
.gen-hero-exam:hover{box-shadow:0 8px 24px rgba(220,38,38,.4)!important}

/* ─── EXAM MODE BADGE ────────────────────────────── */
.exam-mode-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:#fef2f2;color:#dc2626;
  font-size:10px;font-weight:800;letter-spacing:.5px;
  padding:3px 9px;border-radius:99px;
  border:1.5px solid #fecaca;
  white-space:nowrap;flex-shrink:0;
}
.build-header-exam{border-bottom-color:#fecaca}
.export-hero-btn-exam{
  background:linear-gradient(135deg,#dc2626,#991b1b)!important;
  box-shadow:0 4px 14px rgba(220,38,38,.3)!important;
}
.export-hero-btn-exam:hover{box-shadow:0 6px 20px rgba(220,38,38,.4)!important}
.gen-progress-exam .gen-step-dot.active{background:#dc2626}
.gen-progress-exam .gen-step.active .gen-step-label{color:#dc2626}

/* ─── EXAM EMPTY STATE ───────────────────────────── */
.exam-empty-badge{
  display:inline-block;background:#fef2f2;color:#dc2626;
  font-size:11px;font-weight:800;letter-spacing:1px;
  padding:4px 12px;border-radius:99px;border:1.5px solid #fecaca;
  text-transform:uppercase;
}
.exam-feature-list{
  display:flex;flex-direction:column;gap:6px;
  max-width:400px;margin:20px auto 0;text-align:left;
}
.exam-feature-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 12px;background:var(--white);
  border-radius:var(--radius-xs);
  box-shadow:var(--shadow-sm);
  font-size:13px;
}
.exam-feature-item span{flex-shrink:0;font-size:16px;margin-top:1px}
/* ─── PROGRESSIVE SIDEBAR ───────────────────────── */
.qs-hero{background:linear-gradient(135deg,var(--pl),#fdf9ff);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:12px;border:1.5px solid rgba(146,39,143,.15)}
.qs-eyebrow{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--p);margin-bottom:3px}
.qs-title{font-family:var(--fh);font-size:16px;font-weight:800;color:var(--gray-900);margin-bottom:4px}
.qs-desc{font-size:11px;color:var(--gray-500);line-height:1.5}
.sb-field-hero{margin-bottom:10px}
.inp-hero{font-family:var(--fh);font-weight:600;font-size:14px!important;padding:10px 12px!important;border-color:var(--gray-300)!important}
.inp-hero:focus{border-color:var(--p)!important;box-shadow:0 0 0 3px rgba(146,39,143,.12)!important}
.sb-field-focus .inp-hero{border-color:var(--p);box-shadow:0 0 0 3px rgba(146,39,143,.08)}
.sb-progress{margin:10px 0 4px;padding:8px 10px;background:var(--gray-50);border-radius:var(--radius-xs);border:1px solid var(--gray-100)}
.sb-progress-row{display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:var(--gray-700);margin-bottom:5px}
.sb-adv-toggle{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;color:var(--gray-500);cursor:pointer;padding:6px 2px;border-radius:4px;transition:color .15s}
.sb-adv-toggle:hover{color:var(--p)}
.sb-adv{background:var(--gray-50);border-radius:var(--radius-xs);padding:10px;margin-top:6px;border:1px solid var(--gray-100)}
.sb-theme-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.sb-clear-btn{width:100%;padding:6px;font-size:11px;font-weight:500;color:var(--gray-400);background:transparent;border:none;cursor:pointer;text-align:center;border-radius:4px;transition:color .15s}
.sb-clear-btn:hover{color:var(--a)}

/* ─── EMPTY STATE ────────────────────────────────── */
.empty-screen{text-align:center;padding:60px 32px 40px;max-width:520px;margin:0 auto}
.empty-icon{font-size:44px;display:block;margin-bottom:14px}
.empty-title{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--gray-900);margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--gray-400);line-height:1.6;margin-bottom:24px}
.empty-sub strong{color:var(--p)}
.empty-phases{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.empty-phase-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:99px;border:1.5px solid;font-size:11px}

/* ─── BUILD HEADER ───────────────────────────────── */
.build-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--gray-100)}
.build-title{font-family:var(--fh);font-size:20px;font-weight:800;color:var(--gray-900);margin-bottom:3px}
.build-meta{font-size:12px;color:var(--gray-400);font-weight:500}
.export-hero-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;
  padding:10px 18px;border-radius:var(--radius-sm);border:none;
  font-family:var(--fb);font-size:13px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 14px rgba(146,39,143,.3);transition:all .2s;
  white-space:nowrap;flex-shrink:0;
}
.export-hero-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(146,39,143,.4)}
.export-hero-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ─── QUALITY TAGS ───────────────────────────────── */
.quality-tag{
  display:inline-flex;align-items:center;
  font-size:9px;font-weight:700;letter-spacing:.3px;
  padding:2px 7px;border-radius:99px;
  background:var(--gray-100);color:var(--gray-500);
  white-space:nowrap;
}
.pcard.open .quality-tag{background:rgba(146,39,143,.08);color:var(--p)}

/* ─── PHASE CONTENT ──────────────────────────────── */
.phase-textarea{
  width:100%;border:1.5px solid var(--gray-200);border-radius:var(--radius-xs);
  padding:12px;font-family:var(--fb);font-size:13px;color:var(--gray-700);
  background:var(--white);line-height:1.8;resize:vertical;min-height:120px;
  outline:none;transition:border-color .15s;
}
.phase-textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(146,39,143,.08)}

/* ─── MICRO-ACTION TOOLBAR ───────────────────────── */
.phase-toolbar{
  display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;
  padding:8px 0 4px;border-top:1px solid var(--gray-100);
}
.phase-action-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 11px;border-radius:99px;font-size:12px;font-weight:600;
  color:var(--gray-500);background:var(--gray-50);
  border:1.5px solid var(--gray-200);cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.phase-action-btn:hover{color:var(--p);border-color:var(--p);background:var(--pl)}

/* ─── GEN STEP QUALITY TAG ───────────────────────── */
.gen-step-tag{
  font-size:9px;font-weight:700;padding:1px 6px;
  border-radius:99px;background:#dcfce7;color:#15803d;
  margin-left:auto;white-space:nowrap;
}
/* ─── PREVIEW TITLE SLIDE ────────────────────────── */
.prev-title-slide{
  position:relative;background:#fff;
  border-radius:var(--radius) var(--radius) 0 0;
  overflow:hidden;height:260px;
  border:1.5px solid var(--gray-200);border-bottom:none;
}
.prev-shapes{position:absolute;inset:0;pointer-events:none}
/* Four diagonal strips — bottom-right, matching the template */
.prev-shape-4{position:absolute;right:-80px;top:-20px;width:130px;height:340px;background:#e8d0ed;opacity:.5;transform:rotate(20deg);transform-origin:top right}
.prev-shape-3{position:absolute;right:-40px;top:-20px;width:100px;height:340px;background:#c49fcc;opacity:.7;transform:rotate(20deg);transform-origin:top right}
.prev-shape-2{position:absolute;right:20px;top:-20px;width:90px;height:340px;transform:rotate(20deg);transform-origin:top right}
.prev-shape-1{position:absolute;right:90px;top:-20px;width:75px;height:340px;transform:rotate(20deg);transform-origin:top right}
.prev-date{
  position:absolute;top:16px;left:20px;
  font-size:13px;font-weight:700;font-family:Calibri,sans-serif;
}
.prev-iq-label{
  position:absolute;top:72px;left:0;right:40%;
  text-align:center;
  font-size:13px;font-weight:700;font-style:italic;font-family:Calibri,sans-serif;
}
.prev-iq-question{
  position:absolute;bottom:44px;left:20px;right:42%;
  font-size:22px;font-weight:400;font-family:Calibri,sans-serif;
  line-height:1.25;text-decoration:underline;
}
.prev-iq-meta{
  position:absolute;bottom:16px;left:20px;
  font-size:11px;font-weight:600;font-family:Calibri,sans-serif;opacity:.7;
}
/* ─── MWB CAMEO ──────────────────────────────────── */
.mwb-cameo{
  margin:14px 0 4px;
  border-radius:var(--radius-sm);
  border:2px solid #d1d5db;
  background:#fff;
  overflow:hidden;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.04), 0 2px 8px rgba(0,0,0,.06);
}
.mwb-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);
}
.mwb-label{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;color:var(--gray-500);
  letter-spacing:.4px;text-transform:uppercase;
}
.mwb-hint{font-size:11px;color:var(--gray-400);margin-left:8px}
.mwb-canvas{
  display:block;width:100%;height:auto;
  cursor:crosshair;touch-action:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 27px,#e8e4f0 28px),
             repeating-linear-gradient(90deg,transparent,transparent 27px,#f0edf7 28px),
             #f9f8fd;
}
.mwb-tools{
  display:flex;align-items:center;gap:6px;
  padding:7px 12px;background:var(--gray-50);
  border-top:1px solid var(--gray-200);flex-wrap:wrap;
}
.mwb-color{
  width:20px;height:20px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;transition:all .15s;flex-shrink:0;
}
.mwb-color:hover{transform:scale(1.15)}
.mwb-color.active{border-color:var(--gray-900);box-shadow:0 0 0 2px #fff,0 0 0 4px currentColor}
.mwb-size{
  width:28px;height:28px;border-radius:6px;cursor:pointer;
  border:1.5px solid var(--gray-200);background:var(--white);
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.mwb-size:hover{border-color:var(--p)}
.mwb-size.active{border-color:var(--p);background:var(--pl)}
.mwb-sep{width:1px;height:20px;background:var(--gray-200);margin:0 2px;flex-shrink:0}
.mwb-erase{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:6px;cursor:pointer;
  font-size:11px;font-weight:600;color:var(--gray-500);
  border:1.5px solid var(--gray-200);background:var(--white);
  transition:all .15s;flex-shrink:0;
}
.mwb-erase:hover{border-color:var(--a);color:var(--a)}
.mwb-erase.active{border-color:var(--a);background:#fef2f2;color:var(--a)}
.mwb-clear-btn{
  font-size:11px;font-weight:600;color:var(--gray-400);
  background:transparent;border:1.5px solid var(--gray-200);
  border-radius:5px;padding:3px 9px;cursor:pointer;transition:all .15s;
}
.mwb-clear-btn:hover{color:#dc2626;border-color:#fca5a5;background:#fef2f2}
@media print{.mwb-cameo{display:none!important}}
@media print{
  .hdr,.sidebar,.btm{display:none!important}
  .shell{padding-top:0;display:block}
  .content{padding:0;overflow:visible}
  .prev-body{box-shadow:none}
}

/* --- EXAM BOARD SELECTOR --- */
.sb-board-row{display:flex;align-items:center;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.board-btn{padding:4px 8px;border-radius:99px;font-size:10px;font-weight:700;border:1.5px solid var(--gray-200);background:var(--white);color:var(--gray-500);cursor:pointer;transition:all .15s;white-space:nowrap}
.board-btn:hover{border-color:var(--p);color:var(--p)}
.board-btn.active{background:var(--p);border-color:var(--p);color:#fff}
/* --- PREVIEW TOOLBAR --- */
.preview-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:10px 14px;background:var(--white);border-radius:var(--radius);border:1.5px solid var(--gray-200);box-shadow:var(--shadow-sm)}
.eb-badge{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;font-size:10px;font-weight:800;letter-spacing:.6px;padding:3px 10px;border-radius:99px;white-space:nowrap}
.answer-toggle-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
/* --- TOGGLE SWITCH --- */
.toggle-switch{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;cursor:pointer;background:#d1d5db;border-radius:99px;transition:.2s}
.toggle-slider::before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle-switch input:checked+.toggle-slider{background:var(--p)}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(16px)}
.prev-ph-hidden{padding:10px 14px;font-size:12px;background:#fafafa;border-top:1px dashed #e5e7eb}
/* --- MOBILE HAMBURGER --- */
.hamburger-btn{display:none;background:transparent;border:none;cursor:pointer;padding:6px;border-radius:6px;margin-left:8px;transition:background .15s;flex-shrink:0}
.hamburger-btn:hover{background:rgba(255,255,255,.1)}
/* ======================================
   RESPONSIVE — TABLET (max 1024px)
   ====================================== */
@media(max-width:1024px){
  :root{--sb:240px}
  .nav-item{padding:0 10px;font-size:12px}
  .content{padding:1.2rem 1.4rem 80px}
  .phases{gap:8px}
  .ai-provider-grid{grid-template-columns:1fr 1fr}
  .build-header{flex-direction:column;align-items:flex-start;gap:10px}
  .export-hero-btn{width:100%}
}

/* ======================================
   RESPONSIVE — MOBILE (max 768px)
   ====================================== */
@media(max-width:768px){
  :root{--hdr:52px;--sb:280px}

  /* Header: logo + hamburger only */
  .hdr{padding:0 1rem}
  .hdr-logo{font-size:15px;padding:0 12px 0 0;border-right:none}
  .hdr-nav{display:none}
  .hamburger-btn{display:flex;align-items:center;justify-content:center;margin-left:auto}
  .hdr-right{display:none}

  /* Sidebar: full-height drawer */
  .sidebar{
    position:fixed;top:var(--hdr);left:0;bottom:60px;
    z-index:250;width:var(--sb);
    transform:translateX(0);
    transition:transform .25s ease;
    box-shadow:4px 0 24px rgba(0,0,0,.18);
    overflow-y:auto;
  }
  .sidebar.sidebar-closed{transform:translateX(-100%)}

  /* Main content fills full width */
  .shell{padding-top:0}
  .content{
    padding:1rem 1rem 80px;
    width:100%;
    min-width:0;
  }

  /* Bottom bar — compact */
  .btm{padding:8px 12px;gap:6px}
  .btm-left{display:none}
  .btm-right{width:100%;justify-content:space-between}
  .btm-right .btn{flex:1;font-size:11px;padding:7px 6px}

  /* Phase cards — full width */
  .pcard{border-radius:8px}
  .phase-label{font-size:12px}
  .phase-sub{display:none}
  .quality-tag{display:none}

  /* AI provider grid — stack */
  .ai-provider-grid{grid-template-columns:1fr}

  /* Preview — no horizontal padding */
  .preview-shell{max-width:100%}
  .prev-topbar{padding:1.2rem 1.2rem}
  .prev-title{font-size:18px}
  .prev-body{padding:1rem 1rem}
  .prev-title-slide{height:200px}
  .prev-iq-question{font-size:16px;bottom:36px}
  .preview-toolbar{flex-wrap:wrap;gap:6px}
  .preview-toolbar .btn{font-size:11px;padding:5px 10px}
  .answer-toggle-wrap{margin-left:0}

  /* Build header — stack */
  .build-header{flex-direction:column;align-items:flex-start;gap:8px}
  .build-title{font-size:16px}
  .export-hero-btn{width:100%;justify-content:center}

  /* Keyword table */
  .kw-thead{display:none}
  .kw-row{grid-template-columns:1fr 32px;gap:6px}
  .kw-row input:nth-child(2){display:none}

  /* MWB — shorter on mobile */
  .mwb-canvas{height:auto;max-height:160px}

  /* Board buttons — wrap tighter */
  .sb-board-row{gap:4px}
  .board-btn{padding:3px 7px;font-size:10px}

  /* Gen hero button */
  .gen-hero{padding:11px 12px}
  .gen-hero-title{font-size:12px}
  .gen-hero-sub{font-size:9px}

  /* Mode switcher */
  .mode-switcher{gap:5px}
  .mode-btn{padding:8px}
  .mode-btn-sub{display:none}

  /* No key banner */
  .no-key-banner{flex-direction:column;text-align:center;gap:10px}

  /* Gen steps */
  .gen-progress-card{padding:14px}
  .gen-step-desc{display:none}

  /* Setup section */
  .ai-setup-section{padding:14px}
  .ai-key-row{flex-direction:column}
  .ai-key-row .btn{width:100%}

  /* Empty state */
  .empty-screen{padding:32px 16px}
  .empty-phases{gap:6px}
  .empty-phase-chip{padding:4px 8px;font-size:10px}
}

/* ======================================
   RESPONSIVE — SMALL MOBILE (max 400px)
   ====================================== */
@media(max-width:400px){
  :root{--sb:100vw}
  .sidebar{width:100vw}
  .btm-right .btn-dark{display:none}
  .hdr-logo .logo-pill{display:none}
  .nav-item span:first-child{display:none}
}

/* Desktop: sidebar always visible */
@media(min-width:769px){
  .sidebar{transform:none!important;position:relative;top:auto}
  .hamburger-btn{display:none!important}
}


/* --- AI PROVIDER PICKER --- */
.ai-provider-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;max-width:600px}
.ai-provider-card{
  border:2px solid var(--gray-200);border-radius:var(--radius);
  padding:20px 18px;cursor:pointer;transition:all .2s;
  background:var(--white);position:relative;
}
.ai-provider-card:hover{border-color:var(--gray-300);box-shadow:var(--shadow-md)}
.ai-provider-card.selected{border-color:var(--p);box-shadow:0 0 0 3px rgba(146,39,143,.08),var(--shadow-md)}
.ai-card-logo{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.ai-card-name{font-family:var(--fh);font-size:15px;font-weight:700;margin-bottom:2px}
.ai-card-by{font-size:11px;color:var(--gray-400);margin-bottom:10px}
.ai-card-desc{font-size:12px;color:var(--gray-500);line-height:1.6;margin-bottom:12px}
.ai-card-badge{
  display:inline-block;font-size:10px;font-weight:700;letter-spacing:.4px;
  padding:2px 8px;border-radius:99px;
  background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;
}
.ai-card-badge.school{background:linear-gradient(135deg,#0078D4,#004ba0)}
.ai-provider-card.selected::after{
  content:'✓';position:absolute;top:12px;right:12px;
  width:22px;height:22px;border-radius:50%;
  background:var(--p);color:#fff;font-size:12px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}

/* --- AI SETUP SECTION --- */
.ai-setup-section{
  background:var(--white);border:1.5px solid var(--gray-200);
  border-radius:var(--radius);padding:22px;margin-bottom:16px;
  max-width:600px;box-shadow:var(--shadow-sm);
}
.ai-setup-title{font-family:var(--fh);font-size:15px;font-weight:700;color:var(--gray-900);margin-bottom:14px}
.ai-key-row{display:flex;gap:8px;margin-bottom:14px}
.ai-key-input{flex:1;font-family:monospace;font-size:12px;letter-spacing:.5px}
.ai-connected-badge{
  display:flex;align-items:center;gap:8px;
  background:#f0fdf4;border:1.5px solid #86efac;
  border-radius:8px;padding:8px 12px;
  font-size:13px;font-weight:600;color:#15803d;
  margin-bottom:12px;
}
.ai-instructions{
  background:var(--gray-50);border:1px solid var(--gray-200);
  border-radius:8px;padding:14px 16px;margin-top:6px;
}
.ai-inst-title{font-family:var(--fh);font-size:12px;font-weight:700;color:var(--gray-700);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.ai-inst-steps{padding-left:18px;font-size:13px;color:var(--gray-700);line-height:1.8}
.ai-inst-steps li{margin-bottom:2px}
.ai-inst-steps a.ai-link{color:var(--p);font-weight:600}
.ai-inst-steps code{background:var(--pl);color:var(--pd);font-size:11px;padding:1px 5px;border-radius:3px}

/* --- COPILOT SPECIFIC --- */
.ai-notice-box{
  display:flex;gap:12px;align-items:flex-start;
  background:#fffbeb;border:1.5px solid #fcd34d;border-radius:8px;
  padding:12px 14px;margin-bottom:14px;font-size:13px;line-height:1.6;color:#374151;
}
.ai-notice-icon{font-size:20px;flex-shrink:0}
.ai-email-template{
  background:#1e1b2e;color:#e2d9f3;border-radius:8px;
  padding:14px 16px;font-family:monospace;font-size:12px;
  line-height:1.8;margin:8px 0 10px;white-space:pre-wrap;
}
.ai-cors-warning{
  font-size:12px;color:#6b7280;background:#fafafa;border:1px solid #e5e7eb;
  border-radius:6px;padding:10px 12px;margin-top:10px;line-height:1.6;
}

/* --- SIDEBAR AI STATUS --- */
.ai-status-bar{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:7px;margin-bottom:8px;
  background:var(--gray-50);border:1px solid var(--gray-200);
  font-size:12px;
}
.ai-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ai-status-dot.connected{background:#22c55e}
.ai-status-dot.warn{background:#f59e0b}
.ai-status-label{flex:1;font-weight:500;color:var(--gray-700)}
.ai-status-link{
  font-size:11px;font-weight:600;color:var(--p);
  background:transparent;border:none;cursor:pointer;padding:0;
  text-decoration:underline;
}


/* --- NO KEY BANNER --- */
.no-key-banner{
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(135deg,#fffbeb,#fef9ee);
  border:2px solid var(--a2);border-radius:var(--radius);
  padding:14px 18px;margin-bottom:20px;font-size:14px;color:var(--gray-700);
  line-height:1.5;
}
.no-key-banner strong{color:var(--gray-900)}


/* --- ABILITY SELECTOR --- */
.sb-ability-row{display:flex;align-items:center;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.ability-btn{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;border:1.5px solid var(--gray-200);background:var(--white);color:var(--gray-500);cursor:pointer;transition:all .15s}
.ability-btn:hover{border-color:var(--p);color:var(--p)}
.ability-btn.active{background:var(--p);border-color:var(--p);color:#fff}

/* --- PHASE TIMING --- */
.phase-timing-grid{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;padding:10px;margin:8px 0}
.timing-header{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-500);margin-bottom:6px}
.timing-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.timing-label{flex:1;font-size:11px;color:var(--gray-700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.timing-inp{width:44px!important;padding:3px 6px!important;font-size:12px!important;text-align:center}
.timing-min{font-size:10px;color:var(--gray-400)}
.timing-total{font-size:11px;font-weight:700;margin-top:6px;padding-top:6px;border-top:1px solid var(--gray-200)}
.timing-total.ok{color:var(--green)}
.timing-total.over{color:#dc2626}

/* --- PHASE CARD: hover-reveal toolbar --- */
.phase-toolbar{
  display:none;gap:6px;flex-wrap:wrap;
  margin-top:8px;padding:8px 0 4px;border-top:1px solid var(--gray-100);
}
.pcard:hover .phase-toolbar,.pcard.open .phase-toolbar{display:flex}
.phase-action-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 11px;border-radius:99px;font-size:12px;font-weight:600;
  color:var(--gray-500);background:var(--gray-50);
  border:1.5px solid var(--gray-200);cursor:pointer;transition:all .15s;white-space:nowrap;
}
.phase-action-btn:hover{color:var(--p);border-color:var(--p);background:var(--pl)}

/* --- PHASE CARD: timing badge --- */
.phase-timing-badge{
  font-size:10px;font-weight:600;color:var(--gray-400);
  background:var(--gray-100);border-radius:99px;
  padding:2px 7px;white-space:nowrap;flex-shrink:0;
}

/* --- SPLIT VIEW --- */
.shell.split-view{display:flex}
.shell.split-view .content{flex:1;min-width:0}
.split-preview-pane{
  width:380px;min-width:380px;
  background:var(--gray-50);border-left:1px solid var(--gray-200);
  overflow-y:auto;padding:16px;padding-bottom:80px;
}
@media(max-width:1200px){.split-preview-pane{display:none}}

/* --- ACTIVE PHASE HIGHLIGHT --- */
.pcard.phase-active{
  border-color:var(--p);
  box-shadow:0 0 0 3px rgba(146,39,143,.1),var(--shadow-md);
}

/* --- GENERATING ANIMATION on phase card --- */
.pcard.phase-generating .phead{
  background:linear-gradient(90deg,var(--white) 0%,var(--pl) 50%,var(--white) 100%);
  background-size:200% 100%;
  animation:shimmer 1.5s ease infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}


/* --- WORKSHEET FORMAT PICKER --- */
.ws-btn-wrap{position:relative}
.ws-main-btn{white-space:nowrap}
.ws-format-picker{
  position:absolute;top:calc(100% + 6px);right:0;
  background:var(--white);border:1.5px solid var(--gray-200);
  border-radius:var(--radius);box-shadow:var(--shadow-lg);
  z-index:500;min-width:220px;overflow:hidden;
  animation:fadeIn .15s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ws-format-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;cursor:pointer;transition:background .1s;
}
.ws-format-row:hover{background:var(--gray-50)}
.ws-format-row+.ws-format-row{border-top:1px solid var(--gray-100)}
.ws-fmt-icon{font-size:20px;flex-shrink:0}
.ws-fmt-label{font-size:13px;font-weight:600;color:var(--gray-900)}
.ws-fmt-sub{font-size:11px;color:var(--gray-400);margin-top:1px}


/* ══════════════════════════════════════════════
   CHANGE 1: VISUAL REFRESH — less border, more shadow
   ══════════════════════════════════════════════ */
/* Override heavy borders with softer shadows */
.pcard{border:none!important;box-shadow:var(--shadow-sm)}
.pcard:hover{box-shadow:var(--shadow-md)}
.pcard.open{box-shadow:0 0 0 2px var(--p),var(--shadow-md)}
.pcard.phase-active{box-shadow:0 0 0 2px var(--p),0 4px 24px rgba(146,39,143,.15)}
.ai-setup-section{border:none;box-shadow:var(--shadow-sm)}
.kw-table{border:none;box-shadow:var(--shadow-sm)}
.prev-phase{border:none;box-shadow:var(--shadow-sm);margin-bottom:8px;border-radius:var(--radius-sm)}
.section-card{border:none;box-shadow:var(--shadow-sm)}
.gen-progress-card{border:none;box-shadow:var(--shadow-sm)}
.ws-loaded{border-color:#fcd34d}
/* Softer sidebar */
.sidebar{border-right:none;box-shadow:2px 0 16px rgba(0,0,0,.06)}

/* ══════════════════════════════════════════════
   CHANGE 2: SPLIT VIEW — live preview pane
   ══════════════════════════════════════════════ */
.shell.split-view{display:flex}
.shell.split-view .content{flex:1;min-width:0;overflow-y:auto}
.split-preview-pane{
  width:360px;min-width:360px;max-width:360px;
  background:#fff;border-left:1px solid var(--gray-100);
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:-2px 0 12px rgba(0,0,0,.04);
}
.split-pane-label{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--white);
  border-bottom:1px solid var(--gray-100);
  font-family:var(--fh);font-size:12px;font-weight:700;color:var(--gray-500);
  letter-spacing:.5px;text-transform:uppercase;flex-shrink:0;
}
.split-close-btn{
  background:none;border:none;cursor:pointer;color:var(--gray-400);
  font-size:14px;padding:2px 6px;border-radius:4px;transition:all .15s;
}
.split-close-btn:hover{background:var(--gray-100);color:var(--gray-700)}
.split-pane-content{flex:1;overflow-y:auto;padding:12px}
@media(max-width:1100px){.split-preview-pane{display:none!important}}
@media(max-width:768px){.shell.split-view .split-preview-pane{display:none!important}}

/* ══════════════════════════════════════════════
   MINI PREVIEW (inside split pane)
   ══════════════════════════════════════════════ */
.mini-preview{border-radius:10px;overflow:hidden;box-shadow:var(--shadow-md)}
.mini-prev-top{padding:16px;color:#fff}
.mini-dept{font-size:9px;font-weight:800;letter-spacing:2px;opacity:.7;margin-bottom:4px}
.mini-title{font-family:var(--fh);font-size:15px;font-weight:800;line-height:1.2;margin-bottom:4px}
.mini-meta{font-size:10px;opacity:.65}
.mini-prev-body{background:var(--white);padding:10px}
.mini-empty{text-align:center;padding:24px 12px;color:var(--gray-400)}
.mini-phase-row{padding:8px 10px;border-radius:6px;margin-bottom:5px;background:var(--gray-50)}
.mini-phase-row:hover{background:var(--pl)}
.mini-phase-label{font-family:var(--fh);font-size:10px;font-weight:700;margin-bottom:3px}
.mini-phase-preview{font-size:11px;color:var(--gray-500);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* ══════════════════════════════════════════════
   CHANGE 3: RICHER PHASE MICRO-ACTIONS
   ══════════════════════════════════════════════ */
.phase-toolbar{
  display:flex;gap:5px;flex-wrap:wrap;
  margin-top:10px;padding:10px 0 2px;
  border-top:1px solid var(--gray-100);
  opacity:0;transition:opacity .2s;
}
.pcard.open .phase-toolbar{opacity:1}
.pcard:hover .phase-toolbar{opacity:1}
.phase-action-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 10px;border-radius:99px;font-size:11.5px;font-weight:600;
  color:var(--gray-500);background:var(--gray-50);
  border:1.5px solid var(--gray-200);cursor:pointer;transition:all .12s;
  white-space:nowrap;
}
.phase-action-btn:hover{color:var(--p);border-color:var(--p);background:var(--pl);transform:translateY(-1px)}
.phase-action-btn:active{transform:translateY(0)}

/* Phase textarea - cleaner */
.phase-textarea{
  width:100%;border:1.5px solid var(--gray-200);border-radius:var(--radius-xs);
  padding:12px;font-family:var(--fb);font-size:13px;color:var(--gray-700);
  background:var(--white);line-height:1.8;resize:vertical;min-height:100px;
  outline:none;transition:all .15s;
}
.phase-textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(146,39,143,.07)}

/* ══════════════════════════════════════════════
   SPLIT VIEW TOGGLE BUTTON
   ══════════════════════════════════════════════ */
.build-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:12px;margin-bottom:20px;padding-bottom:16px;
  border-bottom:1px solid var(--gray-100);
  flex-wrap:wrap;
}

/* ══════════════════════════════════════════════
   STATUS PILL improvements
   ══════════════════════════════════════════════ */
.status-pill.ready{background:#dcfce7;color:#15803d;font-size:10px;padding:2px 7px}

/* ══════════════════════════════════════════════
   MOBILE: hide split toggle on small screens
   ══════════════════════════════════════════════ */
@media(max-width:1100px){
  .split-toggle-btn{display:none}
}


/* footer removed */

/* ════════════════════════════════════════════
   DARK MODE TOGGLE BUTTON IN HEADER
   ════════════════════════════════════════════ */
.hdr-dm-btn{
  background:rgba(255,255,255,.1);border:none;cursor:pointer;
  width:34px;height:34px;border-radius:8px;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;margin-left:auto;
}
.hdr-dm-btn:hover{background:rgba(255,255,255,.2)}

/* ════════════════════════════════════════════
   DARK MODE — full system
   ════════════════════════════════════════════ */
html.dark{
  --gray-50:#1a1625;
  --gray-100:#221d2e;
  --gray-200:#2e2840;
  --gray-300:#3d3554;
  --gray-400:#6b6080;
  --gray-500:#9f94b0;
  --gray-700:#c8bfd8;
  --gray-900:#f0edf7;
  --white:#16121f;
  --bg:#0f0c18;
  --border:#2e2840;
  --ink:#f0edf7;
  color-scheme:dark;
}
html.dark body{background:var(--bg);color:var(--gray-900)}
html.dark .sidebar{background:#1a1625;box-shadow:2px 0 16px rgba(0,0,0,.4)}
html.dark input,html.dark textarea,html.dark select{background:#221d2e;color:var(--gray-900);border-color:var(--gray-200)}
html.dark input:focus,html.dark textarea:focus{background:#2e2840;border-color:var(--p)}
html.dark .pcard{background:#1a1625;box-shadow:0 2px 8px rgba(0,0,0,.3)}
html.dark .pcard.open{box-shadow:0 0 0 2px var(--p),0 4px 16px rgba(0,0,0,.4)}
html.dark .phase-textarea{background:#221d2e;color:var(--gray-900);border-color:var(--gray-200)}
html.dark .phase-action-btn{background:#221d2e;color:var(--gray-500);border-color:var(--gray-200)}
html.dark .phase-action-btn:hover{background:#2e2840;color:var(--p);border-color:var(--p)}
html.dark .preview-toolbar{background:#1a1625;border-color:var(--gray-200)}
html.dark .prev-body{background:#1a1625}
html.dark .prev-phase{background:#221d2e;box-shadow:0 1px 4px rgba(0,0,0,.3)}
html.dark .prev-kw-grid{background:#221d2e;border-color:var(--gray-200)}
html.dark .prev-kw-card{background:#2e2840;border-color:var(--gray-300)}
html.dark .mini-prev-body{background:#1a1625}
html.dark .mini-phase-row{background:#221d2e}
html.dark .split-preview-pane{background:#1a1625;border-left-color:var(--gray-200)}
html.dark .hdr{background:#0f0c18}
html.dark .btm{background:rgba(22,18,31,.96)}
html.dark 
html.dark .gen-hero{background:linear-gradient(135deg,var(--p),var(--pd))}
html.dark .mode-btn{background:#221d2e;border-color:var(--gray-200)}
html.dark .mode-btn.active{background:#2e2840;border-color:var(--p)}
html.dark .ai-status-bar{background:#221d2e;border-color:var(--gray-200)}
html.dark .sb-adv{background:#221d2e;border-color:var(--gray-200)}
html.dark .phase-timing-grid{background:#221d2e;border-color:var(--gray-200)}
html.dark .ai-provider-card{background:#1a1625;border-color:var(--gray-200)}
html.dark .ai-provider-card.selected{border-color:var(--p)}
html.dark .ai-setup-section{background:#1a1625}
html.dark .kw-table{background:#1a1625}
html.dark .kw-tbody{background:#1a1625}
html.dark .kw-row:hover{background:#221d2e}
html.dark .toggle-slider{background:#3d3554}
html.dark .no-key-banner{background:#221d2e;border-color:#fbbf24}
html.dark .build-header{border-bottom-color:var(--gray-200)}
html.dark .ws-format-picker{background:#1a1625;border-color:var(--gray-200)}
html.dark .ws-format-row:hover{background:#221d2e}

/* ════════════════════════════════════════════
   ACCESSIBILITY — stronger focus states
   ════════════════════════════════════════════ */
/* Ensure 3:1 contrast ratio minimum on all focusable elements */
input:focus-visible,textarea:focus-visible,select:focus-visible{
  outline:3px solid var(--p);
  outline-offset:2px;
  box-shadow:0 0 0 5px rgba(146,39,143,.2);
}
button:focus-visible,.btn:focus-visible{
  outline:3px solid var(--p);
  outline-offset:2px;
}
.board-btn:focus-visible,.ability-btn:focus-visible,.mode-btn:focus-visible{
  outline:3px solid var(--p);
  outline-offset:2px;
}
/* High contrast mode support */
@media(forced-colors:active){
  .btn-primary,.gen-hero,.board-btn.active,.ability-btn.active{forced-color-adjust:none}
  input:focus,textarea:focus{outline:3px solid ButtonText}
}

/* ════════════════════════════════════════════
   MOBILE — full slide-out drawer (improved)
   ════════════════════════════════════════════ */
@media(max-width:768px){
  :root{--sb:min(280px,85vw)}
  .sidebar{
    position:fixed;top:var(--hdr);left:0;bottom:44px;
    width:var(--sb);z-index:250;
    transform:translateX(0);transition:transform .28s cubic-bezier(.4,0,.2,1);
    box-shadow:4px 0 32px rgba(0,0,0,.22);
    overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  .sidebar.sidebar-closed{transform:translateX(-105%)}
  /* Overlay when sidebar open */
  .sidebar-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:240;
    backdrop-filter:blur(2px);
  }
  .hamburger-btn{display:flex!important}
  .hdr-nav .nav-item span:last-child{display:none}
  .nav-item{padding:0 8px;font-size:11px}
  /* Content full width */
  .content{padding:1rem 1rem 90px}
  /* Bottom bar stacked */
  .btm{padding:8px 10px;flex-wrap:wrap;gap:6px}
  .btm-left{display:none}
  .btm-right{width:100%;display:flex;gap:5px}
  .btm-right .btn{flex:1;font-size:11px;padding:7px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* Phase cards */
  .phase-sub{display:none}
  .quality-tag{display:none}
  .phase-timing-badge{display:none}
  /* Phase toolbar wraps more tightly */
  .phase-action-btn{padding:4px 8px;font-size:11px}
  /* Board buttons tighter */
  .board-btn{padding:3px 6px;font-size:10px}
  /* Empty state */
  .empty-screen{padding:32px 16px}
  /* Build header stacks */
  .build-header{flex-direction:column;gap:8px}
  .build-title{font-size:16px}
  .export-hero-btn{width:100%;justify-content:center}
  /* Preview */
  .prev-topbar{padding:1.2rem}
  .prev-title{font-size:18px}
  .prev-body{padding:1rem}
  /* AI setup */
  .ai-provider-grid{grid-template-columns:1fr}
  .ai-key-row{flex-direction:column}
  .ai-key-row .btn{width:100%}
}
@media(min-width:769px){
  .sidebar{transform:none!important;position:relative;top:auto}
  .hamburger-btn{display:none!important}
}


/* ════════════════════════════════════════════
   SKELETON SHIMMER — loading state for phases
   ════════════════════════════════════════════ */
.phase-skeleton{
  padding:12px;
  background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-50) 50%,var(--gray-100) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s ease infinite;
  border-radius:var(--radius-xs);
  height:80px;margin-top:8px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Phase generating: shimmer on the textarea area */
.pcard.phase-generating .pbody-inner::after{
  content:'';display:block;
  background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-50) 50%,var(--gray-100) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s ease infinite;
  border-radius:var(--radius-xs);height:90px;margin-top:8px;
}

/* ════════════════════════════════════════════
   MWB FULLSCREEN
   ════════════════════════════════════════════ */
.mwb-fs-btn{
  background:transparent;border:1.5px solid var(--gray-200);
  border-radius:5px;padding:4px 7px;cursor:pointer;
  color:var(--gray-500);transition:all .15s;margin-left:auto;
}
.mwb-fs-btn:hover{border-color:var(--p);color:var(--p);background:var(--pl)}
.mwb-fullscreen-overlay{
  position:fixed;inset:0;z-index:9999;
  background:#faf9fd;
  display:flex;flex-direction:column;
}
html.dark .mwb-fullscreen-overlay{background:#0f0c18}
.mwb-fs-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;background:var(--pd);
  box-shadow:0 2px 8px rgba(0,0,0,.15);flex-shrink:0;
}
.mwb-fs-title{font-family:var(--fh);font-size:15px;font-weight:700;color:#fff}
.mwb-fs-close{
  background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.2);
  color:#fff;padding:7px 16px;border-radius:6px;cursor:pointer;
  font-family:var(--fb);font-size:13px;font-weight:600;transition:all .15s;
}
.mwb-fs-close:hover{background:rgba(255,255,255,.25)}
.mwb-fs-canvas{
  flex:1;width:100%;height:100%;cursor:crosshair;touch-action:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 39px,#e8e4f0 40px),
             repeating-linear-gradient(90deg,transparent,transparent 39px,#f0edf7 40px),
             #f9f8fd;
}
html.dark .mwb-fs-canvas{
  background:repeating-linear-gradient(0deg,transparent,transparent 39px,#2e2840 40px),
             repeating-linear-gradient(90deg,transparent,transparent 39px,#221d2e 40px),
             #1a1625;
}

/* ════════════════════════════════════════════
   REDUCED MOTION — accessibility
   ════════════════════════════════════════════ */
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
  .spinner,.gen-step-dot.active{animation:none!important}
  .pcard.phase-generating .phead{animation:none!important}
  .phase-skeleton,.pcard.phase-generating .pbody-inner::after{animation:none!important;background:var(--gray-100)}
  .gen-hero:hover,.export-hero-btn:hover,.btn-primary:hover{transform:none!important}
  .phase-action-btn:hover{transform:none!important}
  .sidebar{transition:none!important}
}

/* ════════════════════════════════════════════
   PRINT OPTIMISATION
   ════════════════════════════════════════════ */
@media print{
  /* Hide interactive UI */
  .hdr,.sidebar,.btm,.lc-footer,
  .preview-toolbar,.phase-toolbar,
  .mwb-cameo,.gen-progress-card,
  .no-key-banner,.ai-status-bar,
  .hdr-dm-btn,.hamburger-btn,
  .split-preview-pane{display:none!important}

  /* Full width */
  .shell,.main{display:block!important}
  .content{padding:0!important;overflow:visible!important}

  /* Remove shadows and borders for clean print */
  *{box-shadow:none!important}
  .pcard,.prev-phase,.ai-setup-section{border:1px solid #999!important}

  /* Force all phase cards to show content */
  .pbody{display:block!important}
  .pbody-inner{display:block!important}
  .phase-textarea{display:block!important;height:auto!important;min-height:60px!important;border:none!important;resize:none!important}

  /* Page breaks */
  .prev-phase,.pcard{page-break-inside:avoid!important;break-inside:avoid!important}
  .prev-phase-list,.phases{page-break-before:auto}

  /* Colours print well */
  .prev-topbar,.mini-prev-top{print-color-adjust:exact;-webkit-print-color-adjust:exact}
  .phase-color-bar,.phase-icon-wrap{print-color-adjust:exact;-webkit-print-color-adjust:exact}

  /* Preview shell takes full page */
  .preview-shell{max-width:100%!important}
  .prev-body{padding:1rem!important}
}

/* ════════════════════════════════════════════
   CONTRAST IMPROVEMENTS — WCAG 2.1 AA
   ════════════════════════════════════════════ */
/* Darken mid-range grays that may fail contrast checks */
:root{
  --gray-400:#7a7090; /* was #9f94b0 — now darker for better contrast on white */
  --gray-500:#5c5375; /* was #6b6080 — now darker */
}
.qs-desc,.prev-kw-def,.phase-sub,.build-meta,.mini-meta,.meta-str{
  color:var(--gray-500)!important; /* ensure legible on white backgrounds */
}
/* Ensure small text passes contrast at 4.5:1 */
.board-btn,.ability-btn{color:#4a4060!important}
.board-btn.active,.ability-btn.active{color:#fff!important}


/* ═══ IMPROVEMENT 1: Progress during parallel generation ═══ */
.gen-step-dot.active{background:var(--p);animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ═══ IMPROVEMENT 2: Lesson History Panel ═══ */
.hdr-hist-btn{
  background:rgba(255,255,255,.12);border:none;cursor:pointer;
  width:34px;height:34px;border-radius:8px;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;margin-right:4px;
}
.hdr-hist-btn:hover{background:rgba(255,255,255,.22)}
.history-panel{
  width:320px;background:var(--white);
  border:1.5px solid var(--gray-200);border-radius:var(--radius);
  box-shadow:0 8px 32px rgba(0,0,0,.15);overflow:hidden;
  max-height:70vh;overflow-y:auto;
}
html.dark .history-panel{background:var(--gray-100);border-color:var(--gray-200)}
.history-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;background:var(--pd);color:#fff;
  position:sticky;top:0;z-index:1;
}
.history-close{background:none;border:none;color:#fff;cursor:pointer;font-size:16px;padding:2px 6px}
.history-empty{padding:24px;text-align:center;color:var(--gray-400);font-size:13px}
.history-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--gray-100);
  transition:background .1s;
}
.history-row:hover{background:var(--pl)}
html.dark .history-row:hover{background:rgba(146,39,143,.1)}
.history-info{flex:1;min-width:0}
.history-title{font-size:13px;font-weight:600;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-meta{font-size:11px;color:var(--gray-400);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;background:var(--pl);color:var(--p);flex-shrink:0}
.history-badge.exam{background:#fef2f2;color:#dc2626}

/* ═══ IMPROVEMENT 4: Question formatting ═══ */
.phase-q-display{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.phase-q-card{
  border-radius:var(--radius-xs);overflow:hidden;
  border:1.5px solid var(--gray-200);
  transition:box-shadow .15s;
}
.phase-q-card:hover{box-shadow:var(--shadow-sm)}
.phase-q-hdr{
  padding:8px 12px;background:var(--gray-50);
  border-bottom:1px solid var(--gray-100);
  font-size:13px;font-weight:600;color:var(--gray-900);
  line-height:1.5;
}
html.dark .phase-q-hdr{background:var(--gray-200)}
.phase-q-body{
  padding:8px 12px;font-size:12.5px;color:var(--gray-600);
  line-height:1.7;white-space:pre-wrap;
}
.phase-q-answer .phase-q-body{background:#f0fdf4;color:#15803d}
.phase-q-answer .phase-q-hdr{background:#dcfce7;border-color:#86efac}
.phase-q-misc{font-size:12px;color:var(--gray-500);padding:3px 2px;font-style:italic}
.mark-badge{
  display:inline-block;background:var(--p);color:#fff;
  font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px;
  margin-left:4px;vertical-align:middle;letter-spacing:.3px;
}
.phase-textarea-compact{min-height:60px!important;height:60px!important;margin-top:8px}

/* ═══ IMPROVEMENT 7: Presets ═══ */
.presets-row{display:flex;align-items:center;gap:5px;margin-bottom:6px;flex-wrap:wrap}
.presets-label{font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.preset-btn{
  padding:4px 9px;border-radius:99px;font-size:11px;font-weight:600;
  border:1.5px solid var(--gray-200);background:var(--white);
  color:var(--gray-600);cursor:pointer;transition:all .15s;white-space:nowrap;
}
.preset-btn:hover{border-color:var(--p);color:var(--p);background:var(--pl)}

/* ═══ IMPROVEMENT 8: Adapt dialog ═══ */
.adapt-dialog{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:9999;width:320px;
  background:var(--white);border-radius:var(--radius);
  box-shadow:0 8px 40px rgba(0,0,0,.2);border:1.5px solid var(--gray-200);
  overflow:hidden;
}
html.dark .adapt-dialog{background:var(--gray-100);border-color:var(--gray-200)}
.adapt-title{
  padding:14px 16px;background:var(--pd);color:#fff;
  font-family:var(--fh);font-size:14px;font-weight:700;
}
.adapt-row{padding:10px 16px;border-bottom:1px solid var(--gray-100)}
.adapt-row label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.adapt-row input,.adapt-row select{width:100%;padding:7px 10px;border:1.5px solid var(--gray-200);border-radius:var(--radius-xs);font-size:13px}
.adapt-btns{display:flex;gap:8px;padding:12px 16px;justify-content:flex-end}

/* ═══ IMPROVEMENT 9: Marks total ═══ */
.build-meta{font-size:12px;color:var(--gray-500);margin-top:3px}


/* ════════════════════════════════════════════════════
   🚀 TEACH MODE — Fullscreen Classroom Delivery
   ════════════════════════════════════════════════════ */

/* Header button */
.hdr-teach-btn{
  background:linear-gradient(135deg,var(--a2) 0%,#f59e0b 100%);
  color:var(--pd);border:none;cursor:pointer;
  padding:7px 16px;border-radius:8px;
  font-family:var(--fh);font-size:12px;font-weight:800;
  letter-spacing:.2px;transition:all .15s;white-space:nowrap;
  box-shadow:0 2px 8px rgba(255,193,7,.35);flex-shrink:0;
}
.hdr-teach-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,193,7,.45)}
.hdr-teach-btn:active{transform:translateY(0)}

/* Overlay */
.teach-overlay{
  position:fixed;inset:0;z-index:99999;
  background:#0f0c18;
  display:flex;flex-direction:column;
  outline:none;
  font-family:'Sora',sans-serif;
  user-select:none;
  overflow:hidden;
}

/* Slide area */
.teach-slide{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;position:relative;
  background:#fff;
}

/* Title slide */
.teach-title-slide{
  justify-content:center;align-items:flex-start;
  padding:6vh 8vw;
  position:relative;overflow:hidden;
}
.teach-shape-1{position:absolute;right:-4vw;top:-8vh;width:45vw;height:45vw;border-radius:50%;opacity:.08;background:white;}
.teach-shape-2{position:absolute;right:8vw;bottom:-10vh;width:30vw;height:30vw;border-radius:50%;opacity:.12;background:white;}
.teach-shape-3{position:absolute;right:20vw;top:10vh;width:18vw;height:18vw;border-radius:50%;opacity:.15;background:white;}
.teach-title-content{position:relative;z-index:1;color:#fff;max-width:75vw;}
.teach-subject{font-size:clamp(12px,1.5vw,18px);font-weight:800;letter-spacing:3px;opacity:.65;margin-bottom:.8vh}
.teach-board-tag{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:99px;padding:3px 12px;font-size:clamp(10px,1.2vw,14px);font-weight:600;margin-bottom:1.5vh}
.teach-topic{font-size:clamp(28px,5.5vw,72px);font-weight:800;line-height:1.1;margin:0 0 2vh;text-underline-offset:6px;text-decoration:underline;text-decoration-color:rgba(255,255,255,.3)}
.teach-inquiry{font-size:clamp(14px,2vw,26px);font-style:italic;opacity:.8;margin-bottom:2vh;line-height:1.4}
.teach-meta{font-size:clamp(12px,1.4vw,18px);opacity:.55;margin-bottom:1.5vh}
.teach-obj{font-size:clamp(12px,1.4vw,18px);background:rgba(255,255,255,.12);border-radius:8px;padding:10px 16px;margin-bottom:1.5vh;line-height:1.5}
.teach-date{font-size:clamp(11px,1.2vw,16px);opacity:.45;margin-top:2vh}

/* Phase slide */
.teach-phase-bar{height:6px;flex-shrink:0}
.teach-phase-label{
  display:flex;align-items:center;gap:12px;
  padding:clamp(8px,1.5vh,16px) clamp(16px,3vw,40px);
  background:#fafafa;border-bottom:1px solid #e5e7eb;flex-shrink:0;
}
.teach-phase-icon{font-size:clamp(18px,2.5vw,32px)}
.teach-phase-name{font-family:'Sora',sans-serif;font-size:clamp(14px,2vw,26px);font-weight:800;color:#1a1a2e}
.teach-chunk-badge{font-size:clamp(10px,1.2vw,14px);background:#e5e7eb;color:#6b7080;border-radius:99px;padding:2px 10px;font-weight:600}
.teach-timing{margin-left:auto;font-size:clamp(12px,1.4vw,18px);color:#9ca3af;font-weight:600}

/* Content area */
.teach-content{
  flex:1;display:flex;overflow:hidden;
  padding:clamp(16px,3vh,40px) clamp(20px,4vw,60px);
  gap:40px;
}
.teach-content-split .teach-text-col{flex:1.2}
.teach-text-col{flex:1;display:flex;flex-direction:column;gap:clamp(6px,1vh,14px);overflow-y:auto}
.teach-diagram-col{flex:1;display:flex;align-items:center;justify-content:center;background:#f8faff;border-radius:12px;padding:16px;border:1.5px solid #e0e7ff}
.teach-diagram-col svg{max-width:100%;max-height:100%;height:auto}

/* Lines */
.teach-line{
  font-size:clamp(14px,2vw,28px);
  line-height:1.5;color:#1a1a2e;
  padding:clamp(6px,1vh,12px) clamp(10px,1.5vw,20px);
  border-radius:8px;transition:background .15s;
}
.teach-line-q{
  background:#f5f3ff;border-left:4px solid var(--p);
  font-weight:700;color:#1a1a2e;
}
.teach-line-ans{background:#f0fdf4;color:#15803d;font-weight:600}
.teach-line-hidden{
  background:#f3f4f6;color:transparent;border-radius:8px;
  cursor:pointer;position:relative;filter:blur(6px);
  transition:filter .3s;border:2px dashed #d1d5db;
}
.teach-line-hidden:hover{filter:blur(3px)}
.teach-reveal-hint{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:#9ca3af;font-size:clamp(12px,1.5vw,18px);font-weight:600;filter:none;
}
.teach-mark-badge{
  display:inline-block;background:var(--p);color:#fff;
  font-size:.7em;font-weight:800;padding:1px 6px;border-radius:4px;
  margin-left:4px;vertical-align:middle;
}

/* Vocab slide */
.teach-vocab-slide{background:#fdf9ff}
.teach-vocab-hdr{
  padding:clamp(12px,2vh,24px) clamp(20px,4vw,50px);
  color:#fff;font-size:clamp(16px,2.5vw,32px);font-weight:800;flex-shrink:0;
}
.teach-vocab-grid{
  flex:1;display:grid;
  grid-template-columns:repeat(auto-fill,minmax(clamp(180px,20vw,280px),1fr));
  gap:clamp(8px,1.5vw,20px);
  padding:clamp(12px,2vh,24px) clamp(20px,4vw,50px);
  overflow-y:auto;align-content:start;
}
.teach-vocab-card{background:#fff;border-radius:12px;padding:16px;border:1.5px solid #e9d5ff;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.teach-vocab-tier{display:inline-block;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px;margin-bottom:6px}
.teach-vocab-word{font-size:clamp(16px,2.2vw,28px);font-weight:800;color:#4c1d95;margin-bottom:4px}
.teach-vocab-def{font-size:clamp(12px,1.4vw,16px);color:#374151;line-height:1.5;margin-bottom:6px}
.teach-vocab-etym{font-size:clamp(10px,1.2vw,13px);color:#9ca3af;font-style:italic;margin-bottom:4px}
.teach-vocab-isay{font-size:clamp(11px,1.3vw,14px);color:#6d28d9;font-weight:600}

/* Navigation bar */
.teach-nav{
  height:52px;background:#0f0c18;border-top:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;
}
.teach-nav-left{display:flex;align-items:center;gap:10px;flex:1}
.teach-counter{font-size:12px;font-weight:700;color:rgba(255,255,255,.5);font-family:'Sora',sans-serif;white-space:nowrap}
.teach-dots{display:flex;gap:4px;align-items:center}
.teach-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .2s}
.teach-dot.active{background:var(--a2);width:20px;border-radius:3px}
.teach-nav-center{flex:1;text-align:center;font-size:13px;font-weight:700;color:rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.teach-nav-right{display:flex;align-items:center;gap:6px}
.teach-tool-btn{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  color:#fff;cursor:pointer;padding:5px 10px;border-radius:6px;
  font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap;
}
.teach-tool-btn:hover{background:rgba(255,255,255,.2)}
.teach-tool-btn.active{background:var(--p);border-color:var(--p)}
.teach-exit-btn{background:rgba(220,38,38,.2);border-color:rgba(220,38,38,.3)}
.teach-exit-btn:hover{background:rgba(220,38,38,.4)}

/* Nav arrows */
.teach-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:52px;height:52px;border-radius:50%;
  background:rgba(0,0,0,.35);border:none;color:#fff;
  font-size:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;z-index:10;
}
.teach-arrow:hover{background:rgba(0,0,0,.6);transform:translateY(-50%) scale(1.1)}
.teach-prev{left:12px}
.teach-next{right:12px}

/* Annotation canvas */
.teach-canvas{
  position:absolute;inset:0;z-index:5;cursor:crosshair;
  background:transparent;
}

/* Timer */
.teach-timer{
  position:absolute;top:60px;right:16px;
  background:rgba(0,0,0,.7);color:#fff;
  font-size:clamp(20px,3vw,40px);font-weight:800;font-family:'Sora',sans-serif;
  padding:8px 18px;border-radius:10px;cursor:pointer;
  letter-spacing:2px;z-index:20;
}
.teach-timer-warn{color:#f59e0b;animation:pulse 1s ease infinite}

/* Dark mode compat */
html.dark .teach-slide{background:#1a1625}
html.dark .teach-phase-label{background:#1a1625;border-color:#2e2840}
html.dark .teach-phase-name{color:#f0edf7}
html.dark .teach-line{color:#e0daf0}
html.dark .teach-line-q{background:#2e2840}
html.dark .teach-line-ans{background:#064e3b;color:#6ee7b7}
html.dark .teach-vocab-card{background:#221d2e;border-color:#3d3554}

/* Mobile teach */
@media(max-width:768px){
  .teach-arrow{display:none}
  .teach-content{padding:12px 16px}
  .teach-nav-center{display:none}
  .teach-dots{display:none}
}


/* ═══ Preset button active state ═══ */
.preset-btn-active{
  background:var(--p)!important;
  border-color:var(--p)!important;
  color:#fff!important;
  box-shadow:0 2px 8px rgba(146,39,143,.3)!important;
}
.preset-btn-active:hover{
  background:var(--pd)!important;
}

/* ═══ Teach Mode: MWB Cameo ═══ */
.teach-mwb-cameo{
  position:absolute;bottom:12px;right:12px;z-index:20;
}
.teach-mwb-toggle{
  background:rgba(0,0,0,.7);color:#fff;border:1.5px solid rgba(255,255,255,.2);
  border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .15s;backdrop-filter:blur(4px);
}
.teach-mwb-toggle:hover{background:rgba(0,0,0,.85);border-color:rgba(255,255,255,.4)}
.teach-mwb-panel{
  position:absolute;bottom:38px;right:0;
  background:#fff;border:1.5px solid #e5e7eb;
  border-radius:10px;overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,.2);
  width:360px;
}
.teach-mwb-tools{
  display:flex;gap:4px;padding:6px 8px;background:#f9fafb;
  border-bottom:1px solid #e5e7eb;align-items:center;
}
.teach-mwb-btn{
  padding:4px 8px;border-radius:5px;border:1px solid #e5e7eb;
  background:#fff;cursor:pointer;font-size:12px;
  transition:background .1s;
}
.teach-mwb-btn:hover{background:#f3f4f6}
.teach-mwb-canvas{
  display:block;width:100%;height:240px;
  cursor:crosshair;touch-action:none;
}

/* ═══ Teach Mode: Fullscreen MWB ═══ */
.teach-mwb-fullscreen{
  position:absolute;inset:0;z-index:30;
  background:#fff;display:flex;flex-direction:column;
}
.teach-mwb-fs-tools{
  display:flex;gap:6px;padding:8px 12px;
  background:#1a1a2e;align-items:center;flex-shrink:0;
}
.teach-mwb-fs-tools .teach-mwb-btn{
  background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff;
}

/* ═══ Teach Mode: Editable elements ═══ */
.teach-editable{
  cursor:text;
  border-radius:4px;
  outline:none;
  transition:background .15s;
  min-width:20px;
}
.teach-editable:hover{background:rgba(146,39,143,.06)!important}
.teach-editable:focus{
  background:rgba(146,39,143,.08)!important;
  box-shadow:0 0 0 2px rgba(146,39,143,.2);

    if(tc.accent2)accent=tc.accent2;if(tc.accent3)accent2=tc.accent3;
    return{loaded:true,filename:file.name,primary,primaryDark,primaryLight,accent,accent2};
  }catch(e){console.error(e);return null}
}
